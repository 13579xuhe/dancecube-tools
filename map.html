<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>舞立方·全国机台地图 | 自动定位你的城市</title>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=9364b5b6f74ae2d99320c91c6928b631"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="./map.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e1c; color: #eef2ff; }
        .app-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #0f1225; border-bottom: 2px solid #3b4b9e; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 24px; color: #7c8ee0; }
        .logo-area h1 { font-size: 1.3rem; font-weight: 600; background: linear-gradient(135deg, #b4c4ff, #6a7fd8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stats { background: #12162b; padding: 4px 16px; border: 1px solid #2a3a7a; font-size: 0.75rem; border-radius: 4px; }
        .control-bar { background: #0c0f21; padding: 8px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #1e2552; flex-shrink: 0; }
        .select-group { display: flex; align-items: center; gap: 10px; background: #0a0e1c; padding: 4px 14px; border: 1px solid #2c3a7a; border-radius: 4px; }
        .select-group label { font-size: 0.8rem; color: #a5b4fc; }
        select { background: #0f1229; border: 1px solid #3c4a8c; color: #eef2ff; padding: 6px 16px 6px 10px; font-size: 0.8rem; cursor: pointer; outline: none; min-width: 150px; border-radius: 4px; }
        select:hover { border-color: #6a7fd8; }
        .quick-buttons { display: flex; gap: 12px; margin-left: auto; }
        .sec-btn { background: #171d3a; border: 1px solid #33407a; color: #cbd5ff; padding: 6px 18px; font-size: 0.75rem; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .sec-btn:hover { background: #25306b; border-color: #6a7fd8; color: white; }
        .map-container { flex: 1; position: relative; background: #03051a; }
        #map { width: 100%; height: 100%; }
        .info-panel { position: absolute; bottom: 20px; right: 20px; z-index: 100; width: 260px; background: #0b0e21ee; backdrop-filter: blur(10px); border-left: 4px solid #5f72c4; padding: 14px 16px; border-radius: 12px; }
        .info-panel h4 { font-size: 0.9rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #b4c4ff; }
        .legend { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; }
        .dot-active { width: 16px; height: 16px; background: #52c41a; border-radius: 50%; box-shadow: 0 0 8px #52c41a; }
        .dot-offline { width: 16px; height: 16px; background: #8a8a8a; border-radius: 50%; }
        .dot-show { width: 16px; height: 16px; background: #a855f7; border-radius: 50%; box-shadow: 0 0 8px #a855f7; }
        .dot-normal { width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; box-shadow: 0 0 8px #3b82f6; }
        .status-msg { margin-top: 12px; font-size: 0.65rem; background: #0a0e1c; padding: 8px; text-align: center; border-radius: 8px; }
        footer { background: #070a17; text-align: center; font-size: 0.55rem; padding: 4px; color: #5f6d9e; flex-shrink: 0; }

        .custom-infowindow {
            background: linear-gradient(135deg, #1a1f3a 0%, #0f1229 100%);
            border: none;
            padding: 14px 18px;
            min-width: 280px;
            color: #eef2ff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(124, 142, 224, 0.3);
            position: relative;
        }
        .custom-infowindow h3 { margin: 0 0 10px 0; color: #b4c4ff; font-size: 1rem; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(124, 142, 224, 0.3); padding-bottom: 8px; flex-wrap: wrap; }
        .custom-infowindow h3 i { color: #7c8ee0; font-size: 16px; }
        .custom-infowindow .detail { margin: 8px 0; font-size: 0.75rem; display: flex; align-items: center; gap: 10px; line-height: 1.4; }
        .custom-infowindow .detail i { width: 18px; color: #7c8ee0; font-size: 12px; text-align: center; }
        .badge-custom { background: rgba(44, 59, 114, 0.8); display: inline-block; padding: 4px 12px; font-size: 0.6rem; margin-top: 10px; border-radius: 20px; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: bold; }
        .status-online { background: rgba(82, 196, 26, 0.2); color: #52c41a; border: 1px solid rgba(82, 196, 26, 0.5); }
        .status-offline { background: rgba(138, 138, 138, 0.2); color: #aaa; border: 1px solid rgba(138, 138, 138, 0.5); }
        .machine-type-show { color: #a855f7; background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.4); }
        .machine-type-normal { color: #3b82f6; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); }

        .info-close-btn { position: absolute; top: 10px; right: 12px; background: rgba(255,255,255,0.1); border: none; color: #aaa; cursor: pointer; font-size: 12px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .info-close-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
        .loading-spinner { width: 48px; height: 48px; border: 4px solid #3b4b9e; border-top-color: #7c8ee0; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: white; font-size: 14px; }
        .location-tip { position: absolute; top: 80px; left: 20px; background: #0f1225cc; backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 20px; font-size: 11px; z-index: 100; border-left: 3px solid #52c41a; }

        .custom-marker { transition: transform 0.2s ease; cursor: pointer; }
        .custom-marker:hover { transform: scale(1.08); }

        .amap-info-content { background: transparent !important; border: none !important; box-shadow: none !important; }
        .amap-info-sharp { display: none !important; }
        .amap-info-close { display: none !important; }
        .amap-info { background: transparent !important; border: none !important; box-shadow: none !important; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <i class="fas fa-dice-d6 logo-icon"></i>
            <h1>舞立方·全国机台地图 <span style="font-size:10px;">🎵 自动定位你的城市</span></h1>
        </div>
        <div class="stats"><i class="fas fa-gamepad"></i> 机台: <span id="totalCountSpan">0</span></div>
    </div>

    <div class="control-bar">
        <div class="select-group">
            <label><i class="fas fa-map"></i> 省份</label>
            <select id="provinceSelect"><option value="">请选择省份</option></select>
        </div>
        <div class="select-group">
            <label><i class="fas fa-city"></i> 城市</label>
            <select id="citySelect" disabled><option value="">请先选择省份</option></select>
        </div>
        <div class="quick-buttons">
            <button class="sec-btn" id="myLocationBtn"><i class="fas fa-crosshairs"></i> 重新定位</button>
            <button class="sec-btn" id="resetViewBtn"><i class="fas fa-globe"></i> 重置视图</button>
        </div>
    </div>

    <div class="map-container">
        <div id="map"></div>
        <div id="locationTip" class="location-tip" style="display: none;">
            <i class="fas fa-location-dot"></i> <span id="currentCityName">定位中...</span>
        </div>
        <div class="info-panel">
            <h4><i class="fas fa-chart-line"></i> 机台状态</h4>
            <div class="legend">
                <div class="legend-item"><div class="dot-active"></div> <span>🎵 在线运营</span></div>
                <div class="legend-item"><div class="dot-offline"></div> <span>💤 离线/维护中</span></div>
                <div class="legend-item"><div class="dot-show"></div> <span>🎭 秀机/Show机 (紫色)</span></div>
                <div class="legend-item"><div class="dot-normal"></div> <span>🎮 一代/二代机 (蓝色)</span></div>
            </div>
            <div class="status-msg" id="panelMsg"><i class="fas fa-spinner fa-pulse"></i> 正在获取你的位置...</div>
        </div>
    </div>
    <footer>📍 自动定位你的城市 | 可选择其他城市查看 | 点击标记查看详情 | 紫色标记为秀机/Show机</footer>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display: flex;">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在定位你的城市并获取机台信息...</div>
</div>

<script>
    // ======================= 城市名映射表 =======================
    const CITY_NAME_MAPPING = {
        "Jilin": "吉林市", "jilin": "吉林市", "Jilin City": "吉林市", "吉林": "吉林市",
        "Beijing": "北京市", "beijing": "北京市", "Peking": "北京市",
        "Shanghai": "上海市", "shanghai": "上海市",
        "Tianjin": "天津市", "tianjin": "天津市",
        "Chongqing": "重庆市", "chongqing": "重庆市",
        "Guangzhou": "广州市", "guangzhou": "广州市", "Canton": "广州市",
        "Shenzhen": "深圳市", "shenzhen": "深圳市",
        "Foshan": "佛山市", "foshan": "佛山市",
        "Dongguan": "东莞市", "dongguan": "东莞市",
        "Nanjing": "南京市", "nanjing": "南京市", "Nanking": "南京市",
        "Suzhou": "苏州市", "suzhou": "苏州市",
        "Hangzhou": "杭州市", "hangzhou": "杭州市",
        "Ningbo": "宁波市", "ningbo": "宁波市",
        "Chengdu": "成都市", "chengdu": "成都市",
        "Wuhan": "武汉市", "wuhan": "武汉市",
        "Xi'an": "西安市", "xian": "西安市", "Xian": "西安市",
        "Shenyang": "沈阳市", "shenyang": "沈阳市",
        "Dalian": "大连市", "dalian": "大连市",
        "Jinan": "济南市", "jinan": "济南市",
        "Qingdao": "青岛市", "qingdao": "青岛市",
        "Fuzhou": "福州市", "fuzhou": "福州市",
        "Xiamen": "厦门市", "xiamen": "厦门市",
        "Changsha": "长沙市", "changsha": "长沙市",
        "Hefei": "合肥市", "hefei": "合肥市",
        "Harbin": "哈尔滨市", "harbin": "哈尔滨市",
        "Zhengzhou": "郑州市", "zhengzhou": "郑州市",
        "Kunming": "昆明市", "kunming": "昆明市",
        "Guiyang": "贵阳市", "guiyang": "贵阳市",
        "Nanning": "南宁市", "nanning": "南宁市",
        "Nanchang": "南昌市", "nanchang": "南昌市",
        "北京": "北京市", "上海": "上海市", "天津": "天津市", "重庆": "重庆市",
        "广州": "广州市", "深圳": "深圳市", "成都": "成都市", "武汉": "武汉市"
    };

    function normalizeCityName(cityName) {
        if (!cityName) return null;
        if (CITY_NAME_MAPPING[cityName]) {
            console.log(`📝 城市名映射: ${cityName} → ${CITY_NAME_MAPPING[cityName]}`);
            return CITY_NAME_MAPPING[cityName];
        }
        if (!cityName.endsWith("市")) {
            const withCity = cityName + "市";
            if (CITY_NAME_MAPPING[withCity]) return CITY_NAME_MAPPING[withCity];
        }
        if (cityName.endsWith("市")) {
            const withoutCity = cityName.slice(0, -1);
            if (CITY_NAME_MAPPING[withoutCity]) return CITY_NAME_MAPPING[withoutCity];
        }
        return cityName;
    }

    const AMAP_WEB_KEY = '9364b5b6f74ae2d99320c91c6928b631';

    async function reverseGeocode(lng, lat) {
        const url = `https://restapi.amap.com/v3/geocode/regeo?output=JSON&location=${lng},${lat}&key=${AMAP_WEB_KEY}&radius=1000&extensions=base`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.status === '1' && data.regeocode) {
                const addressComponent = data.regeocode.addressComponent;
                let city = addressComponent.city;
                if (!city || city === '[]' || city === '') {
                    city = addressComponent.province;
                }
                const mappedCity = normalizeCityName(city);
                console.log(`🏙️ 逆地理编码: 原始=${city}, 映射后=${mappedCity}`);
                return { success: true, city: mappedCity || city, province: addressComponent.province };
            }
            return { success: false };
        } catch (error) {
            console.error('逆地理编码失败:', error);
            return { success: false };
        }
    }

    async function getCityByIP() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            let city = data.city;
            const mappedCity = normalizeCityName(city);
            console.log(`🌐 IP定位: 原始=${city}, 映射后=${mappedCity}`);
            return {
                success: true,
                city: mappedCity || city,
                province: data.region,
                lat: data.latitude,
                lng: data.longitude
            };
        } catch (error) {
            return { success: false };
        }
    }

    document.addEventListener('DOMContentLoaded', async function() {
        if (typeof window.provincesCities === 'undefined') {
            document.getElementById('panelMsg').innerHTML = '<i class="fas fa-exclamation-triangle"></i> 数据加载失败，请刷新页面重试';
            document.getElementById('loadingOverlay').style.display = 'none';
            return;
        }

        const provincesCities = window.provincesCities;
        const cityCoordinates = window.cityCoordinates;
        const loadCabinetsDataByCity = window.loadCabinetsDataByCity;
        const getCabinetsData = window.getCabinetsData;

        const provinceList = Object.keys(provincesCities).sort();
        let map, allMarkers = [], currentInfoWindow = null;
        let userMarker = null;

        function initMap() {
            map = new AMap.Map('map', {
                center: [116.4074, 39.9042],
                zoom: 5,
                viewMode: '2D',
                resizeEnable: true
            });

            currentInfoWindow = new AMap.InfoWindow({
                offset: new AMap.Pixel(0, -35),
                isCustom: true,
                autoMove: false
            });

            populateProvinces();
            bindEvents();

            map.on('click', function() {
                if (currentInfoWindow) currentInfoWindow.close();
            });

            map.on('complete', function() {
                console.log('地图加载完成，开始自动定位');
                autoLocateAndLoad();
            });
        }

        // 创建地图标记内容（根据机台类型显示不同颜色）
        function createMarkerContent(cab) {
            const isOnline = cab.status === 'active';
            const isShow = cab.machineType === 1;

            let gradient, icon, shadowColor;

            if (isShow) {
                // 秀机/Show机 - 紫色主题
                gradient = 'linear-gradient(135deg,#c084fc 0%,#9333ea 100%)';
                icon = '<i class="fas fa-star-of-life" style="font-size:12px;"></i>';
                shadowColor = 'rgba(168,85,247,0.8)';
            } else {
                // 一代/二代机 - 蓝色主题
                gradient = 'linear-gradient(135deg,#60a5fa 0%,#3b82f6 100%)';
                icon = '<i class="fas fa-music" style="font-size:12px;"></i>';
                shadowColor = 'rgba(59,130,246,0.6)';
            }

            if (isOnline) {
                return `<div class="custom-marker" style="background:${gradient};color:white;padding:6px 14px;font-size:12px;font-weight:bold;border-radius:30px;box-shadow:0 0 15px ${shadowColor};display:flex;align-items:center;gap:8px;white-space:nowrap;border:1px solid rgba(255,255,255,0.3);cursor:pointer;">${icon}<span>${cab.name.length > 10 ? cab.name.slice(0,10)+'...' : cab.name}</span><i class="fas fa-chevron-right" style="font-size:10px;opacity:0.7;"></i></div>`;
            } else {
                return `<div class="custom-marker" style="background:#4a4a6a;color:#ccc;padding:6px 12px;font-size:11px;border-radius:30px;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;opacity:0.8;"><i class="fas fa-bed" style="font-size:11px;"></i><span>${cab.name.length > 10 ? cab.name.slice(0,10)+'...' : cab.name}</span></div>`;
            }
        }

        // 构建弹窗内容（显示机台类型）
        function buildInfoContent(cab) {
            const isOnline = cab.status === 'active';
            const isShow = cab.machineType === 1;
            const statusClass = isOnline ? 'status-online' : 'status-offline';
            const statusText = isOnline ? '● 在线运营' : '○ 维护中';

            let machineTypeText = '';
            let machineTypeClass = '';
            let machineTypeIcon = '';

            if (isShow) {
                machineTypeText = '🎭 秀机 / Show机';
                machineTypeClass = 'machine-type-show';
                machineTypeIcon = '<i class="fas fa-star-of-life"></i>';
            } else {
                machineTypeText = '🎮 一代/二代机';
                machineTypeClass = 'machine-type-normal';
                machineTypeIcon = '<i class="fas fa-gamepad"></i>';
            }

            // 调试日志
            console.log(`📋 弹窗数据: ${cab.name}, machineType=${cab.machineType}, isShow=${isShow}`);

            return `<div class="custom-infowindow">
                <button class="info-close-btn" onclick="window.closeInfoWindow && window.closeInfoWindow();"><i class="fas fa-times"></i></button>
                <h3><i class="fas fa-dice-d6"></i> ${cab.name}<span class="status-badge ${statusClass}" style="margin-left:8px;">${statusText}</span></h3>
                <div class="detail">
                    ${machineTypeIcon}
                    <span class="status-badge ${machineTypeClass}" style="display:inline-block; padding:2px 10px;">${machineTypeText}</span>
                </div>
                <div class="detail"><i class="fas fa-location-dot"></i><span>${cab.province} · ${cab.city}</span></div>
                <div class="detail"><i class="fas fa-map-pin"></i><span>${cab.address || '地址待补充'}</span></div>
                <div class="badge-custom"><i class="fas fa-clock"></i> 实时数据</div>
            </div>`;
        }

        window.closeInfoWindow = function() {
            if (currentInfoWindow) currentInfoWindow.close();
        };

        function updateMarkers(machines) {
            allMarkers.forEach(m => m.setMap(null));
            allMarkers = [];

            const showCount = machines.filter(m => m.machineType === 1).length;
            const normalCount = machines.filter(m => m.machineType === 0).length;
            console.log(`🎨 更新标记: 秀机=${showCount}, 普通机=${normalCount}`);

            machines.forEach(cab => {
                if (!cab.lat || !cab.lng) return;
                const marker = new AMap.Marker({
                    position: [cab.lng, cab.lat],
                    content: createMarkerContent(cab),
                    offset: new AMap.Pixel(0, -20)
                });
                marker.on('click', function() {
                    currentInfoWindow.setContent(buildInfoContent(cab));
                    currentInfoWindow.open(map, [cab.lng, cab.lat]);
                });
                marker.setMap(map);
                allMarkers.push(marker);
            });
            document.getElementById('totalCountSpan').innerText = machines.length;
        }

        async function loadCityMachines(cityName, updateDropdown = true) {
            if (!cityName) return;

            const finalCity = normalizeCityName(cityName) || cityName;
            console.log(`📌 loadCityMachines 收到: ${cityName} → 最终: ${finalCity}`);

            const coords = cityCoordinates[finalCity];
            if (!coords) {
                console.error(`❌ 未找到城市 ${finalCity} 的坐标`);
                document.getElementById('panelMsg').innerHTML = `<i class="fas fa-exclamation-triangle"></i> 未找到 ${finalCity} 坐标`;
                return false;
            }

            document.getElementById('panelMsg').innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 正在获取 ${finalCity} 机台数据...`;

            try {
                const machines = await loadCabinetsDataByCity(finalCity);
                updateMarkers(machines);

                if (machines.length > 0) {
                    map.setZoomAndCenter(13, coords);
                } else {
                    map.setZoomAndCenter(12, coords);
                }

                if (updateDropdown) {
                    await selectCityInDropdown(finalCity);
                }

                const showCount = machines.filter(m => m.machineType === 1).length;
                const count = machines.length;
                if (count > 0) {
                    document.getElementById('panelMsg').innerHTML = `<i class="fas fa-check-circle"></i> ${finalCity} 共 ${count} 台机台 (秀机: ${showCount}台)`;
                } else {
                    document.getElementById('panelMsg').innerHTML = `<i class="fas fa-info-circle"></i> ${finalCity} 暂无机台数据`;
                }
                return true;
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('panelMsg').innerHTML = `<i class="fas fa-exclamation-triangle"></i> 加载失败，请重试`;
                return false;
            }
        }

        async function autoLocateAndLoad() {
            document.getElementById('loadingOverlay').style.display = 'flex';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const { latitude, longitude } = pos.coords;
                        console.log(`📍 GPS定位成功: ${latitude}, ${longitude}`);

                        if (userMarker) userMarker.setMap(null);
                        userMarker = new AMap.Marker({
                            position: [longitude, latitude],
                            content: `<div style="background:#3b82f6;width:32px;height:32px;border:3px solid white;display:flex;align-items:center;justify-content:center;border-radius:50%;box-shadow:0 0 15px #3b82f6;"><i class="fas fa-user" style="color:white;font-size:14px;"></i></div>`,
                            offset: new AMap.Pixel(0, -16)
                        });
                        userMarker.setMap(map);

                        const geoResult = await reverseGeocode(longitude, latitude);
                        console.log('逆地理编码结果:', geoResult);

                        if (geoResult.success && geoResult.city) {
                            await handleLocatedCity(geoResult.city);
                        } else {
                            await fallbackLocate();
                        }
                    },
                    async (error) => {
                        console.error('GPS定位失败:', error);
                        await fallbackLocate();
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                await fallbackLocate();
            }
        }

        async function fallbackLocate() {
            const ipResult = await getCityByIP();
            if (ipResult.success && ipResult.city) {
                await handleLocatedCity(ipResult.city);
            } else {
                document.getElementById('panelMsg').innerHTML = '<i class="fas fa-map-marker-alt"></i> 定位失败，请手动选择城市';
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        async function handleLocatedCity(cityName) {
            console.log(`🏙️ 处理定位到的城市: ${cityName}`);
            document.getElementById('currentCityName').innerText = cityName;
            document.getElementById('locationTip').style.display = 'block';
            await loadCityMachines(cityName, true);
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        async function selectCityInDropdown(cityName) {
            for (let [province, cities] of Object.entries(provincesCities)) {
                if (cities.includes(cityName)) {
                    const provinceSelect = document.getElementById('provinceSelect');
                    provinceSelect.value = province;
                    onProvinceChangeDirect(province);
                    await new Promise(r => setTimeout(r, 100));
                    const citySelect = document.getElementById('citySelect');
                    if (citySelect.querySelector(`option[value="${cityName}"]`)) {
                        citySelect.value = cityName;
                        return true;
                    }
                }
            }
            return false;
        }

        function onProvinceChangeDirect(prov) {
            const cs = document.getElementById('citySelect');
            if (!prov) {
                cs.disabled = true;
                cs.innerHTML = '<option value="">请先选择省份</option>';
                return;
            }
            const cities = provincesCities[prov] || [];
            cs.disabled = false;
            cs.innerHTML = '<option value="">请选择城市</option>';
            cities.forEach(c => {
                cs.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function populateProvinces() {
            const ps = document.getElementById('provinceSelect');
            ps.innerHTML = '<option value="">请选择省份</option>';
            provinceList.forEach(p => {
                ps.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }

        function onProvinceChange() {
            const prov = document.getElementById('provinceSelect').value;
            const cs = document.getElementById('citySelect');
            if (!prov) {
                cs.disabled = true;
                cs.innerHTML = '<option value="">请先选择省份</option>';
                return;
            }
            const cities = provincesCities[prov] || [];
            cs.disabled = false;
            cs.innerHTML = '<option value="">请选择城市</option>';
            cities.forEach(c => {
                cs.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function onCityChange() {
            const city = document.getElementById('citySelect').value;
            if (!city) return;
            loadCityMachines(city, false);
        }

        function resetView() {
            map.setZoomAndCenter(5, [116.4074, 39.9042]);
            document.getElementById('provinceSelect').value = "";
            document.getElementById('citySelect').disabled = true;
            document.getElementById('citySelect').innerHTML = '<option value="">请先选择省份</option>';
            document.getElementById('locationTip').style.display = 'none';
            if (currentInfoWindow) currentInfoWindow.close();
        }

        async function reLocate() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            if (currentInfoWindow) currentInfoWindow.close();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const { latitude, longitude } = pos.coords;
                        map.setZoomAndCenter(14, [longitude, latitude]);

                        if (userMarker) userMarker.setMap(null);
                        userMarker = new AMap.Marker({
                            position: [longitude, latitude],
                            content: `<div style="background:#3b82f6;width:32px;height:32px;border:3px solid white;display:flex;align-items:center;justify-content:center;border-radius:50%;box-shadow:0 0 15px #3b82f6;"><i class="fas fa-user" style="color:white;font-size:14px;"></i></div>`,
                            offset: new AMap.Pixel(0, -16)
                        });
                        userMarker.setMap(map);

                        const geoResult = await reverseGeocode(longitude, latitude);
                        if (geoResult.success && geoResult.city) {
                            await handleLocatedCity(geoResult.city);
                        } else {
                            await fallbackLocate();
                        }
                    },
                    async () => { await fallbackLocate(); }
                );
            } else {
                await fallbackLocate();
            }
        }

        function bindEvents() {
            document.getElementById('provinceSelect').addEventListener('change', onProvinceChange);
            document.getElementById('citySelect').addEventListener('change', onCityChange);
            document.getElementById('myLocationBtn').addEventListener('click', reLocate);
            document.getElementById('resetViewBtn').addEventListener('click', resetView);
        }

        const style = document.createElement('style');
        style.textContent = `@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } } .custom-marker { transition: all 0.2s ease; } .custom-marker:hover { transform: translateY(-2px); filter: brightness(1.1); }`;
        document.head.appendChild(style);

        initMap();
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
    document.addEventListener('keydown', e => { if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) e.preventDefault(); });
</script>
</body>
</html>
