<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>自制谱兑换码生成</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e6e6e6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4cc9f0, #4361ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            flex: 1;
            min-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4cc9f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            font-size: 1.3rem;
        }

        .status-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 25px;
        }

        .status-item {
            background: rgba(76, 201, 240, 0.1);
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            min-width: 200px;
        }

        .status-label {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4cc9f0;
        }

        .status-value.success {
            color: #4ade80;
        }

        .status-value.error {
            color: #f87171;
        }

        .status-value.warning {
            color: #fbbf24;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0c0;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #e6e6e6;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4cc9f0;
            box-shadow: 0 0 0 2px rgba(76, 201, 240, 0.2);
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(90deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn:hover {
            background: linear-gradient(90deg, #3a0ca3, #4361ee);
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary {
            background: linear-gradient(90deg, #4cc9f0, #4361ee);
            width: 100%;
            margin-top: 10px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            width: 100%;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
            width: auto;
            margin-top: 0;
        }

        .result-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            min-height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-title {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #a0a0c0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #result-content {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e6e6e6;
            line-height: 1.5;
        }

        .result-success-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .success-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .result-success-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #4ade80;
        }

        .result-success-subtitle {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-top: 3px;
        }

        .result-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .result-info-item {
            background: rgba(76, 201, 240, 0.1);
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #4cc9f0;
        }

        .result-info-label {
            font-size: 0.8rem;
            color: #a0a0c0;
            margin-bottom: 3px;
        }

        .result-info-value {
            font-size: 1rem;
            font-weight: 600;
            color: #e6e6e6;
        }

        .result-info-value.highlight {
            color: #4cc9f0;
        }

        .code-card {
            background: linear-gradient(135deg, rgba(76, 201, 240, 0.1), rgba(67, 97, 238, 0.1));
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(76, 201, 240, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .code-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(76, 201, 240, 0.15);
        }

        .code-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .code-title {
            font-size: 1rem;
            font-weight: 600;
            color: #4cc9f0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .code-value {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #4ade80;
            text-align: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            margin: 8px 0;
            word-break: break-all;
            letter-spacing: 0.5px;
            border: 1px dashed rgba(76, 201, 240, 0.3);
        }

        .single-code-container {
            text-align: center;
            margin: 15px 0;
        }

        .single-code-label {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-bottom: 8px;
        }

        .single-code-value {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.5rem;
            font-weight: 800;
            color: #4ade80;
            padding: 15px;
            background: linear-gradient(135deg, rgba(76, 201, 240, 0.1), rgba(67, 97, 238, 0.1));
            border-radius: 10px;
            margin: 12px auto;
            max-width: 600px;
            word-break: break-all;
            letter-spacing: 1px;
            border: 2px dashed rgba(76, 201, 240, 0.4);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.9rem;
        }

        .copy-btn {
            background: linear-gradient(90deg, #4cc9f0, #4361ee);
            color: white;
        }

        .copy-btn:hover {
            background: linear-gradient(90deg, #4361ee, #4cc9f0);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 201, 240, 0.3);
        }

        .export-btn {
            background: rgba(76, 201, 240, 0.1);
            color: #4cc9f0;
            border: 1px solid rgba(76, 201, 240, 0.3);
        }

        .export-btn:hover {
            background: rgba(76, 201, 240, 0.2);
            transform: translateY(-2px);
        }

        .expire-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #a0a0c0;
        }

        .expire-info i {
            color: #4cc9f0;
        }

        .music-select-container {
            margin-bottom: 20px;
        }

        .music-list {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
        }

        .music-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .music-item:hover {
            background: rgba(76, 201, 240, 0.1);
        }

        .music-item.selected {
            background: rgba(76, 201, 240, 0.2);
            border-left: 3px solid #4cc9f0;
        }

        .music-checkbox {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .music-info {
            flex: 1;
        }

        .music-id {
            font-weight: bold;
            color: #4cc9f0;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }

        .music-name {
            font-size: 1rem;
            color: #e6e6e6;
            font-weight: 500;
        }

        .selected-count {
            font-size: 0.9rem;
            color: #4ade80;
            margin-top: 10px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #a0a0c0;
        }

        .loading i {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #4cc9f0;
        }

        .empty-message {
            text-align: center;
            padding: 20px;
            color: #a0a0c0;
            font-style: italic;
        }

        .music-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .music-list-actions {
            display: flex;
            gap: 10px;
        }

        .expire-type-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .expire-type-wrapper {
            display: flex;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 10px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            flex: 1;
        }

        .expire-value-input {
            width: 80px;
            padding: 12px 15px;
            background: transparent;
            border: none;
            color: #e6e6e6;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .expire-value-input.hidden {
            display: none;
        }

        .expire-type-select {
            flex: 1;
            padding: 12px 15px;
            background: transparent;
            border: none;
            color: #e6e6e6;
            font-size: 1rem;
            cursor: pointer;
        }

        .onecode-option {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .onecode-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #e6e6e6;
        }

        .onecode-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .onecode-description {
            font-size: 0.9rem;
            color: #a0a0c0;
            margin-top: 8px;
            margin-left: 30px;
        }

        .code-count-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #e6e6e6;
            font-size: 1rem;
        }

        /* 日志区域隐藏 */
        .logs-container {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-home-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #1e90ff, #0066cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 6px 20px rgba(30, 144, 255, 0.4);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.25);
        }

        .back-home-btn .material-icons {
            color: white;
            font-size: 26px;
            font-weight: bold;
        }

        .back-home-btn:hover {
            transform: translateY(-2px) scale(1.08);
        }

        .user-info-card {
            background: rgba(76, 201, 240, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(76, 201, 240, 0.3);
        }

        .user-info-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            overflow: hidden;
            flex-shrink: 0;
        }

        .user-avatar-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info-details {
            flex: 1;
        }

        .user-info-details h4 {
            font-size: 1.1rem;
            color: #e6e6e6;
            margin-bottom: 5px;
        }

        .user-info-details p {
            font-size: 0.85rem;
            color: #a0a0c0;
        }

        .login-required {
            text-align: center;
            padding: 40px 20px;
        }

        .login-required i {
            font-size: 3rem;
            color: #fbbf24;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .music-list-header { flex-direction: column; align-items: flex-start; }
            .music-list-actions { width: 100%; justify-content: space-between; }
            .expire-type-container { flex-direction: column; }
            .expire-type-wrapper { flex-direction: column; }
            .expire-value-input { width: 100%; border-radius: 8px 8px 0 0; }
            .expire-type-select { border-radius: 0 0 8px 8px; }
            .back-home-btn { top: 15px; right: 20px; width: 48px; height: 48px; }
            .back-home-btn .material-icons { font-size: 22px; }
            .user-info-header { gap: 12px; }
            .user-avatar-icon { width: 45px; height: 45px; font-size: 1.2rem; }
        }
    </style>
</head>

<body>
<div class="back-home-btn" onclick="window.location.href='../index.html'">
    <span class="material-icons">←</span>
</div>

<div class="container">
    <header>
        <h1>舞立方自制谱兑换码生成</h1>
    </header>

    <div class="main-content">
        <div class="card">
            <h2 class="card-title"><i class="fas fa-user-circle"></i> 登录用户信息</h2>
            <div id="user-status-area"></div>

            <h2 class="card-title" style="margin-top: 20px;"><i class="fas fa-code"></i> 兑换码生成</h2>
            <p>选择谱面并设置有效期，生成自制谱兑换码</p>

            <div class="music-select-container">
                <div class="music-list-header">
                    <label><i class="fas fa-music"></i> 选择谱面（可多选）</label>
                    <div class="music-list-actions">
                        <button class="btn btn-small btn-secondary" id="refresh-music-btn" disabled><i class="fas fa-sync-alt"></i> 刷新</button>
                        <button class="btn btn-small btn-secondary" id="select-all-btn" disabled><i class="fas fa-check-square"></i> 全选</button>
                        <button class="btn btn-small btn-secondary" id="clear-selection-btn" disabled><i class="fas fa-times"></i> 清空</button>
                    </div>
                </div>
                <div class="music-list" id="music-list">
                    <div class="empty-message"><i class="fas fa-music"></i><br>请先登录并加载谱面列表</div>
                </div>
                <div class="selected-count" id="selected-count">已选择: 0 个谱面</div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> 有效期设置</label>
                <div class="expire-type-container">
                    <div class="expire-type-wrapper">
                        <input type="number" id="expire-value" class="expire-value-input" min="1" max="99" value="1">
                        <select id="expire-type" class="expire-type-select">
                            <option value="times">次</option>
                            <option value="minutes">分钟</option>
                            <option value="hours">小时</option>
                            <option value="day" selected>天</option>
                            <option value="week">周</option>
                            <option value="season">季</option>
                            <option value="year">年</option>
                            <option value="forever">永久</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-hashtag"></i> 生成数量</label>
                <input type="number" id="code-count" class="code-count-input" min="1" value="1" disabled>
                <div class="expire-info"><i class="fas fa-info-circle"></i> <span id="code-count-info">最多可生成 -- 个</span></div>
            </div>

            <div class="onecode-option">
                <label class="onecode-label">
                    <input type="checkbox" id="onecode-checkbox" class="onecode-checkbox" disabled>
                    <span>一个兑换码兑换全部选中的歌曲</span>
                </label>
                <div class="onecode-description">开启后，所有选中歌曲使用同一个兑换码，生成数量固定为1</div>
            </div>

            <div class="status-info">
                <div class="status-item">
                    <div class="status-label">剩余发码次数</div>
                    <div class="status-value" id="remain-times">--</div>
                </div>
                <div class="status-item">
                    <div class="status-label">谱面总数</div>
                    <div class="status-value" id="music-count">--</div>
                </div>
            </div>

            <div class="form-group">
                <button class="btn btn-primary" id="check-remain-btn" disabled><i class="fas fa-sync-alt"></i> 查询剩余次数</button>
                <button class="btn btn-primary" id="generate-code-btn" disabled><i class="fas fa-key"></i> 生成兑换码</button>
            </div>

            <div class="result-container">
                <div class="result-title"><i class="fas fa-gift"></i> 生成结果</div>
                <div id="result-content">暂无兑换码生成</div>
            </div>
        </div>
    </div>

    <footer>
        <p>自制谱兑换码生成工具 - 由妙妙-Mouseke开发 | 数据仅保存在浏览器中</p>
    </footer>
</div>

<script>
    // 全局变量
    let userToken = '';
    let userInfo = null;
    let musicList = [];
    let selectedMusicIds = new Set();
    const API_BASE = 'https://dancedemo.shenghuayule.com/Dance';

    // DOM 元素
    const userStatusArea = document.getElementById('user-status-area');
    const checkRemainBtn = document.getElementById('check-remain-btn');
    const generateCodeBtn = document.getElementById('generate-code-btn');
    const refreshMusicBtn = document.getElementById('refresh-music-btn');
    const selectAllBtn = document.getElementById('select-all-btn');
    const clearSelectionBtn = document.getElementById('clear-selection-btn');
    const remainTimes = document.getElementById('remain-times');
    const musicCount = document.getElementById('music-count');
    const musicListContainer = document.getElementById('music-list');
    const selectedCountSpan = document.getElementById('selected-count');
    const expireTypeSelect = document.getElementById('expire-type');
    const expireValueInput = document.getElementById('expire-value');
    const onecodeCheckbox = document.getElementById('onecode-checkbox');
    const resultContent = document.getElementById('result-content');
    const codeCountInput = document.getElementById('code-count');
    const codeCountInfo = document.getElementById('code-count-info');

    // 控制有效期数值输入框显示/隐藏
    function updateExpireValueVisibility() {
        const isForever = expireTypeSelect.value === 'forever';
        if (isForever) {
            expireValueInput.classList.add('hidden');
            expireValueInput.style.display = 'none';
        } else {
            expireValueInput.classList.remove('hidden');
            expireValueInput.style.display = 'block';
        }
    }

    // 从 localStorage 读取登录信息
    function loadUserFromStorage() {
        try {
            const savedUserData = localStorage.getItem('dance_user_data');
            const savedTokenData = localStorage.getItem('dance_user_token');

            if (!savedUserData || !savedTokenData) {
                return false;
            }

            const userData = JSON.parse(savedUserData);
            const tokenData = JSON.parse(savedTokenData);

            if (tokenData.expireTime) {
                const now = new Date();
                const expireTime = new Date(tokenData.expireTime);
                if (now > expireTime) {
                    return false;
                }
            }

            userInfo = userData;
            userToken = tokenData.token || '';
            return true;
        } catch (e) {
            console.error('解析登录数据失败:', e);
            return false;
        }
    }

    // 显示用户信息（带头像）
    function displayUserInfo() {
        if (userInfo && userToken) {
            const displayName = userInfo.UserName || userInfo.username || userInfo.nickname || '微信用户';
            const displayId = userInfo.UserID || userInfo.userId || userInfo.id || '未知';
            const avatarUrl = userInfo.HeadimgURL || userInfo.headimgurl || userInfo.avatar || null;

            // 生成头像HTML
            let avatarHtml = '';
            if (avatarUrl && avatarUrl.trim() !== '') {
                avatarHtml = `<img src="${escapeHtml(avatarUrl)}" alt="头像" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-user-circle\'></i>';">`;
            } else {
                avatarHtml = `<i class="fas fa-user-circle"></i>`;
            }

            userStatusArea.innerHTML = `
                <div class="user-info-card">
                    <div class="user-info-header">
                        <div class="user-avatar-icon">
                            ${avatarHtml}
                        </div>
                        <div class="user-info-details">
                            <h4>${escapeHtml(displayName)}</h4>
                            <p>用户ID: ${escapeHtml(displayId)}</p>
                            <p style="font-size:0.75rem; margin-top:5px;"><i class="fas fa-check-circle" style="color:#4ade80;"></i> 已登录，可使用兑换码功能</p>
                        </div>
                    </div>
                </div>
            `;
            return true;
        } else {
            userStatusArea.innerHTML = `
                <div class="login-required">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>请先返回首页使用微信登录</p>
                    <button onclick="window.location.href='../index.html'" class="btn btn-primary" style="margin-top:15px; display:inline-block; width:auto;">
                        <i class="fas fa-home"></i> 返回首页登录
                    </button>
                </div>
            `;
            return false;
        }
    }

    // 启用功能按钮
    function enableFeatures() {
        checkRemainBtn.disabled = false;
        refreshMusicBtn.disabled = false;
        selectAllBtn.disabled = false;
        clearSelectionBtn.disabled = false;
        onecodeCheckbox.disabled = false;
        expireTypeSelect.disabled = false;
        expireValueInput.disabled = false;
        codeCountInput.disabled = false;
    }

    // 禁用功能按钮
    function disableFeatures() {
        checkRemainBtn.disabled = true;
        refreshMusicBtn.disabled = true;
        selectAllBtn.disabled = true;
        clearSelectionBtn.disabled = true;
        onecodeCheckbox.disabled = true;
        expireTypeSelect.disabled = true;
        expireValueInput.disabled = true;
        codeCountInput.disabled = true;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 日志功能保留但不在页面显示（控制台输出）
    function addLog(message, type = 'info') {
        const now = new Date();
        const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        console.log(`[${time}] [${type.toUpperCase()}] ${message}`);
    }

    function extractMusicId(music) {
        const fields = ['MusicID', 'musicId', 'GoodsID', 'ID', 'id', 'Id', 'songId', 'SongID'];
        for (const f of fields) {
            if (music[f] !== undefined && music[f] !== null && music[f] !== '') return String(music[f]);
        }
        return null;
    }

    function extractMusicName(music) {
        if (music.Name) return String(music.Name);
        const fields = ['name', 'Title', 'title', 'songName', 'SongName', 'musicName', 'MusicName'];
        for (const f of fields) {
            if (music[f]) return String(music[f]);
        }
        if (music.GoodsIntro) return String(music.GoodsIntro);
        return '未知谱面';
    }

    function renderMusicList() {
        if (!musicList.length) {
            musicListContainer.innerHTML = `<div class="empty-message"><i class="fas fa-music"></i><br>暂无发布的谱面</div>`;
            return;
        }
        musicListContainer.innerHTML = '';
        musicList.forEach(music => {
            const musicId = extractMusicId(music);
            const musicName = extractMusicName(music);
            if (!musicId) return;
            const isSelected = selectedMusicIds.has(musicId);
            const item = document.createElement('div');
            item.className = `music-item ${isSelected ? 'selected' : ''}`;
            item.dataset.id = musicId;
            item.innerHTML = `
                <input type="checkbox" class="music-checkbox" ${isSelected ? 'checked' : ''}>
                <div class="music-info">
                    <div class="music-id">ID: ${musicId}</div>
                    <div class="music-name">${escapeHtml(musicName)}</div>
                </div>
            `;
            const cb = item.querySelector('.music-checkbox');
            cb.addEventListener('click', (e) => { e.stopPropagation(); toggleMusic(musicId, cb.checked); });
            item.addEventListener('click', (e) => { if (e.target !== cb) { cb.checked = !isSelected; toggleMusic(musicId, cb.checked); } });
            musicListContainer.appendChild(item);
        });
        updateSelectedCount();
    }

    function toggleMusic(musicId, isSelected) {
        if (isSelected) selectedMusicIds.add(musicId);
        else selectedMusicIds.delete(musicId);
        const item = document.querySelector(`.music-item[data-id="${musicId}"]`);
        if (item) item.classList.toggle('selected', isSelected);
        updateSelectedCount();
        updateCodeCount();
    }

    function selectAllMusic() {
        selectedMusicIds.clear();
        musicList.forEach(m => { const id = extractMusicId(m); if (id) selectedMusicIds.add(id); });
        renderMusicList();
        addLog(`已全选 ${selectedMusicIds.size} 个谱面`, 'info');
    }

    function clearMusicSelection() {
        selectedMusicIds.clear();
        renderMusicList();
        addLog('已清空谱面选择', 'info');
    }

    function updateSelectedCount() {
        selectedCountSpan.textContent = `已选择: ${selectedMusicIds.size} 个谱面`;
        generateCodeBtn.disabled = selectedMusicIds.size === 0;
        updateCodeCount();
    }

    function updateCodeCount() {
        const onecode = onecodeCheckbox.checked;
        const selectedCnt = selectedMusicIds.size;
        const remain = parseInt(remainTimes.textContent);
        let maxCodes = 0;

        if (onecode) {
            maxCodes = selectedCnt > 0 ? 1 : 0;
            codeCountInput.value = 1;
            codeCountInput.disabled = true;
        } else {
            if (selectedCnt === 0) maxCodes = 0;
            else if (selectedCnt === 1) maxCodes = isNaN(remain) ? 1 : remain;
            else maxCodes = isNaN(remain) ? 0 : Math.floor(remain / selectedCnt);
            codeCountInput.disabled = false;
            let cur = parseInt(codeCountInput.value);
            if (isNaN(cur) || cur < 1) cur = 1;
            if (cur > maxCodes && maxCodes > 0) cur = maxCodes;
            if (maxCodes === 0) cur = 0;
            codeCountInput.value = cur;
        }
        codeCountInput.max = maxCodes;
        const infoText = maxCodes === 0 ? '请先选择谱面并查询剩余次数' : `最多可生成 ${maxCodes} 个`;
        codeCountInfo.innerHTML = `<i class="fas fa-info-circle"></i> ${infoText}`;
    }

    async function loadMusicList() {
        if (!userToken) {
            addLog('未获取到Token，请重新登录', 'warning');
            return;
        }
        try {
            addLog('正在加载谱面列表...', 'info');
            refreshMusicBtn.disabled = true;
            refreshMusicBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中';
            musicListContainer.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i><br>加载中...</div>`;

            const res = await fetch(`${API_BASE}/api/MusicData/GetMyPublishMusic?page=1&pagesize=9999`, {
                headers: { 'Authorization': `Bearer ${userToken}`, 'Accept': 'application/json' }
            });

            if (res.status === 401) throw new Error('Token无效，请重新登录');
            if (!res.ok) throw new Error(`请求失败: ${res.status}`);

            const data = await res.json();
            let extracted = [];
            if (Array.isArray(data)) extracted = data;
            else if (data.data && Array.isArray(data.data)) extracted = data.data;
            else if (data.list && Array.isArray(data.list)) extracted = data.list;
            else if (data.records && Array.isArray(data.records)) extracted = data.records;
            else {
                for (let k in data) {
                    if (Array.isArray(data[k])) { extracted = data[k]; break; }
                }
            }
            musicList = extracted;
            musicCount.textContent = musicList.length;
            addLog(`加载成功，共 ${musicList.length} 个谱面`, 'success');
            renderMusicList();
        } catch (err) {
            addLog(`加载失败: ${err.message}`, 'error');
            musicListContainer.innerHTML = `<div class="empty-message"><i class="fas fa-exclamation-triangle"></i><br>${escapeHtml(err.message)}</div>`;
        } finally {
            refreshMusicBtn.disabled = false;
            refreshMusicBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 刷新';
        }
    }

    async function checkRemainTimes() {
        if (!userToken) {
            addLog('请先登录', 'warning');
            return;
        }
        try {
            addLog('查询剩余次数...', 'info');
            checkRemainBtn.disabled = true;
            checkRemainBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 查询中';
            remainTimes.textContent = '查询中';

            const res = await fetch(`${API_BASE}/api/MusicData/GetCodeRemainTimes`, {
                headers: { 'Authorization': `Bearer ${userToken}`, 'Accept': 'application/json' }
            });
            if (res.status === 401) throw new Error('Token无效');
            if (!res.ok) throw new Error(`查询失败: ${res.status}`);

            const data = await res.json();
            const remain = data.Remain || data.remain || data.count || data.times;
            if (remain !== undefined) {
                remainTimes.textContent = remain;
                remainTimes.className = 'status-value success';
                addLog(`剩余次数: ${remain}`, 'success');
            } else {
                remainTimes.textContent = '未知';
                addLog('返回数据格式异常', 'warning');
            }
        } catch (err) {
            remainTimes.textContent = '失败';
            remainTimes.className = 'status-value error';
            addLog(`查询失败: ${err.message}`, 'error');
        } finally {
            checkRemainBtn.disabled = false;
            checkRemainBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 查询剩余次数';
            updateCodeCount();
        }
    }

    function getExpireUnitType(type) {
        const map = { 'forever': 0, 'times': 1, 'day': 2, 'week': 3, 'month': 4, 'season': 5, 'year': 6, 'minutes': 7, 'hours': 8 };
        return map[type] || 2;
    }

    function getExpireText() {
        const type = expireTypeSelect.value;
        if (type === 'forever') return '永久';
        const val = expireValueInput.value;
        const names = { 'times':'次', 'minutes':'分钟', 'hours':'小时', 'day':'天', 'week':'周', 'season':'季', 'year':'年' };
        return `${val}${names[type] || '天'}`;
    }

    function buildRequestBody() {
        const isForever = expireTypeSelect.value === 'forever';
        const duration = isForever ? 1 : Math.max(1, parseInt(expireValueInput.value) || 1);
        const unit = isForever ? 0 : getExpireUnitType(expireTypeSelect.value);
        const onecode = onecodeCheckbox.checked;
        const count = parseInt(codeCountInput.value) || 1;
        const body = [];
        for (let id of selectedMusicIds) {
            if (onecode) {
                body.push({ "MusicID": parseInt(id), "ExpireDuration": duration, "ExpireUnitType": unit });
            } else {
                body.push({ "MusicID": parseInt(id), "Count": count, "ExpireDuration": duration, "ExpireUnitType": unit });
            }
        }
        return body;
    }

    function findAllCodes(obj, result = []) {
        if (!obj || typeof obj !== 'object') return result;
        const fields = ['code', 'Code', 'redeemCode', 'RedeemCode', 'CDKey', 'cdkey', 'key', 'Key'];
        for (let f of fields) {
            if (obj[f] && typeof obj[f] === 'string' && !result.includes(obj[f])) result.push(obj[f]);
        }
        if (Array.isArray(obj)) obj.forEach(v => findAllCodes(v, result));
        else for (let k in obj) if (obj[k] && typeof obj[k] === 'object') findAllCodes(obj[k], result);
        return result;
    }

    async function generateCodes() {
        if (!userToken) { addLog('请先登录', 'warning'); return; }
        if (selectedMusicIds.size === 0) { addLog('请至少选择一个谱面', 'warning'); return; }

        const onecode = onecodeCheckbox.checked;
        const count = parseInt(codeCountInput.value) || 1;
        const expireText = getExpireText();

        try {
            addLog(`开始生成 - 模式:${onecode ? '通用码' : '单独'}, 数量:${count}`, 'info');
            generateCodeBtn.disabled = true;
            generateCodeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中';

            await checkRemainTimes();
            const remain = parseInt(remainTimes.textContent);
            let need = onecode ? 1 : (count * selectedMusicIds.size);
            if (isNaN(remain) || remain < need) throw new Error(`次数不足，需要${need}次，剩余${remain || 0}次`);

            const body = buildRequestBody();
            const url = onecode ? `${API_BASE}/api/MusicData/GetAllMusicCodes?onecode=true` : `${API_BASE}/api/MusicData/GetAllMusicCodes`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${userToken}`, 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(body)
            });
            const text = await res.text();
            let data;
            try { data = text ? JSON.parse(text) : {}; } catch(e) { data = { raw: text }; }
            if (!res.ok) throw new Error(`接口错误 ${res.status}: ${text.substring(0,200)}`);

            const codes = findAllCodes(data);
            if (!codes.length) throw new Error('未获取到兑换码');

            let displayCodes = onecode ? [codes[0]] : codes.slice(0, count * selectedMusicIds.size);
            showResult(displayCodes, expireText, onecode, count);
            addLog(`生成成功，共${displayCodes.length}个兑换码`, 'success');
            setTimeout(() => checkRemainTimes(), 1000);
        } catch (err) {
            addLog(`生成失败: ${err.message}`, 'error');
            resultContent.innerHTML = `<div class="empty-message"><i class="fas fa-exclamation-triangle"></i><br>${escapeHtml(err.message)}</div>`;
        } finally {
            generateCodeBtn.disabled = selectedMusicIds.size === 0;
            generateCodeBtn.innerHTML = '<i class="fas fa-key"></i> 生成兑换码';
        }
    }

    function showResult(codes, expireText, onecode, count) {
        let html = `
            <div class="result-success-header">
                <div class="success-icon"><i class="fas fa-check"></i></div>
                <div><div class="result-success-title">生成成功</div><div class="result-success-subtitle">${codes.length} 个兑换码</div></div>
            </div>
            <div class="result-info-grid">
                <div class="result-info-item"><div class="result-info-label">模式</div><div class="result-info-value highlight">${onecode ? '通用码' : '单独生成'}</div></div>
                <div class="result-info-item"><div class="result-info-label">有效期</div><div class="result-info-value highlight">${expireText}</div></div>
                <div class="result-info-item"><div class="result-info-label">时间</div><div class="result-info-value">${new Date().toLocaleString()}</div></div>
            </div>
        `;
        if (onecode && selectedMusicIds.size > 0) {
            html += `<div class="single-code-container"><div class="single-code-label">通用兑换码</div><div class="single-code-value">${codes[0]}</div></div>`;
        } else {
            html += `<div style="margin:20px 0;"><div style="color:#4cc9f0;margin-bottom:15px;">兑换码列表:</div>`;
            codes.forEach((c, i) => {
                html += `<div class="code-card"><div class="code-card-header"><div class="code-title">兑换码 ${i+1}</div></div><div class="code-value">${c}</div></div>`;
            });
            html += `</div>`;
        }
        const allCodes = codes.join('\n');
        html += `<div class="action-buttons">
            <button id="copyBtn" class="action-btn copy-btn"><i class="fas fa-copy"></i> 复制全部</button>
            <button id="exportBtn" class="action-btn export-btn"><i class="fas fa-download"></i> 导出文件</button>
        </div>`;
        resultContent.innerHTML = html;
        document.getElementById('copyBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(allCodes).then(() => addLog('已复制', 'success')).catch(() => addLog('复制失败', 'error'));
        });
        document.getElementById('exportBtn')?.addEventListener('click', () => {
            const blob = new Blob([allCodes], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `兑换码_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(a.href);
            addLog('已导出文件', 'success');
        });
    }

    // 初始化
    function init() {
        const loggedIn = loadUserFromStorage();
        displayUserInfo();

        // 初始化有效期输入框显示状态
        updateExpireValueVisibility();

        if (loggedIn && userToken) {
            enableFeatures();
            addLog(`用户已登录: ${userInfo?.UserName || userInfo?.username || '用户'}`, 'success');
            loadMusicList();
            checkRemainTimes();
        } else {
            disableFeatures();
            addLog('未检测到登录信息，请返回首页登录', 'warning');
        }

        // 绑定事件
        checkRemainBtn.addEventListener('click', checkRemainTimes);
        generateCodeBtn.addEventListener('click', generateCodes);
        refreshMusicBtn.addEventListener('click', loadMusicList);
        selectAllBtn.addEventListener('click', selectAllMusic);
        clearSelectionBtn.addEventListener('click', clearMusicSelection);
        expireTypeSelect.addEventListener('change', () => {
            updateExpireValueVisibility();
            updateCodeCount();
        });
        expireValueInput.addEventListener('input', () => updateCodeCount());
        onecodeCheckbox.addEventListener('change', () => updateCodeCount());
        codeCountInput.addEventListener('input', () => updateCodeCount());
    }

    init();

    // 安全措施
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) e.preventDefault();
    });
</script>
</body>
</html>
