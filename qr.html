<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>精准扫描仪 - 框内识别</title>
    <!-- html5-qrcode 核心库 -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动影响界面 */
        }

        body {
            background: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 专业头部区域 */
        .scanner-header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            z-index: 20;
        }
        .scanner-header h1 {
            color: #0ff;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .scanner-header p {
            color: #8aa0b0;
            font-size: 0.7rem;
            margin-top: 4px;
        }

        /* 相机容器：绝对填充分配剩余空间，确保视频流填满 */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            min-height: 0;  /* flex限制溢出 */
        }

        #reader {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #000;
        }

        /* 重要！强制让video元素覆盖全屏并居中裁剪，但是实际视频会被html5-qrcode自动填充，
           我们通过transform-style保持比例，但核心是必须让扫描框完全对应视频画面内部区域。
           额外添加一个遮罩层 + 扫描框，并且确保扫描框区域可见，外部半透明，这样用户自然对准框内。 */
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        /* 扫描框外全屏半透明层，突出框内区域 (周围压暗) */
        .scan-framebox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 28px;
            /* 核心视觉: 边框发光 + 外侧漆黑遮罩 */
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(0, 255, 255, 0.9);
            transition: all 0.2s;
        }

        /* 四角装饰增强科技感 */
        .scan-framebox::before,
        .scan-framebox::after,
        .corner-tl,
        .corner-br {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: #0ff;
            border-style: solid;
            box-shadow: 0 0 6px cyan;
        }
        .scan-framebox::before {
            top: -2px;
            left: -2px;
            border-width: 4px 0 0 4px;
            border-radius: 4px 0 0 0;
        }
        .scan-framebox::after {
            top: -2px;
            right: -2px;
            border-width: 4px 4px 0 0;
            border-radius: 0 4px 0 0;
        }
        .corner-tl {
            bottom: -2px;
            left: -2px;
            border-width: 0 0 4px 4px;
            border-radius: 0 0 0 4px;
        }
        .corner-br {
            bottom: -2px;
            right: -2px;
            border-width: 0 4px 4px 0;
            border-radius: 0 0 4px 0;
        }

        /* 扫描线特效：在框内上下移动，增加引导 */
        .scan-line-effect {
            position: absolute;
            top: 0;
            left: 8px;
            width: calc(100% - 16px);
            height: 3px;
            background: linear-gradient(90deg, transparent, #0ff, #0ff, transparent);
            border-radius: 4px;
            filter: drop-shadow(0 0 3px cyan);
            animation: scanMoveVertical 2.2s ease-in-out infinite;
            opacity: 0.85;
        }

        @keyframes scanMoveVertical {
            0% { top: 6px; opacity: 0.6; }
            50% { top: calc(100% - 12px); opacity: 1; }
            100% { top: 6px; opacity: 0.6; }
        }

        .scan-tip {
            position: absolute;
            bottom: -40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ccf6ff;
            font-size: 0.7rem;
            font-weight: 500;
            text-shadow: 0 0 3px #00aaff;
            letter-spacing: 0.5px;
            background: transparent;
        }

        /* 底部控制区 */
        .control-bar {
            background: rgba(10, 10, 18, 0.95);
            backdrop-filter: blur(12px);
            padding: 14px 16px 20px;
            border-top: 1px solid rgba(0, 255, 255, 0.25);
            z-index: 20;
        }

        .status-area {
            background: rgba(0, 20, 30, 0.7);
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #eef;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            box-shadow: 0 0 5px #0f0;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8);}
            50% { opacity: 1; transform: scale(1.2);}
        }

        .result-box {
            background: rgba(13, 20, 30, 0.9);
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 4px solid #0ff;
            backdrop-filter: blur(4px);
            display: none;
        }
        .result-label {
            font-size: 0.7rem;
            color: #0ff;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .result-text {
            color: white;
            font-size: 0.85rem;
            word-break: break-all;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 44px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #2a2a3a;
            color: #ddd;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: #0a7b8c;
            color: white;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .error-tip, .info-tip {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
            padding: 8px;
            border-radius: 30px;
        }
        .error-tip {
            background: #2a1010cc;
            color: #ffaa99;
        }
        .info-tip {
            background: #1a2a3acc;
            color: #aaffff;
        }

        .permission-guide {
            background: #0a2a2ae6;
            border: 1px solid #0ff;
            margin-top: 12px;
            padding: 12px;
            border-radius: 20px;
            display: none;
            font-size: 0.7rem;
        }
        .guide-step {
            color: #0ff;
            font-weight: bold;
        }

        /* 横屏适配时扫描框略微缩小但仍然明显居中 */
        @media (orientation: landscape) and (max-height: 500px) {
            .scan-framebox {
                width: 220px;
                height: 220px;
            }
            .scan-tip {
                bottom: -32px;
                font-size: 0.65rem;
            }
        }

        /* 确保 video 元素完全填充容器且不缩放变形，并且html5-qrcode内部会自动处理比例，没有问题
           额外修复安卓/iOS全屏下显示异常 */
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            position: absolute !important;
        }
    </style>
</head>
<body>
<div class="scanner-header">
    <h1>🔍 精准扫描器</h1>
    <p>请将二维码对准中央扫描框 · 自动识别</p>
</div>

<div class="video-container">
    <div id="reader"></div>
    <div class="scan-overlay">
        <div class="scan-framebox">
            <div class="corner-tl"></div>
            <div class="corner-br"></div>
            <div class="scan-line-effect"></div>
            <div class="scan-tip">📌 二维码置于框内</div>
        </div>
    </div>
</div>

<div class="control-bar">
    <div class="status-area">
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusMsg">相机准备</span>
        </div>
    </div>
    <div class="result-box" id="resultBox">
        <div class="result-label">✅ 识别内容</div>
        <div class="result-text" id="resultContent"></div>
    </div>
    <div class="btn-group">
        <button class="btn" id="restartBtn">🔄 重启扫描</button>
        <button class="btn" id="manualAuthBtn">📷 授权相机</button>
        <button class="btn btn-primary" id="copyBtn" disabled>📋 复制结果</button>
    </div>
    <div id="errorMsg" class="error-tip" style="display: none;"></div>
    <div id="infoMsg" class="info-tip" style="display: none;"></div>
    <div id="permissionGuide" class="permission-guide">
        <p>🔐 <span class="guide-step">摄像头权限指南</span></p>
        <p>📱 iPhone/iPad: 设置 → Safari → 相机 → 允许</p>
        <p>🌐 安卓Chrome: 点击地址栏左侧🔒 → 相机 → 允许</p>
        <p>📲 其他浏览器: 设置 → 网站权限 → 相机 → 允许</p>
        <p style="margin-top:6px;">✨ 授权后点击"重启扫描"或"授权相机"</p>
    </div>
</div>

<script>
    (function() {
        // ---------- DOM 元素绑定 ----------
        const readerElem = document.getElementById('reader');
        const statusSpan = document.getElementById('statusMsg');
        const statusDot = document.getElementById('statusDot');
        const resultBox = document.getElementById('resultBox');
        const resultContent = document.getElementById('resultContent');
        const copyBtn = document.getElementById('copyBtn');
        const restartBtn = document.getElementById('restartBtn');
        const manualAuthBtn = document.getElementById('manualAuthBtn');
        const errorDiv = document.getElementById('errorMsg');
        const infoDiv = document.getElementById('infoMsg');
        const permissionGuide = document.getElementById('permissionGuide');

        let html5QrCode = null;
        let isScanningActive = false;
        let lastScannedValue = null;
        let currentStreamTracks = []; // 用于手动释放（备用）

        // 辅助显示信息
        function showError(msg, showGuide = false) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
            if (showGuide) {
                permissionGuide.style.display = 'block';
            } else {
                // 如果错误不要求引导，但之前引导可能还在，可以根据逻辑不清除？但保留不管，一般调用showGuide才会显示
            }
            statusSpan.innerText = '⚠️ ' + msg;
            statusDot.style.background = '#ff5555';
            statusDot.style.animation = 'none';
        }

        function hideError() {
            errorDiv.style.display = 'none';
        }

        function showInfo(msg, autoHide = true) {
            infoDiv.style.display = 'block';
            infoDiv.textContent = msg;
            if (autoHide) {
                setTimeout(() => {
                    if (infoDiv.style.display === 'block') {
                        infoDiv.style.display = 'none';
                    }
                }, 2800);
            }
        }

        function hideInfo() {
            infoDiv.style.display = 'none';
        }

        function hideGuide() {
            permissionGuide.style.display = 'none';
        }

        function updateStatus(text, isActive = true) {
            statusSpan.innerText = text;
            if (isActive) {
                statusDot.style.background = '#0f0';
                statusDot.style.animation = 'pulse 1.2s infinite';
            } else {
                statusDot.style.background = '#ffaa33';
                statusDot.style.animation = 'none';
            }
        }

        // 停止当前扫描器并清理资源
        async function stopScanner() {
            if (html5QrCode && isScanningActive) {
                try {
                    await html5QrCode.stop();
                } catch(e) {
                    console.warn("停止扫描器异常", e);
                }
                isScanningActive = false;
            }
            if (html5QrCode) {
                try {
                    html5QrCode.clear();
                } catch(e) {}
                html5QrCode = null;
            }
            // 额外主动释放可能遗留的媒体流 (安全)
            if (currentStreamTracks.length) {
                currentStreamTracks.forEach(track => track.stop());
                currentStreamTracks = [];
            }
        }

        // 获取后置摄像头ID (优先环境摄像头)
        async function getOptimalCameraId() {
            try {
                const cameras = await Html5Qrcode.getCameras();
                if (!cameras || cameras.length === 0) return null;
                // 优先选择包含 back/environment/后置 关键词的摄像头
                let backCam = cameras.find(cam => {
                    const label = cam.label.toLowerCase();
                    return label.includes('back') || label.includes('rear') || label.includes('environment') || label.includes('后置');
                });
                if (backCam) return backCam.id;
                // 如果没有明确后置，默认第一个通常是后置？取第一个
                return cameras[0].id;
            } catch(err) {
                console.error("获取摄像头列表失败", err);
                return null;
            }
        }

        // 核心启动逻辑：强制后置摄像头 + 扫描框完全匹配视频区域
        // 并且确保启动时调用带 fps 和 qrbox 设置，让扫描区域限定在框内视觉一致
        async function startScanner() {
            await stopScanner(); // 完全重置
            resultBox.style.display = 'none';
            copyBtn.disabled = true;
            lastScannedValue = null;
            hideError();
            hideGuide();
            updateStatus("启动相机中...", true);

            try {
                const cameraId = await getOptimalCameraId();
                if (!cameraId) {
                    throw new Error("未找到可用摄像头");
                }

                // 新实例
                html5QrCode = new Html5Qrcode("reader");
                // 重要配置: qrbox 设置与视觉扫描框像素位置匹配。为了让识别区域精确对应屏幕中央框，
                // 我们通过计算动态设置 qrbox 宽高（基于屏幕实际显示后扫描框位置）。
                // 但是由于 html5-qrcode 内部裁剪是根据摄像头的原始分辨率比例进行计算，最好的办法是给相对大小。
                // 为了保持框内识别准确，让扫描区域大小对应 扫描框占屏幕的比例。
                // 获取扫描框的显示尺寸（相对于视频实际区域会自动映射），但html5-qrcode内部支持 qrbox 数值设定，使解码只发生在中心框内区域。
                // 为了防止二维码不在框内也被识别，我们设置精确的 qrbox 宽高（像素单位，相对于视频流）
                // 计算方式：根据扫描框实际渲染宽高比，配置一个合理范围(框的宽高占视频比例的多少，通常280x280大约占宽屏30~35%)，
                // 但最稳健的是设置一个中等范围，并且因为用户对准框内就能扫描。为达到“框外无法识别”的效果，需要让 qrbox 数值对应扫描框在视频流中的区域。
                // 根据经验直接设置宽高为 260-280 即可大大提高框内识别精准，并且 html5-qrcode 本身会将识别区域限定为此区域。
                // 同时为了避免识别到框外二维码，我们将 fps 调高，提高识别速度。
                const config = {
                    fps: 20,
                    qrbox: { width: 270, height: 270 },   // 该数值与扫描框实际视觉大小一致，效果是只有框内能解码成功，符合预期。
                    aspectRatio: undefined,
                    disableFlip: false,
                    rememberLastCameraUsed: false,
                    videoConstraints: {
                        deviceId: { exact: cameraId },
                        facingMode: { exact: "environment" } // 强化后置请求
                    }
                };

                await html5QrCode.start(
                    cameraId,
                    config,
                    (decodedText) => {
                        // 扫描成功回调（仅在限定区域内识别才会触发）
                        if (!isScanningActive) return;
                        // 避免重复相同结果
                        if (lastScannedValue === decodedText) return;
                        lastScannedValue = decodedText;

                        // 震动提示
                        if (window.navigator && window.navigator.vibrate) {
                            window.navigator.vibrate(200);
                        }
                        // 停止扫描防止连续多次触发
                        if (html5QrCode && isScanningActive) {
                            // 停止扫描但保留结果显示，用户手动重启可继续
                            html5QrCode.stop().then(() => {
                                isScanningActive = false;
                                updateStatus("✅ 识别成功！", false);
                            }).catch(e => console.warn);
                        } else {
                            isScanningActive = false;
                            updateStatus("识别完成", false);
                        }

                        resultBox.style.display = 'block';
                        resultContent.textContent = decodedText;
                        copyBtn.disabled = false;
                        showInfo("🎉 扫描成功，结果已显示", true);
                    },
                    (errorMessage) => {
                        // 扫描失败回调，不做额外处理，保持安静。
                        // 可忽略
                    }
                );
                isScanningActive = true;
                updateStatus("📷 扫描中 · 请对准框内", true);
                // 确保视频内嵌属性 playsinline 防止全屏
                const videoElem = document.querySelector('#reader video');
                if (videoElem) {
                    videoElem.setAttribute('playsinline', 'true');
                    videoElem.muted = true;
                }
                // 小优化：如果发现摄像头镜像或者偏移，不需要额外处理，扫描框位置始终居中
                showInfo("相机已启动，请将二维码放入中央框内", true);
            } catch (err) {
                console.error("启动扫描失败: ", err);
                let errorMsg = "";
                let needGuide = false;
                const errStr = err.toString();
                if (errStr.includes("NotAllowedError") || errStr.includes("Permission")) {
                    errorMsg = "摄像头权限被拒绝，请手动授权后再试";
                    needGuide = true;
                } else if (errStr.includes("NotFoundError")) {
                    errorMsg = "未检测到后置摄像头，请检查设备";
                } else if (errStr.includes("NotReadableError")) {
                    errorMsg = "摄像头被占用，请关闭其他相机应用";
                } else {
                    errorMsg = "启动失败：" + (err.message || errStr).slice(0, 100);
                }
                showError(errorMsg, needGuide);
                updateStatus("启动失败", false);
                isScanningActive = false;
                return false;
            }
            return true;
        }

        // 主动请求摄像头权限（强制弹窗授权并且优先后置）
        async function requestCameraAndStart() {
            hideError();
            hideGuide();
            showInfo("请求摄像头权限...", false);
            updateStatus("请求授权中", true);
            try {
                // 尝试先获取媒体流验证权限并申请后置
                let stream = null;
                try {
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: "environment" } }
                    });
                } catch (firstErr) {
                    // 如果强制后置失败则回退默认摄像头请求
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                if (stream) {
                    // 获取成功，释放临时流
                    stream.getTracks().forEach(track => track.stop());
                    showInfo("✅ 权限已获取，正在启动扫描器...", true);
                    hideGuide();
                    await startScanner();
                } else {
                    throw new Error("无法获取流");
                }
            } catch (err) {
                console.error("手动授权失败", err);
                let guideFlag = false;
                let userMsg = "";
                if (err.name === 'NotAllowedError') {
                    userMsg = "摄像头权限被拒绝，请根据下方指引手动开启后点击「重启扫描」";
                    guideFlag = true;
                } else {
                    userMsg = "授权失败: " + (err.message || "未知错误");
                    guideFlag = true;
                }
                showError(userMsg, guideFlag);
                updateStatus("授权失败", false);
            }
        }

        // 重启扫描（清理上次结果并重新开始）
        async function restartScan() {
            await stopScanner();
            lastScannedValue = null;
            resultBox.style.display = 'none';
            copyBtn.disabled = true;
            hideError();
            hideGuide();
            // 重新尝试启动扫描
            const success = await startScanner();
            if (!success) {
                // 若失败尝试显示额外引导
                showInfo("如需手动授权，点击「授权相机」按钮", true);
            }
        }

        // 复制结果
        async function copyScanResult() {
            const text = resultContent.textContent;
            if (!text) {
                showError("没有扫描结果可复制", false);
                return;
            }
            try {
                await navigator.clipboard.writeText(text);
                showInfo("📋 已复制到剪贴板", true);
                // 微动效
                copyBtn.style.transform = 'scale(0.96)';
                setTimeout(() => { copyBtn.style.transform = ''; }, 150);
            } catch (err) {
                // fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showInfo("已复制", true);
            }
        }

        // 智能初始加载: 检测已有权限或尝试自动启动，但不会强制弹窗（静默检测）
        async function initialSmartLoad() {
            updateStatus("准备就绪", true);
            // 先检测是否已经有权限（不弹窗方式）
            let hasPermission = null;
            try {
                const testStream = await navigator.mediaDevices.getUserMedia({ video: true });
                testStream.getTracks().forEach(t => t.stop());
                hasPermission = true;
            } catch (e) {
                if (e.name === 'NotAllowedError') hasPermission = false;
                else hasPermission = null;
            }
            if (hasPermission === false) {
                showError("需要相机权限才能扫描", true);
                updateStatus("需授权", false);
            } else {
                // 有权限或未知（未知尝试启动，浏览器会异步弹窗或直接成功）
                await startScanner();
            }
        }

        // 事件绑定
        restartBtn.addEventListener('click', () => {
            restartScan().catch(e => {
                console.error(e);
                showError("重启失败，可刷新重试", false);
            });
        });
        manualAuthBtn.addEventListener('click', () => {
            requestCameraAndStart().catch(e => console.warn);
        });
        copyBtn.addEventListener('click', copyScanResult);

        // 页面关闭前释放资源
        window.addEventListener('beforeunload', () => {
            if (html5QrCode && isScanningActive) {
                html5QrCode.stop().catch(()=>{});
            }
            if (currentStreamTracks.length) {
                currentStreamTracks.forEach(t => t.stop());
            }
        });

        // 启动应用
        initialSmartLoad();
    })();
</script>
</body>
</html>
