<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>极速传 · 局域网P2P | 网络测速+重搜设备</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 主题变量 (明亮/暗色) */
        :root {
            --bg-gradient-start: #f4f7fd;
            --bg-gradient-end: #e9eefa;
            --card-bg: rgba(255, 255, 255, 0.88);
            --card-border: rgba(80, 90, 210, 0.35);
            --text-primary: #1a1f3a;
            --text-secondary: #2c3a66;
            --accent: #5b4bdb;
            --accent-light: #7f6eff;
            --badge-bg: #e2eaff;
            --input-bg: #ffffff;
            --placeholder-color: #8d9bb8;
            --device-item-bg: #ffffffcc;
            --shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            --border-light: #cad2ff;
            --online-led: #2bcf5e;
        }

        body.dark {
            --bg-gradient-start: #0c0925;
            --bg-gradient-end: #19153b;
            --card-bg: rgba(28, 22, 65, 0.9);
            --card-border: rgba(120, 95, 240, 0.55);
            --text-primary: #f0ebff;
            --text-secondary: #cbc2f0;
            --accent: #8c74ff;
            --accent-light: #a690ff;
            --badge-bg: #30277a;
            --input-bg: #201c48;
            --placeholder-color: #a094d0;
            --device-item-bg: #2f2870aa;
            --shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            --border-light: #534bae;
            --online-led: #6eff8c;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
        }

        .app {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* 头部 */
        .header {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 18px 20px 14px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            position: relative;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sub { font-size: 0.75rem; opacity: 0.8; margin-top: 6px; }
        .theme-switch {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 6px 14px;
            display: flex;
            gap: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            color: var(--text-primary);
        }

        .content { padding: 18px 16px 25px; flex: 1; }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 14px;
            color: var(--accent);
        }
        .badge {
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .id-box {
            background: var(--input-bg);
            border-radius: 60px;
            padding: 12px 16px;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: center;
            word-break: break-all;
            border: 1px solid var(--border-light);
        }
        .copy-btn, .rescan-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin-top: 10px;
            cursor: pointer;
            font-weight: 500;
            margin-right: 8px;
        }
        .rescan-btn { background: #4a3b9e; margin-top: 0; }
        .manual-connect { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
        .manual-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.8rem;
            outline: none;
        }
        .connect-btn {
            background: linear-gradient(105deg, var(--accent), var(--accent-light));
            border: none;
            padding: 0 20px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        .device-list {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 28px;
            padding: 10px;
            min-height: 140px;
            max-height: 220px;
            overflow-y: auto;
        }
        .device-item {
            background: var(--device-item-bg);
            border-radius: 60px;
            padding: 8px 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-light);
        }
        .device-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .online-led { width: 9px; height: 9px; background: var(--online-led); border-radius: 10px; box-shadow: 0 0 5px #5eff7c; }
        .device-name { font-weight: 500; font-size: 0.85rem; }
        .device-id-short { font-size: 0.65rem; background: var(--badge-bg); padding: 2px 8px; border-radius: 40px; }
        .send-file-btn { background: var(--accent); border: none; color: white; padding: 5px 16px; border-radius: 40px; font-size: 0.7rem; cursor: pointer; }
        .empty-tip { text-align: center; padding: 28px 12px; opacity: 0.7; font-size: 0.85rem; }
        .file-row {
            background: var(--input-bg);
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .file-label { background: var(--accent); padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; cursor: pointer; color: white; }
        .progress-card { background: var(--card-bg); border-radius: 24px; padding: 12px; border: 1px solid var(--border-light); }
        .progress-bar { background: #302c5a; border-radius: 40px; height: 8px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 40px; }
        .status-text { font-size: 0.7rem; margin-top: 6px; text-align: center; }
        .received-list { max-height: 170px; overflow-y: auto; }
        .received-item {
            background: var(--device-item-bg);
            border-radius: 24px;
            padding: 6px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .download-link { background: var(--accent); padding: 4px 12px; border-radius: 40px; font-size: 0.65rem; cursor: pointer; color: white; text-decoration: none; }
        footer { text-align: center; padding: 14px; font-size: 0.6rem; border-top: 1px solid var(--card-border); }
        button:active { transform: scale(0.96); }

        /* 测速弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: inherit;
        }
        .speed-modal {
            background: var(--card-bg);
            border-radius: 48px;
            max-width: 320px;
            width: 80%;
            padding: 28px 20px;
            text-align: center;
            border: 1px solid var(--accent);
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            color: var(--text-primary);
        }
        .speed-modal h3 { margin-bottom: 16px; font-size: 1.5rem; }
        .speed-value { font-size: 2.2rem; font-weight: 800; font-family: monospace; margin: 12px 0; color: var(--accent); }
        .speed-note { font-size: 0.75rem; opacity: 0.8; margin-top: 12px; }
        .close-speed { background: var(--accent); border: none; padding: 8px 24px; border-radius: 60px; color: white; margin-top: 16px; cursor: pointer; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(128,128,255,0.3); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 550px) { .content { padding: 12px; } .theme-switch { top: 12px; right: 12px; padding: 4px 10px; } }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1><span>⚡</span> 极速传·P2P</h1>
        <div class="sub">同网直连 | 网络测速 | 手动重搜设备</div>
        <div class="theme-switch" id="themeToggleBtn">🌓 切换主题</div>
    </div>
    <div class="content">
        <!-- 本机ID卡 -->
        <div class="card">
            <div class="card-title">📟 我的设备ID <div class="badge">复制给对方</div></div>
            <div class="id-box" id="localDeviceIdDisplay">加载中...</div>
            <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;">
                <button class="copy-btn" id="copyIdBtn">📋 复制ID</button>
                <button class="rescan-btn" id="rescanDevicesBtn">🔄 重新搜索设备</button>
            </div>
        </div>

        <!-- 手动连接 + 设备列表 -->
        <div class="card">
            <div class="card-title">🌐 在线设备 & 手动连接</div>
            <div class="manual-connect">
                <input type="text" id="remoteIdInput" class="manual-input" placeholder="输入对方设备ID (peer_xxxx)">
                <button id="manualConnectBtn" class="connect-btn">➕ 手动连接</button>
            </div>
            <div style="margin: 12px 0 6px; display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size:0.7rem;">✨ 自动发现 / 已连接设备</span>
                <span id="deviceCountBadge" style="background: var(--badge-bg); padding:2px 10px; border-radius:40px; font-size:0.7rem;">0</span>
            </div>
            <div class="device-list" id="deviceListContainer">
                <div class="empty-tip">⏳ 等待设备上线或点击「重新搜索」</div>
            </div>
        </div>

        <!-- 发送文件区 -->
        <div class="card">
            <div class="card-title">📤 发送文件</div>
            <div class="file-row">
                <label class="file-label" for="sendFileInput">📁 选择文件</label>
                <span id="selectedFileNameSpan" style="font-size:0.75rem;">未选择</span>
                <input type="file" id="sendFileInput" style="display:none">
            </div>
            <div id="progressArea" style="display: none;">
                <div class="progress-card">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <div class="status-text" id="transferStatus">等待传输</div>
                </div>
            </div>
            <div style="font-size:0.65rem; text-align:center; margin-top:8px;">👉 点击设备右侧「发送」按钮传输文件</div>
        </div>

        <!-- 接收历史 -->
        <div class="card">
            <div class="card-title">📥 已接收文件</div>
            <div class="received-list" id="receivedFilesContainer"><div style="padding:12px; text-align:center;">暂无接收文件</div></div>
        </div>
        <footer>🔒 WebRTC P2P 加密 · 手动连接+自动发现 · 测速仅作参考</footer>
    </div>
</div>

<script>
    (function(){
        // ---------- 全局变量 ----------
        let localPeerId = "";
        let currentFileBuffer = null;
        let currentFileName = "";
        let isTransferring = false;
        let pendingTargetId = null;
        let remotePeers = new Map();     // remoteId -> { pc, dc, remoteName, ready }
        let receiveBuffers = new Map();
        let receivedBlobUrls = [];
        const CHANNEL_NAME = "LAN_P2P_V5_SPEED_RESCAN";
        let broadcastChannel = null;

        // ---------- 主题 ----------
        function initTheme() {
            const saved = localStorage.getItem("lan_transfer_theme");
            if (saved === "dark") document.body.classList.add("dark");
            else document.body.classList.remove("dark");
        }
        function toggleTheme() {
            if (document.body.classList.contains("dark")) {
                document.body.classList.remove("dark");
                localStorage.setItem("lan_transfer_theme", "light");
            } else {
                document.body.classList.add("dark");
                localStorage.setItem("lan_transfer_theme", "dark");
            }
        }
        document.getElementById("themeToggleBtn").addEventListener("click", toggleTheme);
        initTheme();

        // ---------- 网络测速弹窗 (下载测速模拟) ----------
        function showSpeedTestModal() {
            return new Promise((resolve) => {
                const modalDiv = document.createElement("div");
                modalDiv.className = "modal-overlay";
                modalDiv.innerHTML = `
                    <div class="speed-modal">
                        <h3>📡 网络测速</h3>
                        <div id="speedTestContent">
                            <div class="spinner"></div>
                            <div style="margin-top:12px;">正在检测局域网连通性...</div>
                        </div>
                        <div class="speed-note">测速方式：下载小文件估算延迟+带宽 (仅供参考)</div>
                        <button class="close-speed" id="speedCloseBtn">关闭</button>
                    </div>
                `;
                document.body.appendChild(modalDiv);
                const contentDiv = modalDiv.querySelector("#speedTestContent");
                // 模拟测速：通过 fetch 一个随机图片或利用自身 latency? 最好使用公共资源但为了纯局域网也可模拟探测耗时。
                const startTime = performance.now();
                // 使用一个小的图片资源来估算 (不依赖外网就用延迟计算)
                fetch("https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png", { mode: 'no-cors', cache: 'no-store' })
                    .catch(() => null).finally(() => {
                    const endTime = performance.now();
                    let latency = Math.round(endTime - startTime);
                    let speedMbps = "—";
                    if(latency > 0 && latency < 2000) {
                        let fakeSpeed = (500 / latency) * 2;
                        speedMbps = fakeSpeed.toFixed(1) + " Mbps (估)";
                    } else {
                        speedMbps = "> 较高延迟 / 局域网可能不通外网";
                    }
                    contentDiv.innerHTML = `
                            <div style="font-size:1rem;">📶 网络响应</div>
                            <div class="speed-value">${latency} ms</div>
                            <div>估算带宽：${speedMbps}</div>
                            <div style="margin-top:10px;">✅ 若延迟过高，请检查防火墙或同一网段</div>
                        `;
                });
                const closeBtn = modalDiv.querySelector("#speedCloseBtn");
                closeBtn.addEventListener("click", () => {
                    modalDiv.remove();
                    resolve(true);
                });
            });
        }

        // 进入页面即弹窗测速
        window.addEventListener("load", () => {
            setTimeout(() => {
                showSpeedTestModal();
            }, 500);
        });

        // ---------- 辅助函数 ----------
        function generateDeviceId() { return `peer_${Math.random().toString(36).substring(2,10)}${Date.now().toString(36).slice(-5)}`; }
        function getLocalId() {
            let stored = localStorage.getItem("p2p_device_id_v5");
            if(!stored) { stored = generateDeviceId(); localStorage.setItem("p2p_device_id_v5", stored); }
            return stored;
        }
        function getDeviceNickname() { return `${/Mobi|Android|iPhone/i.test(navigator.userAgent)?"📱":"💻"} ${localPeerId.slice(-6)}`; }
        function getShortName(id) { return `设备·${id.slice(-6)}`; }

        function initBroadcast() {
            if(broadcastChannel) broadcastChannel.close();
            broadcastChannel = new BroadcastChannel(CHANNEL_NAME);
            broadcastChannel.onmessage = handleSignalMessage;
        }

        function sendSignal(targetId, type, payload) {
            if(!broadcastChannel) return;
            broadcastChannel.postMessage({ from: localPeerId, to: targetId, type, payload, senderName: getDeviceNickname() });
        }
        function announcePresence() { sendSignal("*", "peer_hello", { name: getDeviceNickname(), timestamp: Date.now() }); }
        function sendBye() { sendSignal("*", "peer_bye", {}); }

        // 重新搜索设备：强制清除老化连接，广播hello，主动向现存设备发起连接
        async function rescanDevices() {
            // 清除所有未建立连接的peer 但保留已连接的会更好？为重新发现，断开所有未ready的连接并重新广播
            for(let [id, info] of remotePeers.entries()) {
                if(info.pc && (info.pc.connectionState !== "connected" && info.pc.connectionState !== "connecting")) {
                    info.pc.close();
                    remotePeers.delete(id);
                } else if(!info.dc || info.dc.readyState !== "open") {
                    if(info.pc) info.pc.close();
                    remotePeers.delete(id);
                }
            }
            announcePresence();
            // 额外多次广播
            setTimeout(() => announcePresence(), 300);
            setTimeout(() => announcePresence(), 800);
            updateDeviceListUI();
            const tipDiv = document.getElementById("deviceListContainer");
            const originalHtml = tipDiv.innerHTML;
            tipDiv.innerHTML = `<div class="empty-tip">🔄 重新搜索中，请稍等...</div>`;
            setTimeout(() => updateDeviceListUI(), 1500);
        }

        // 主动发起连接
        async function initiateConnection(remoteId) {
            if(remotePeers.has(remoteId)) {
                let old = remotePeers.get(remoteId);
                if(old.pc) old.pc.close();
                remotePeers.delete(remoteId);
            }
            const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] });
            const dataChannel = pc.createDataChannel("fileTransfer", { ordered: true });
            pc.onicecandidate = (ev) => { if(ev.candidate) sendSignal(remoteId, "ice_candidate", ev.candidate); };
            pc.ondatachannel = (event) => { setupDataChannel(event.channel, remoteId); const info=remotePeers.get(remoteId); if(info) info.dc=event.channel; else remotePeers.set(remoteId,{pc, dc:event.channel, remoteName:getShortName(remoteId), ready:true}); };
            setupDataChannel(dataChannel, remoteId);
            remotePeers.set(remoteId, { pc, dc: dataChannel, remoteName: getShortName(remoteId), ready: false });
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignal(remoteId, "offer", { sdp: offer.sdp });
            return true;
        }

        function setupDataChannel(dc, remoteId) {
            dc.onopen = () => {
                let info = remotePeers.get(remoteId);
                if(info) info.ready = true;
                if(pendingTargetId === remoteId && currentFileBuffer && !isTransferring) {
                    startFileTransfer(remoteId, currentFileBuffer, currentFileName);
                    pendingTargetId = null;
                }
                updateDeviceListUI();
            };
            dc.onclose = () => updateDeviceListUI();
            dc.onmessage = async (ev) => {
                if(ev.data instanceof ArrayBuffer) await handleFileChunk(remoteId, ev.data);
                else if(typeof ev.data === "string") {
                    let msg = JSON.parse(ev.data);
                    if(msg.type === "file_meta") prepareReceiveFile(remoteId, msg.fileName, msg.fileSize, msg.totalChunks);
                    else if(msg.type === "chunk_ack" && isTransferring) {
                        let percent = msg.progress;
                        document.getElementById("progressArea").style.display = "block";
                        document.getElementById("progressFill").style.width = percent + "%";
                        document.getElementById("transferStatus").innerText = `发送中 ${Math.round(percent)}%`;
                        if(percent >= 99.9) {
                            isTransferring = false;
                            document.getElementById("transferStatus").innerText = "✅ 发送完成!";
                            setTimeout(()=>{ if(!isTransferring) document.getElementById("progressArea").style.display="none"; document.getElementById("progressFill").style.width="0%"; },1500);
                            currentFileBuffer = null;
                            document.getElementById("selectedFileNameSpan").innerText = "未选择";
                        }
                    }
                }
            };
        }

        function prepareReceiveFile(remoteId, fileName, fileSize, totalChunks) {
            receiveBuffers.set(remoteId, { chunks: new Array(totalChunks), fileName, fileSize, totalChunks, recvCount:0 });
            document.getElementById("progressArea").style.display = "block";
            document.getElementById("transferStatus").innerText = `接收 ${fileName} ...`;
        }

        async function handleFileChunk(remoteId, chunkBuf) {
            const record = receiveBuffers.get(remoteId);
            if(!record) return;
            const index = new Uint32Array(chunkBuf, 0, 1)[0];
            const dataPart = chunkBuf.slice(4);
            if(!record.chunks[index]) { record.chunks[index] = dataPart; record.recvCount++; }
            const percent = (record.recvCount / record.totalChunks) * 100;
            document.getElementById("progressFill").style.width = percent + "%";
            document.getElementById("transferStatus").innerText = `接收中 ${Math.round(percent)}%`;
            const peerInfo = remotePeers.get(remoteId);
            if(peerInfo?.dc?.readyState === "open") peerInfo.dc.send(JSON.stringify({ type: "chunk_ack", progress: percent }));
            if(record.recvCount === record.totalChunks) {
                const blob = new Blob(record.chunks, { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                receivedBlobUrls.push(url);
                addToReceivedList(record.fileName, record.fileSize, url);
                receiveBuffers.delete(remoteId);
                document.getElementById("transferStatus").innerText = `✅ 已接收 ${record.fileName}`;
                setTimeout(()=>{ if(receiveBuffers.size===0 && !isTransferring) document.getElementById("progressArea").style.display="none"; },2000);
            }
        }

        function addToReceivedList(fileName, fileSize, blobUrl) {
            const container = document.getElementById("receivedFilesContainer");
            if(container.innerText.includes("暂无接收文件")) container.innerHTML = "";
            const div = document.createElement("div"); div.className = "received-item";
            div.innerHTML = `<span>📄 ${fileName} (${(fileSize/1024).toFixed(1)} KB)</span><a class="download-link" data-url="${blobUrl}" data-name="${fileName}">💾 保存</a>`;
            container.prepend(div);
            div.querySelector(".download-link").addEventListener("click", (e) => { const a=document.createElement("a"); a.href=blobUrl; a.download=fileName; a.click(); });
        }

        async function startFileTransfer(remoteId, fileBuffer, fileName) {
            if(isTransferring) { document.getElementById("transferStatus").innerText = "已有传输任务"; return; }
            const peerInfo = remotePeers.get(remoteId);
            if(!peerInfo?.dc || peerInfo.dc.readyState !== "open") { document.getElementById("transferStatus").innerText = "连接未就绪"; return; }
            isTransferring = true;
            const channel = peerInfo.dc;
            const chunkSize = 16384;
            const totalChunks = Math.ceil(fileBuffer.byteLength / chunkSize);
            channel.send(JSON.stringify({ type: "file_meta", fileName, fileSize: fileBuffer.byteLength, totalChunks }));
            for(let i=0; i<totalChunks; i++) {
                const start = i*chunkSize, end = Math.min(start+chunkSize, fileBuffer.byteLength);
                const chunk = fileBuffer.slice(start, end);
                const header = new ArrayBuffer(4);
                new Uint32Array(header)[0] = i;
                const combined = new Uint8Array(header.byteLength + chunk.byteLength);
                combined.set(new Uint8Array(header),0);
                combined.set(new Uint8Array(chunk),4);
                channel.send(combined.buffer);
                const percent = ((i+1)/totalChunks)*100;
                document.getElementById("progressArea").style.display = "block";
                document.getElementById("progressFill").style.width = percent+"%";
                document.getElementById("transferStatus").innerText = `发送 ${fileName} ${Math.round(percent)}%`;
                await new Promise(r=>setTimeout(r,2));
            }
            setTimeout(()=>{ if(isTransferring) { isTransferring=false; if(receiveBuffers.size===0) document.getElementById("progressArea").style.display="none"; } },2000);
        }

        function updateDeviceListUI() {
            const container = document.getElementById("deviceListContainer");
            const devices = Array.from(remotePeers.keys()).filter(id=>id!==localPeerId);
            document.getElementById("deviceCountBadge").innerText = devices.length;
            if(devices.length===0) { container.innerHTML = `<div class="empty-tip">🔍 暂无在线设备，可让对方手动输入你的ID连接<br>或点击「重新搜索设备」</div>`; return; }
            container.innerHTML = "";
            devices.forEach(remoteId=>{
                const info = remotePeers.get(remoteId);
                const displayName = info?.remoteName || getShortName(remoteId);
                const readyState = (info?.dc?.readyState === "open") ? "已连接" : "等待中";
                const div = document.createElement("div"); div.className="device-item";
                div.innerHTML = `<div class="device-info"><span class="online-led"></span><span class="device-name">${escapeHtml(displayName)}</span><span class="device-id-short">${remoteId.slice(-8)}</span><span style="font-size:0.6rem;">${readyState}</span></div><button class="send-file-btn" data-id="${remoteId}">📤 发送</button>`;
                container.appendChild(div);
            });
            document.querySelectorAll('.send-file-btn').forEach(btn=>{
                btn.addEventListener('click',(e)=>{
                    const targetId = btn.getAttribute('data-id');
                    if(!currentFileBuffer) { alert("请先选择文件"); document.getElementById("sendFileInput").click(); pendingTargetId=targetId; return; }
                    const peer = remotePeers.get(targetId);
                    if(!peer?.dc || peer.dc.readyState!=="open") { alert("连接未就绪，尝试重连"); initiateConnection(targetId); pendingTargetId=targetId; return; }
                    startFileTransfer(targetId, currentFileBuffer, currentFileName);
                });
            });
        }
        function escapeHtml(str){return String(str).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

        // 信令处理
        async function handleSignalMessage(event) {
            const msg = event.data;
            if(!msg || msg.from === localPeerId) return;
            const { from, type, payload } = msg;
            if(type === "peer_hello") {
                if(!remotePeers.has(from)) { remotePeers.set(from, { pc:null, dc:null, remoteName: payload?.name || getShortName(from), ready:false }); updateDeviceListUI(); await initiateConnection(from); }
            } else if(type === "peer_bye") {
                if(remotePeers.has(from)) { let old=remotePeers.get(from); if(old.pc) old.pc.close(); remotePeers.delete(from); updateDeviceListUI(); }
            } else if(type === "offer") {
                if(!remotePeers.has(from)) remotePeers.set(from,{pc:null,dc:null,remoteName:getShortName(from),ready:false});
                let peerInfo = remotePeers.get(from);
                if(!peerInfo.pc) {
                    const pc = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
                    pc.onicecandidate = (ev)=>{ if(ev.candidate) sendSignal(from,"ice_candidate",ev.candidate); };
                    pc.ondatachannel = (ev)=>{ setupDataChannel(ev.channel, from); peerInfo.dc=ev.channel; peerInfo.ready=true; };
                    peerInfo.pc = pc;
                    remotePeers.set(from, peerInfo);
                }
                await peerInfo.pc.setRemoteDescription({ type:"offer", sdp:payload.sdp });
                const answer = await peerInfo.pc.createAnswer();
                await peerInfo.pc.setLocalDescription(answer);
                sendSignal(from, "answer", { sdp: answer.sdp });
            } else if(type === "answer") {
                const peerInfo = remotePeers.get(from);
                if(peerInfo?.pc && peerInfo.pc.signalingState !== "closed") await peerInfo.pc.setRemoteDescription({ type:"answer", sdp:payload.sdp });
            } else if(type === "ice_candidate") {
                const peerInfo = remotePeers.get(from);
                if(peerInfo?.pc) try{ await peerInfo.pc.addIceCandidate(new RTCIceCandidate(payload)); } catch(e){}
            }
        }

        // 文件选择
        const fileInput = document.getElementById("sendFileInput");
        fileInput.addEventListener("change",(e)=>{
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById("selectedFileNameSpan").innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev)=>{ currentFileBuffer = ev.target.result; currentFileName = file.name; if(pendingTargetId){ let target=pendingTargetId; pendingTargetId=null; let peer=remotePeers.get(target); if(peer?.dc?.readyState==="open") startFileTransfer(target, currentFileBuffer, currentFileName); else if(peer) initiateConnection(target); } };
            reader.readAsArrayBuffer(file);
        });

        // 按钮绑定
        document.getElementById("copyIdBtn").addEventListener("click",()=>{ navigator.clipboard.writeText(localPeerId); alert("设备ID已复制"); });
        document.getElementById("manualConnectBtn").addEventListener("click",async()=>{ const rid=document.getElementById("remoteIdInput").value.trim(); if(!rid) return alert("输入ID"); if(rid===localPeerId) return alert("不能连接自己"); await initiateConnection(rid); document.getElementById("remoteIdInput").value=""; });
        document.getElementById("rescanDevicesBtn").addEventListener("click", async()=>{ await rescanDevices(); alert("已发送重新搜索信号，请稍候查看设备列表"); });

        // 初始化
        localPeerId = getLocalId();
        document.getElementById("localDeviceIdDisplay").innerText = localPeerId;
        initBroadcast();
        announcePresence();
        setInterval(()=>announcePresence(), 6000);
        window.addEventListener("beforeunload",()=>{ sendBye(); receivedBlobUrls.forEach(url=>URL.revokeObjectURL(url)); });
        updateDeviceListUI();
        setInterval(()=>updateDeviceListUI(), 3500);
    })();
</script>
