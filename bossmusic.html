    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app">
    <div class="header">
        <div class="nav-container">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fa-solid fa-star"></i>
                </div>
                <div class="logo-text">舞立方官方歌曲收藏<span class="logo-sub"></span></div>
            </div>
            <div class="search-wrapper" id="searchWrapper">
                <input type="text" class="search-box" id="searchInput" placeholder="搜索歌曲...">
            </div>
            <div class="nav-menu" id="navMenu">
                <button class="nav-btn active" data-category="最新">最新</button>
                <button class="nav-btn" data-category="国语">国语</button>
                <button class="nav-btn" data-category="粤语">粤语</button>
                <button class="nav-btn" data-category="韩语">韩语</button>
                <button class="nav-btn" data-category="欧美">欧美</button>
                <button class="nav-btn" data-category="其他">其他</button>
            </div>
            <div class="user-actions">
                <div class="login-status-area"><i class="fas fa-user-circle"></i> <span id="loginStateText">未登录</span><button class="login-tip-btn" id="gotoLoginBtn">去登录</button></div>
                <div class="refresh-btn" id="refreshBtn"><i class="fa-solid fa-clock-rotate-left"></i> 更新曲库</div>
                <div class="fav-icon-badge" id="favCollectionBtn"><i class="fa-regular fa-heart"></i> 我的收藏<span class="fav-count" id="favCountBadge">0</span></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="section-header" id="sectionHeader">
            <h2 class="category-title" id="activeCategoryLabel"><i class="fa-solid fa-music"></i> 加载曲库中...</h2>
            <div class="total-info" id="songCountInfo">请稍候</div>
        </div>
        <div class="cache-info" id="cacheInfo"></div>
        <div id="updateProgressArea" style="display:none;">
            <div class="progress-container">
                <div class="progress-bar" id="updateProgressBar"></div>
            </div>
            <div class="loading-stats">
                <span id="updateProgressText">加载中...</span>
            </div>
        </div>
        <div id="songsContainer" class="songs-grid">
            <div class="loading-state"><i class="fa-solid fa-music"></i> 正在获取官方曲库...</div>
        </div>
    </div>
</div>

<div class="global-audio-player" id="globalPlayer">
    <div class="player-cover" id="playerCover"><i class="fas fa-music"></i></div>
    <div class="player-info">
        <div class="song-name" id="playerSongName">未播放</div>
        <div class="artist-name" id="playerArtistName"></div>
    </div>
    <div class="player-progress-area">
        <div class="progress-time"><span id="currentTime">0:00</span><span id="durationTime">0:00</span></div>
        <div class="progress-slider" id="progressSlider">
            <div class="progress-slider-fill" id="progressFill"></div>
        </div>
    </div>
    <div class="player-controls">
        <button id="playerPrevBtn" disabled><i class="fas fa-backward"></i></button>
        <button id="playerPlayPauseBtn"><i class="fas fa-play"></i></button>
        <button id="playerNextBtn" disabled><i class="fas fa-forward"></i></button>
        <button class="player-close" id="playerCloseBtn"><i class="fas fa-times"></i></button>
    </div>
</div>
<div id="toastMsg" class="toast-msg" style="opacity:0; visibility: hidden;">消息</div>

<script>
    // 完整业务逻辑不变，仅增加手机端渲染时对超长歌曲名动态添加 data-long 属性的辅助
    const API_BASE = "https://dancedemo.shenghuayule.com";
    const CATEGORY_MAP = {
        1: "国语",
        2: "粤语",
        3: "韩语",
        4: "欧美",
        5: "其他"
    };
    const CATEGORY_LIST = [{
        name: "最新",
        index: 1
    }, {
        name: "国语",
        index: 2
    }, {
        name: "粤语",
        index: 3
    }, {
        name: "韩语",
        index: 4
    }, {
        name: "欧美",
        index: 5
    }, {
        name: "其他",
        index: 6
    }];
    let allSongs = [],
        currentCategory = "最新",
        favoriteIds = new Set(),
        currentSearchKeyword = "",
        isRefreshing = false,
        currentAccessToken = null,
        isInFavView = false,
        pendingFavoriteOps = new Set();
    let currentAudio = null,
        currentPlayingSongId = null,
        currentSongCover = null,
        currentSongArtist = "";
    let isDraggingProgress = false;
    let currentActivePlayButton = null;

    function getStoredToken() {
        try {
            const d = localStorage.getItem('dance_user_token');
            if (!d) return null;
            const p = JSON.parse(d);
            return p.token && new Date(p.expireTime) > new Date() ? p.token : null;
        } catch (e) {
            return null;
        }
    }

    function getStoredUser() {
        try {
            const d = localStorage.getItem('dance_user_data');
            return d ? JSON.parse(d) : null;
        } catch (e) {
            return null;
        }
    }

    function updateLoginUI() {
        const t = getStoredToken(),
            u = getStoredUser();
        document.getElementById('loginStateText').innerText = (t && u) ? `${u.UserName || '用户'} 已登录` : '未登录';
        currentAccessToken = t;
    }

    function showToast(msg, dur) {
        const t = document.getElementById('toastMsg');
        clearTimeout(window.toastTimer);
        t.style.visibility = 'visible';
        t.style.opacity = '1';
        t.innerText = msg;
        window.toastTimer = setTimeout(() => {
            t.style.opacity = '0';
            t.style.visibility = 'hidden';
        }, dur);
    }

    function escapeHtml(s) {
        if (!s) return '';
        return s.replace(/[&<>]/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;'
        }[m]));
    }

    function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60),
            s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function seekTo(percent) {
        if (currentAudio && currentPlayingSongId) {
            const time = (percent / 100) * currentAudio.duration;
            if (isFinite(time)) currentAudio.currentTime = time;
        }
    }

    function updateProgressDisplay() {
        if (currentAudio && !isDraggingProgress && currentPlayingSongId) {
            const percent = (currentAudio.currentTime / currentAudio.duration) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('currentTime').innerText = formatTime(currentAudio.currentTime);
            document.getElementById('durationTime').innerText = formatTime(currentAudio.duration || 0);
        }
    }

    function resetAllPlayButtons() {
        document.querySelectorAll('.btn-play').forEach(btn => {
            if (btn.disabled) return;
            btn.innerHTML = '<i class="fas fa-play"></i> 试听';
            btn.classList.remove('playing');
        });
        currentActivePlayButton = null;
    }

    function playSong(songId, songTitle, artistName, audioUrl, coverUrl, btnElement) {
        if (currentAudio && currentPlayingSongId === songId && !currentAudio.paused) {
            currentAudio.pause();
            updatePlayButtonUI(false);
            if (btnElement) {
                btnElement.innerHTML = '<i class="fas fa-play"></i> 试听';
                btnElement.classList.remove('playing');
            }
            currentActivePlayButton = null;
            return;
        }
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        resetAllPlayButtons();
        currentPlayingSongId = null;
        if (!audioUrl) {
            showToast("暂无音频资源", 1200);
            return;
        }
        const audio = new Audio(audioUrl);
        currentAudio = audio;
        currentPlayingSongId = songId;
        currentSongCover = coverUrl;
        currentSongArtist = artistName;
        currentActivePlayButton = btnElement;
        document.getElementById('playerSongName').innerText = songTitle;
        document.getElementById('playerArtistName').innerText = artistName || '舞立方';
        const coverImg = document.getElementById('playerCover');
        if (coverUrl) coverImg.innerHTML = `<img src="${coverUrl}" alt="封面" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-music\\'></i>';">`;
        else coverImg.innerHTML = '<i class="fas fa-music"></i>';
        audio.play().catch(e => {
            showToast("播放失败", 1200);
            if (btnElement) {
                btnElement.innerHTML = '<i class="fas fa-play"></i> 试听';
                btnElement.classList.remove('playing');
            }
            currentPlayingSongId = null;
        });
        audio.ontimeupdate = () => updateProgressDisplay();
        audio.onplay = () => {
            updatePlayButtonUI(true);
            if (btnElement) {
                btnElement.innerHTML = '<i class="fas fa-pause"></i> 暂停';
                btnElement.classList.add('playing');
            }
            showPlayer();
        };
        audio.onpause = () => {
            updatePlayButtonUI(false);
            if (btnElement && currentPlayingSongId === songId) {
                btnElement.innerHTML = '<i class="fas fa-play"></i> 试听';
                btnElement.classList.remove('playing');
            }
        };
        audio.onended = () => {
            if (btnElement) btnElement.innerHTML = '<i class="fas fa-play"></i> 试听';
            updatePlayButtonUI(false);
            currentPlayingSongId = null;
            hidePlayer();
        };
        audio.onerror = () => {
            showToast("音频加载失败", 1200);
        };
    }

    function updatePlayButtonUI(isPlaying) {
        const btn = document.getElementById('playerPlayPauseBtn');
        btn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
    }

    function stopCurrentPlay() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        currentPlayingSongId = null;
        resetAllPlayButtons();
        hidePlayer();
    }

    function showPlayer() {
        document.getElementById('globalPlayer').classList.add('show');
    }

    function hidePlayer() {
        document.getElementById('globalPlayer').classList.remove('show');
        document.getElementById('progressFill').style.width = '0%';
    }

    function downloadSong(title, url) {
        if (!url) {
            showToast("无音频", 1200);
            return;
        }
        const a = document.createElement('a');
        a.href = url;
        a.download = `${title}.mp3`;
        a.click();
        showToast(`⬇️ 下载《${title}》`, 1500);
    }

    async function addFavorite(mid, token) {
        const r = await fetch(`${API_BASE}/Dance/api/User/AddFavoriteMusic?musicId=${mid}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        return r.ok;
    }

    async function removeFavorite(mid, token) {
        const r = await fetch(`${API_BASE}/Dance/api/User/DelFavoriteMusic?musicId=${mid}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        return r.ok;
    }

    async function fetchUserFavorites(token) {
        if (!token) return [];
        try {
            const r = await fetch(`${API_BASE}/Dance/api/User/GetMyFavoriteMusic`, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });
            if (!r.ok) return [];
            const d = await r.json();
            let list = Array.isArray(d) ? d : (d?.List || []);
            return list.map(i => i.MusicID).filter(id => id);
        } catch (e) {
            return [];
        }
    }

    async function syncFavorites() {
        if (!currentAccessToken) return;
        const ids = await fetchUserFavorites(currentAccessToken);
        favoriteIds.clear();
        ids.forEach(id => favoriteIds.add(Number(id)));
        localStorage.setItem('dance_favs_final', JSON.stringify([...favoriteIds]));
        document.getElementById('favCountBadge').innerText = favoriteIds.size;
    }

    async function toggleFavorite(mid, title, btn) {
        if (!currentAccessToken) {
            showToast("请先登录", 1500);
            return;
        }
        if (pendingFavoriteOps.has(mid)) return;
        pendingFavoriteOps.add(mid);
        const isFav = favoriteIds.has(mid);
        const ok = isFav ? await removeFavorite(mid, currentAccessToken) : await addFavorite(mid, currentAccessToken);
        if (ok) {
            if (isFav) favoriteIds.delete(mid);
            else favoriteIds.add(mid);
            localStorage.setItem('dance_favs_final', JSON.stringify([...favoriteIds]));
            document.getElementById('favCountBadge').innerText = favoriteIds.size;
            showToast(isFav ? `💔 取消收藏《${title}》` : `❤️ 收藏《${title}》`, 1200);
            if (isInFavView && !favoriteIds.has(mid)) await showMyFavorites();
            else if (!isInFavView && btn) {
                if (favoriteIds.has(mid)) {
                    btn.innerHTML = '<i class="fa-solid fa-heart"></i> 已收藏';
                    btn.classList.add('active-fav');
                } else {
                    btn.innerHTML = '<i class="fa-regular fa-heart"></i> 收藏';
                    btn.classList.remove('active-fav');
                }
            }
        } else showToast("操作失败", 1200);
        pendingFavoriteOps.delete(mid);
    }

    // 核心渲染: 增加对超长歌曲名的检测，动态添加 data-long 属性，让手机端CSS缩小字号
    function renderSongsGrid(songsToRender, isFavView = false) {
        const container = document.getElementById('songsContainer');
        if (!songsToRender.length) {
            container.innerHTML = `<div class="empty-state">${isFavView ? '💔 暂无收藏歌曲' : '✨ 暂无歌曲'}</div>`;
            return;
        }
        let html = '';
        for (const s of songsToRender) {
            const isFav = favoriteIds.has(s.id);
            const hasCover = s.cover && s.cover.length > 5;
            const hasAudio = s.audioUrl && s.audioUrl.length > 10;
            const favIcon = isFav ? '<i class="fa-solid fa-heart"></i> 已收藏' : '<i class="fa-regular fa-heart"></i> 收藏';
            const songNameRaw = s.name || '未知歌曲';
            // 判断歌曲名长度是否超长(中文字符或英文字符超过22个字符认为长标题)
            const isLongName = songNameRaw.length > 22;
            const longAttr = isLongName ? ' data-long="true"' : '';
            html += `<div class="song-card">${s.isNew ? '<span class="new-badge">⭐ 新歌</span>' : ''}
                <div class="card-media">${hasCover ? `<img class="song-cover" src="${s.cover}" alt="${escapeHtml(songNameRaw)}" onerror="this.parentElement.innerHTML='<div class=\\'no-cover\\'>🎵</div>';">` : '<div class="no-cover">🎵</div>'}<div class="difficulty-badge">${escapeHtml(s.levelRange)}</div></div>
                <div class="card-info"><div class="song-title"${longAttr}>${escapeHtml(songNameRaw)}</div><div class="song-artist">${escapeHtml(s.artist)}</div><div class="meta-row"><span class="song-lang">${s.category}</span><span class="level-range">${s.levelRange}</span></div></div>
                <div class="card-actions">${hasAudio ? `<button class="btn-play" data-id="${s.id}" data-title="${escapeHtml(songNameRaw)}" data-artist="${escapeHtml(s.artist)}" data-url="${s.audioUrl}" data-cover="${s.cover || ''}"><i class="fas fa-play"></i> 试听</button>` : `<button class="btn-play" disabled><i class="fas fa-play"></i> 无音频</button>`}
                ${hasAudio ? `<button class="btn-download" data-title="${escapeHtml(songNameRaw)}" data-url="${s.audioUrl}"><i class="fas fa-download"></i> 下载</button>` : `<button class="btn-download" disabled><i class="fas fa-download"></i> 无音频</button>`}
                <button class="btn-fav ${isFav ? 'active-fav' : ''}" data-id="${s.id}" data-title="${escapeHtml(songNameRaw)}">${favIcon}</button></div></div>`;
        }
        container.innerHTML = html;
        container.querySelectorAll('.btn-play:not([disabled])').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id),
                    title = btn.dataset.title,
                    artist = btn.dataset.artist,
                    url = btn.dataset.url,
                    cover = btn.dataset.cover;
                playSong(id, title, artist, url, cover, btn);
            });
        });
        container.querySelectorAll('.btn-download:not([disabled])').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                downloadSong(btn.dataset.title, btn.dataset.url);
            });
        });
        container.querySelectorAll('.btn-fav').forEach(btn => {
            const id = parseInt(btn.dataset.id),
                title = btn.dataset.title;
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                await toggleFavorite(id, title, btn);
                if (isFavView) await showMyFavorites();
            });
        });
    }

    function renderSongs() {
        if (!allSongs.length) {
            document.getElementById('songsContainer').innerHTML = '<div class="empty-state">暂无曲库，点击「更新曲库」</div>';
            return;
        }
        let filtered = [...allSongs];
        if (currentCategory === '最新') filtered = filtered.filter(s => s.isNew);
        else filtered = filtered.filter(s => s.category === currentCategory);
        if (currentSearchKeyword) filtered = filtered.filter(s => s.name.toLowerCase().includes(currentSearchKeyword.toLowerCase()));
        filtered.sort((a, b) => b.id - a.id);
        document.getElementById('activeCategoryLabel').innerHTML = `${currentCategory === '最新' ? '最新歌曲' : currentCategory}`;
        document.getElementById('songCountInfo').innerHTML = `共 ${filtered.length} 首`;
        renderSongsGrid(filtered, false);
    }

    async function showMyFavorites() {
        if (!currentAccessToken) {
            showToast("请先登录", 1500);
            return;
        }
        isInFavView = true;
        document.getElementById('searchWrapper').classList.add('hide-element');
        document.getElementById('navMenu').classList.add('hide-element');
        const headerDiv = document.getElementById('sectionHeader');
        headerDiv.innerHTML = `<h2 class="category-title" style="background: linear-gradient(135deg, #ff6b6b, #ff8e8e); -webkit-background-clip: text;"><i class="fa-solid fa-heart"></i> 我的收藏</h2><div><button class="back-btn" id="backToLibraryBtn"><i class="fas fa-arrow-left"></i> 返回曲库</button></div>`;
        const container = document.getElementById('songsContainer');
        container.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> 同步中...</div>';
        const ids = await fetchUserFavorites(currentAccessToken);
        favoriteIds.clear();
        ids.forEach(id => favoriteIds.add(Number(id)));
        localStorage.setItem('dance_favs_final', JSON.stringify([...favoriteIds]));
        document.getElementById('favCountBadge').innerText = favoriteIds.size;
        const favSongs = allSongs.filter(s => favoriteIds.has(s.id));
        if (!favSongs.length) container.innerHTML = '<div class="empty-state">💔 暂无收藏歌曲</div>';
        else renderSongsGrid(favSongs, true);
        document.getElementById('backToLibraryBtn')?.addEventListener('click', () => exitFavView());
    }

    function exitFavView() {
        isInFavView = false;
        document.getElementById('searchWrapper').classList.remove('hide-element');
        document.getElementById('navMenu').classList.remove('hide-element');
        const headerDiv = document.getElementById('sectionHeader');
        headerDiv.innerHTML = `<h2 class="category-title" id="activeCategoryLabel">🎵 加载曲库中...</h2><div class="total-info" id="songCountInfo">请稍候</div>`;
        renderSongs();
    }

    async function fetchMusicBasics() {
        const url = "https://dancedemo.shenghuayule.com/Dance/Music/GetMusicList?getAdvanced=true&getNotDisplay=true&getaudio=true&getitem=true";
        const res = await fetch(url);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("获取失败");
        return data.map(i => ({
            id: i.MusicID,
            name: i.Name || "未知",
            artist: i.ArtistName || "舞立方",
            category: "其他",
            levelRange: "Lv.?",
            isNew: false,
            cover: null,
            audioUrl: i.AudioUrl || null
        }));
    }

    async function enrichSongDetail(song) {
        const url = `${API_BASE}/Dance/MusicData/GetValidMusicList?ownerType=1&musicId=${song.id}`;
        try {
            const headers = currentAccessToken ? {
                "Authorization": `Bearer ${currentAccessToken}`
            } : {};
            const res = await fetch(url, {
                headers
            });
            const data = await res.json();
            const detail = Array.isArray(data) ? data[0] : data;
            if (!detail?.MusicID) return song;
            let catCode = detail.MusicCategoryNew ?? detail.MusicCategory ?? 5;
            let cat = CATEGORY_MAP[catCode] || "其他";
            let lvl = "Lv.?";
            if (detail.LevelList?.length) lvl = `Lv.${Math.min(...detail.LevelList)}~${Math.max(...detail.LevelList)}`;
            else if (detail.DifficultyLevel) lvl = `Lv.${detail.DifficultyLevel}`;
            return {
                ...song,
                category: cat,
                artist: detail.ArtistName || song.artist,
                levelRange: lvl
            };
        } catch (e) {
            return song;
        }
    }

    function fixCoverUrl(url) {
        if (!url) return null;
        let u = url;
        if (u.endsWith('/200')) u = u.slice(0, -4);
        if (u.startsWith('//')) u = 'https:' + u;
        return u;
    }

    async function fetchPage(catIdx, page, size = 20) {
        const url = `${API_BASE}/Dance/api/User/GetMusicRankingNew?musicIndex=${catIdx}&page=${page}&pagesize=${size}&machineRank=false&isStrict=false`;
        try {
            const headers = currentAccessToken ? {
                "Authorization": `Bearer ${currentAccessToken}`
            } : {};
            const res = await fetch(url, {
                headers
            });
            if (!res.ok) return null;
            const json = await res.json();
            return json?.List || null;
        } catch (e) {
            return null;
        }
    }

    async function fetchCoversAndLatest() {
        const map = new Map(),
            latest = new Set();
        const MAX = 20,
            SIZE = 20,
            CONC = 5;
        for (const cat of CATEGORY_LIST) {
            let page = 1;
            while (page <= MAX) {
                const batch = [];
                for (let i = 0; i < CONC && page + i <= MAX; i++) batch.push(page + i);
                const results = await Promise.all(batch.map(p => fetchPage(cat.index, p, SIZE)));
                let any = false;
                for (let idx = 0; idx < results.length; idx++) {
                    const list = results[idx];
                    if (list?.length) {
                        any = true;
                        for (const it of list) {
                            const mid = it.MusicID;
                            if (!mid) continue;
                            if (it.Cover && !map.has(mid)) {
                                const fixed = fixCoverUrl(it.Cover);
                                if (fixed) map.set(mid, fixed);
                            }
                            if (cat.index === 1) latest.add(mid);
                        }
                    }
                    if (list && list.length < SIZE) any = false;
                }
                if (!any) break;
                page += CONC;
                await new Promise(r => setTimeout(r, 50));
            }
        }
        return {
            coverMap: map,
            latestSet: latest
        };
    }

    async function loadFullLibrary(isManual = false) {
        if (isManual && !currentAccessToken) {
            showToast("请先登录", 2000);
            return;
        }
        const container = document.getElementById('songsContainer');
        const refreshBtn = document.getElementById('refreshBtn');
        const progArea = document.getElementById('updateProgressArea');
        const progBar = document.getElementById('updateProgressBar');
        const progText = document.getElementById('updateProgressText');
        if (isManual) {
            isRefreshing = true;
            refreshBtn.classList.add('refreshing');
            refreshBtn.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> 更新中...';
            showToast("🔄 更新曲库...", 2000);
        }
        progArea.style.display = 'block';
        progBar.style.width = '0%';
        progText.innerText = '获取歌曲列表 0%';
        try {
            let basics = await fetchMusicBasics();
            progBar.style.width = '20%';
            progText.innerText = '获取详情 20%';
            const batch = 12;
            for (let i = 0; i < basics.length; i += batch) {
                const b = basics.slice(i, i + batch);
                const enriched = await Promise.all(b.map(s => enrichSongDetail(s)));
                for (let j = 0; j < enriched.length; j++) basics[i + j] = enriched[j];
                const pct = 20 + Math.min(40, Math.floor((i / basics.length) * 40));
                progBar.style.width = `${pct}%`;
                progText.innerText = `处理详情 ${Math.min(60, Math.floor((i / basics.length) * 60))}%`;
                await new Promise(r => setTimeout(r, 30));
            }
            progBar.style.width = '60%';
            progText.innerText = '获取封面 60%';
            let coverMap = new Map(),
                latestSet = new Set();
            if (currentAccessToken) {
                const res = await fetchCoversAndLatest();
                coverMap = res.coverMap;
                latestSet = res.latestSet;
            }
            allSongs = basics.map(s => ({
                ...s,
                isNew: latestSet.has(s.id),
                cover: coverMap.get(s.id) || null
            }));
            await syncFavorites();
            progBar.style.width = '100%';
            progText.innerText = '完成!';
            setTimeout(() => progArea.style.display = 'none', 1000);
            const cache = {
                songs: allSongs,
                coverMap: [...coverMap],
                latestIds: [...latestSet],
                updateTime: new Date().toISOString()
            };
            localStorage.setItem('dance_library_cache', JSON.stringify(cache));
            document.getElementById('cacheInfo').innerHTML = `📅 曲库已更新: ${new Date().toLocaleString()} | 共${allSongs.length}首`;
            renderSongs();
            showToast(`✅ 加载完成 | ${allSongs.length}首`, 2000);
        } catch (err) {
            container.innerHTML = `<div class="empty-state">❌ 加载失败: ${err.message}</div>`;
            showToast("加载失败", 2000);
        } finally {
            if (isManual) {
                isRefreshing = false;
                refreshBtn.classList.remove('refreshing');
                refreshBtn.innerHTML = '🔄 更新曲库';
            }
            progArea.style.display = 'none';
        }
    }

    function loadFromCache() {
        const cached = localStorage.getItem('dance_library_cache');
        if (!cached) return false;
        try {
            const d = JSON.parse(cached);
            allSongs = d.songs;
            const cm = new Map(d.coverMap),
                ls = new Set(d.latestIds);
            for (let s of allSongs) {
                s.isNew = ls.has(s.id);
                s.cover = cm.get(s.id) || null;
            }
            const fav = localStorage.getItem('dance_favs_final');
            if (fav) favoriteIds = new Set(JSON.parse(fav));
            document.getElementById('favCountBadge').innerText = favoriteIds.size;
            document.getElementById('cacheInfo').innerHTML = `<i class="fa-solid fa-box"></i>缓存曲库 (${new Date(d.updateTime).toLocaleString()})`;
            renderSongs();
            return true;
        } catch (e) {
            return false;
        }
    }

    async function init() {
        updateLoginUI();
        if (!loadFromCache() && currentAccessToken) await loadFullLibrary(false);
        else if (!loadFromCache()) showToast("未登录，请登录后使用完整功能", 2000);
        if (currentAccessToken) await syncFavorites();
        document.getElementById('searchInput').addEventListener('input', e => {
            if (isInFavView) return;
            clearTimeout(window.st);
            window.st = setTimeout(() => {
                currentSearchKeyword = e.target.value;
                renderSongs();
            }, 300);
        });
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isInFavView) return;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                currentSearchKeyword = '';
                document.getElementById('searchInput').value = '';
                renderSongs();
            });
        });
        document.getElementById('refreshBtn').addEventListener('click', () => {
            if (isRefreshing) return;
            if (!getStoredToken()) {
                showToast("请先登录", 1500);
                return;
            }
            updateLoginUI();
            loadFullLibrary(true);
        });
        document.getElementById('gotoLoginBtn').addEventListener('click', () => window.location.href = './index.html');
        document.getElementById('favCollectionBtn').addEventListener('click', () => showMyFavorites());
        const slider = document.getElementById('progressSlider');
        slider.addEventListener('mousedown', () => isDraggingProgress = true);
        slider.addEventListener('mouseup', () => isDraggingProgress = false);
        slider.addEventListener('click', e => {
            const rect = slider.getBoundingClientRect();
            const percent = ((e.clientX - rect.left) / rect.width) * 100;
            seekTo(percent);
        });
        document.getElementById('playerPlayPauseBtn').addEventListener('click', () => {
            if (currentAudio) {
                if (currentAudio.paused) currentAudio.play();
                else currentAudio.pause();
            }
        });
        document.getElementById('playerCloseBtn').addEventListener('click', () => stopCurrentPlay());
        setInterval(() => {
            if (currentAudio && !isDraggingProgress && currentPlayingSongId) updateProgressDisplay();
        }, 500);
    }
    init();
</script>
</body>
</html>
