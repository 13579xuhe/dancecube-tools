<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>机台扫码登录 - 舞立方</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-light: #e2e8f0;
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --input-bg: #ffffff;
            --input-text: #1e293b;
            --success-bg: #dcfce7;
            --success-text: #15803d;
            --error-bg: #fee2e2;
            --error-text: #b91c1c;
            --info-bg: #e0f2fe;
            --info-text: #0369a1;
        }

        body.dark {
            --bg-gradient-start: #0a0a14;
            --bg-gradient-end: #12121c;
            --text-primary: #eef2ff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --card-bg: #1e1e2c;
            --border-light: #2d2d3a;
            --input-bg: #2a2a38;
            --input-text: #eef2ff;
            --success-bg: #14532d;
            --success-text: #86efac;
            --error-bg: #7f1d1d;
            --error-text: #fca5a5;
            --info-bg: #0c4a6e;
            --info-text: #7dd3fc;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 头部样式 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            color: var(--text-primary);
        }

        .logo-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .theme-toggle {
            padding: 10px 18px;
            border-radius: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        /* 主卡片 */
        .scan-card {
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            margin-bottom: 24px;
            border: 1px solid var(--border-light);
        }

        .card-header {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 24px;
            color: white;
            text-align: center;
        }

        .card-header i {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .card-header h2 {
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .card-body {
            padding: 28px 24px;
        }

        /* 二维码区域 */
        .qr-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .qr-box {
            display: inline-block;
            background: white;
            padding: 16px;
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .qr-box:hover {
            transform: scale(1.02);
        }

        #qrcodeImg {
            width: 220px;
            height: 220px;
            object-fit: contain;
            border-radius: 16px;
        }

        .qr-placeholder {
            width: 220px;
            height: 220px;
            background: var(--feature-bg, #f1f5f9);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            border: 2px dashed var(--border-light);
            cursor: pointer;
        }

        body.dark .qr-placeholder {
            background: #2a2a38;
        }

        .qr-placeholder i {
            font-size: 3rem;
            opacity: 0.5;
        }

        .qr-placeholder span {
            font-size: 0.85rem;
        }

        .scan-tip {
            margin-top: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 登录信息区域 */
        .user-section {
            background: var(--input-bg);
            border-radius: 20px;
            padding: 20px;
            margin-top: 16px;
            border: 1px solid var(--border-light);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            font-weight: bold;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .user-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .logout-btn {
            margin-left: auto;
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .token-info {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            font-size: 0.7rem;
            word-break: break-all;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            margin-top: 12px;
        }

        /* 状态消息 */
        .status-message {
            padding: 12px 16px;
            border-radius: 60px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .status-success {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status-error {
            background: var(--error-bg);
            color: var(--error-text);
        }

        .status-info {
            background: var(--info-bg);
            color: var(--info-text);
        }

        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-light);
            margin-top: 20px;
        }

        @media (max-width: 550px) {
            .qr-box, #qrcodeImg, .qr-placeholder {
                width: 180px;
                height: 180px;
            }
            .card-body {
                padding: 20px;
            }
            .user-header {
                flex-wrap: wrap;
            }
            .logout-btn {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-arcade"></i>
            </div>
            <div class="logo-text">
                <h1>舞立方 · 机台扫码登录</h1>
                <p>扫描机台二维码，快速登录设备</p>
            </div>
        </div>
        <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> 暗色</button>
    </div>

    <div class="scan-card">
        <div class="card-header">
            <i class="fas fa-qrcode"></i>
            <h2>机台扫码登录</h2>
            <p>请使用舞立方机台二维码进行登录</p>
        </div>
        <div class="card-body">
            <!-- 二维码展示区 (扫描机台上的二维码) -->
            <div class="qr-container">
                <div class="qr-box" id="qrBox">
                    <div id="qrDisplayArea" class="qr-placeholder" style="display: flex;">
                        <i class="fas fa-camera"></i>
                        <span>点击上传/扫描二维码</span>
                    </div>
                    <img id="qrcodeImg" style="display: none;" alt="二维码预览">
                </div>
                <div class="scan-tip">
                    <i class="fas fa-info-circle"></i>
                    <span>点击上方区域，选择或拍摄机台二维码图片</span>
                </div>
            </div>

            <!-- 当前登录用户状态 (从本地存储读取, 与index页面共享) -->
            <div class="user-section" id="userSection">
                <div class="user-header">
                    <div class="user-avatar" id="userAvatarDisplay">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-info">
                        <h3 id="userNameDisplay">未登录</h3>
                        <p id="userIdDisplay">请先登录舞立方账号</p>
                    </div>
                    <button class="logout-btn" id="logoutBtn" style="display: none;">退出登录</button>
                </div>
                <div class="token-info" id="tokenInfo">
                    <i class="fas fa-key"></i> Token状态: 未获取
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="btn-group">
                <button class="btn" id="manualSelectBtn"><i class="fas fa-folder-open"></i> 选择图片</button>
                <button class="btn btn-primary" id="sendLoginBtn" disabled><i class="fas fa-sign-in-alt"></i> 发送登录请求</button>
            </div>

            <!-- 状态消息 -->
            <div id="statusMsg" class="status-message status-info" style="display: none;">
                <i class="fas fa-spinner fa-pulse"></i> 等待操作...
            </div>
        </div>
    </div>

    <div class="footer">
        <p>⚠️ 扫码登录后，机台将登录当前舞立方账号 | 数据与《舞立方自制谱谱师工具》同步</p>
        <p style="margin-top: 8px;">🔐 安全提示：请确保二维码来自官方机台</p>
    </div>
</div>

<script>
    // ======================= API 配置 =======================
    const API_BASE = 'https://dancedemo.shenghuayule.com';
    const APP_LOGIN_URL = `${API_BASE}/Dance/api/Machine/AppLogin`;

    // 全局变量
    let currentQrContent = null;      // 解析出的二维码内容
    let accessToken = null;            // 当前用户的 bearer token (与index页面共用localStorage)
    let currentUserData = null;        // 当前登录用户信息

    // ======================= DOM 元素 =======================
    const qrPlaceholder = document.getElementById('qrDisplayArea');
    const qrcodeImg = document.getElementById('qrcodeImg');
    const manualSelectBtn = document.getElementById('manualSelectBtn');
    const sendLoginBtn = document.getElementById('sendLoginBtn');
    const statusMsgDiv = document.getElementById('statusMsg');
    const userNameSpan = document.getElementById('userNameDisplay');
    const userIdSpan = document.getElementById('userIdDisplay');
    const userAvatarDiv = document.getElementById('userAvatarDisplay');
    const logoutBtn = document.getElementById('logoutBtn');
    const tokenInfoDiv = document.getElementById('tokenInfo');
    const themeToggle = document.getElementById('themeToggleBtn');

    // ======================= 辅助函数 =======================
    function showStatus(message, type = 'info', autoHide = false) {
        statusMsgDiv.style.display = 'flex';
        statusMsgDiv.className = `status-message status-${type}`;
        statusMsgDiv.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        if (autoHide) {
            setTimeout(() => {
                if (statusMsgDiv.style.display === 'flex') {
                    statusMsgDiv.style.display = 'none';
                }
            }, 3500);
        }
    }

    function hideStatus() {
        statusMsgDiv.style.display = 'none';
    }

    // 从localStorage加载用户token和信息 (与index页面完全兼容)
    function loadUserFromStorage() {
        try {
            const tokenData = localStorage.getItem('dance_user_token');
            if (tokenData) {
                const parsed = JSON.parse(tokenData);
                if (parsed && parsed.token && new Date(parsed.expireTime) > new Date()) {
                    accessToken = parsed.token;
                } else {
                    // token过期清理
                    localStorage.removeItem('dance_user_token');
                    localStorage.removeItem('dance_user_data');
                    accessToken = null;
                }
            } else {
                accessToken = null;
            }

            const userDataStr = localStorage.getItem('dance_user_data');
            if (userDataStr && accessToken) {
                currentUserData = JSON.parse(userDataStr);
                updateUserUI();
            } else {
                currentUserData = null;
                updateUserUI();
            }
        } catch (e) {
            console.warn('读取用户信息失败', e);
            accessToken = null;
            currentUserData = null;
            updateUserUI();
        }
        // 更新发送按钮状态
        updateSendButtonState();
    }

    // 更新UI显示用户信息
    function updateUserUI() {
        if (currentUserData && accessToken) {
            userNameSpan.innerText = currentUserData.UserName || '舞立方玩家';
            userIdSpan.innerText = `ID: ${currentUserData.UserID || '未知'}`;
            if (currentUserData.HeadimgURL) {
                userAvatarDiv.innerHTML = `<img src="${currentUserData.HeadimgURL}" alt="头像">`;
            } else {
                const initial = (currentUserData.UserName?.charAt(0) || 'U').toUpperCase();
                userAvatarDiv.innerHTML = `<span style="font-size: 1.2rem;">${initial}</span>`;
            }
            logoutBtn.style.display = 'block';
            const tokenShort = accessToken.substring(0, 12) + '...' + accessToken.substring(accessToken.length - 8);
            tokenInfoDiv.innerHTML = `<i class="fas fa-key"></i> Token状态: 已登录 (有效期至 ${new Date(JSON.parse(localStorage.getItem('dance_user_token')).expireTime).toLocaleDateString()})<br><span style="font-size:0.65rem;">Token: ${tokenShort}</span>`;
        } else {
            userNameSpan.innerText = '未登录';
            userIdSpan.innerText = '请先登录舞立方账号';
            userAvatarDiv.innerHTML = '<i class="fas fa-user"></i>';
            logoutBtn.style.display = 'none';
            tokenInfoDiv.innerHTML = '<i class="fas fa-key"></i> Token状态: 未登录，请返回首页登录或手机号登录';
        }
        updateSendButtonState();
    }

    // 更新发送按钮状态: 需要已登录 + 有二维码内容
    function updateSendButtonState() {
        const isLoggedIn = !!(accessToken && currentUserData);
        const hasQr = !!currentQrContent;
        sendLoginBtn.disabled = !(isLoggedIn && hasQr);
        if (!isLoggedIn && hasQr) {
            sendLoginBtn.title = "请先登录账号";
        } else if (isLoggedIn && !hasQr) {
            sendLoginBtn.title = "请先选择机台二维码";
        } else {
            sendLoginBtn.title = "点击发送登录请求到机台";
        }
    }

    // 退出登录 (清空localStorage)
    function logout() {
        if (confirm('确定要退出登录吗？退出后将无法使用机台扫码功能。')) {
            localStorage.removeItem('dance_user_token');
            localStorage.removeItem('dance_user_data');
            accessToken = null;
            currentUserData = null;
            updateUserUI();
            showStatus('已退出登录，请重新登录', 'info', true);
        }
    }

    // 调用机台登录接口 POST /Dance/api/Machine/AppLogin
    // 请求头: Authorization: bearer token
    // Body: { qrCode: "二维码内容" }
    async function sendMachineLoginRequest(qrContent) {
        if (!accessToken) {
            showStatus('未登录，无法发送登录请求', 'error', true);
            return false;
        }
        if (!qrContent || qrContent.trim() === '') {
            showStatus('二维码内容为空，请重新选择', 'error', true);
            return false;
        }

        showStatus('正在发送登录请求到机台...', 'info');
        sendLoginBtn.disabled = true;
        sendLoginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 请求中...';

        try {
            const response = await fetch(APP_LOGIN_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `bearer ${accessToken}`
                },
                body: JSON.stringify({ qrCode: qrContent })
            });

            // 处理响应
            let responseData = null;
            const contentType = response.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                responseData = await response.json();
            } else {
                const text = await response.text();
                responseData = { message: text };
            }

            if (response.ok) {
                // 请求成功
                showStatus(`✅ 登录成功！机台已登录账号 ${currentUserData?.UserName || ''}`, 'success', true);
                // 可以添加震动或额外反馈
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(200);
                }
                return true;
            } else {
                // 请求失败，提取错误信息
                let errMsg = responseData?.message || responseData?.error || `请求失败 (${response.status})`;
                // 处理401未授权情况
                if (response.status === 401) {
                    errMsg = 'Token已失效或未授权，请重新登录';
                    // 清理失效token
                    localStorage.removeItem('dance_user_token');
                    localStorage.removeItem('dance_user_data');
                    accessToken = null;
                    currentUserData = null;
                    updateUserUI();
                }
                showStatus(`❌ 登录失败: ${errMsg}`, 'error', true);
                return false;
            }
        } catch (error) {
            console.error('机台登录接口调用错误:', error);
            showStatus(`网络错误: ${error.message || '请检查网络'}`, 'error', true);
            return false;
        } finally {
            sendLoginBtn.disabled = false;
            sendLoginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 发送登录请求';
            updateSendButtonState();
        }
    }

    // ======================= 二维码解析 (使用html5-qrcode或FileReader) =======================
    // 引入html5-qrcode库进行二维码解码，更可靠
    let html5QrCodeScanner = null;

    // 通过图片文件解析二维码
    async function decodeQrFromImage(file) {
        return new Promise((resolve, reject) => {
            // 动态加载html5-qrcode库（如果未加载）
            if (typeof Html5Qrcode === 'undefined') {
                reject(new Error('二维码库未加载，请刷新页面重试'));
                return;
            }
            const imageUrl = URL.createObjectURL(file);
            const scanner = new Html5Qrcode('temp-scanner');
            // 使用静态图像解码
            Html5Qrcode.scanFile(file, /* showImage= */ false)
                .then(decodedText => {
                    URL.revokeObjectURL(imageUrl);
                    resolve(decodedText);
                })
                .catch(err => {
                    URL.revokeObjectURL(imageUrl);
                    reject(err);
                });
        });
    }

    // 处理用户选择的图片文件
    function handleImageFile(file) {
        if (!file) return;
        // 检查文件类型
        if (!file.type.startsWith('image/')) {
            showStatus('请选择图片文件 (jpg, png等)', 'error', true);
            return;
        }
        // 预览图片
        const reader = new FileReader();
        reader.onload = function(e) {
            qrcodeImg.src = e.target.result;
            qrcodeImg.style.display = 'block';
            qrPlaceholder.style.display = 'none';
        };
        reader.readAsDataURL(file);

        // 解码二维码
        showStatus('正在解析二维码...', 'info');
        decodeQrFromImage(file)
            .then(qrText => {
                if (qrText && qrText.trim()) {
                    currentQrContent = qrText.trim();
                    showStatus(`✅ 二维码解析成功！内容: ${currentQrContent.substring(0, 80)}${currentQrContent.length > 80 ? '...' : ''}`, 'success', true);
                    updateSendButtonState();
                } else {
                    throw new Error('二维码内容为空');
                }
            })
            .catch(err => {
                console.error('解码失败', err);
                showStatus(`❌ 二维码解析失败: 请确保图片包含有效舞立方机台二维码`, 'error', true);
                currentQrContent = null;
                // 重置预览区，让用户重试
                qrcodeImg.style.display = 'none';
                qrPlaceholder.style.display = 'flex';
                updateSendButtonState();
            });
    }

    // 打开文件选择器
    function openFileSelector() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment'; // 手机端默认打开相机
        input.onchange = (e) => {
            if (e.target.files && e.target.files.length > 0) {
                handleImageFile(e.target.files[0]);
            }
        };
        input.click();
    }

    // 重置扫描区域 (清除当前二维码)
    function resetQrArea() {
        currentQrContent = null;
        qrcodeImg.style.display = 'none';
        qrPlaceholder.style.display = 'flex';
        qrcodeImg.src = '';
        updateSendButtonState();
        hideStatus();
        showStatus('已重置，可重新选择二维码', 'info', true);
    }

    // ======================= 监听登录成功后的定期同步用户状态 =======================
    // 监听localStorage变化 (多标签页同步)
    window.addEventListener('storage', (event) => {
        if (event.key === 'dance_user_token' || event.key === 'dance_user_data') {
            loadUserFromStorage();
            showStatus('用户信息已更新', 'info', true);
        }
    });

    // ======================= 主题切换 =======================
    function initTheme() {
        if (localStorage.getItem('dance_theme') === 'dark') {
            document.body.classList.add('dark');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i> 浅色';
        } else {
            document.body.classList.remove('dark');
            themeToggle.innerHTML = '<i class="fas fa-moon"></i> 暗色';
        }
    }
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('dance_theme', isDark ? 'dark' : 'light');
        themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> 浅色' : '<i class="fas fa-moon"></i> 暗色';
    }

    // ======================= 事件绑定与初始化 =======================
    function bindEvents() {
        manualSelectBtn.addEventListener('click', openFileSelector);
        sendLoginBtn.addEventListener('click', async () => {
            if (!currentQrContent) {
                showStatus('请先选择并解析机台二维码', 'error', true);
                return;
            }
            if (!accessToken) {
                showStatus('请先登录账号（点击头像返回主页登录）', 'error', true);
                return;
            }
            await sendMachineLoginRequest(currentQrContent);
        });
        logoutBtn.addEventListener('click', logout);
        // 点击二维码区域也可重新选择（方便）
        const qrBoxDiv = document.getElementById('qrBox');
        qrBoxDiv.addEventListener('click', (e) => {
            // 避免点到内部图片触发两次
            if (e.target === sendLoginBtn || e.target.closest('.btn')) return;
            openFileSelector();
        });
        themeToggle.addEventListener('click', toggleTheme);
    }

    // 加载html5-qrcode库并初始化
    function loadHtml5QrCodeLib() {
        return new Promise((resolve, reject) => {
            if (typeof Html5Qrcode !== 'undefined') {
                resolve();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
            script.onload = () => resolve();
            script.onerror = () => reject(new Error('加载二维码库失败'));
            document.head.appendChild(script);
        });
    }

    async function init() {
        await loadHtml5QrCodeLib().catch(e => console.warn(e));
        initTheme();
        loadUserFromStorage();
        bindEvents();
        // 额外处理userAvatar点击跳转回到首页登录（方便用户登录）
        const userAvatar = document.querySelector('.user-avatar');
        if (userAvatar) {
            userAvatar.style.cursor = 'pointer';
            userAvatar.addEventListener('click', () => {
                if (!accessToken) {
                    if (confirm('未登录，是否跳转到主页进行登录？')) {
                        window.location.href = './index.html';
                    }
                } else {
                    // 已登录可以查看用户详情，但为了体验也允许跳转至个人页面 (可选)
                    showStatus(`当前已登录: ${currentUserData?.UserName}`, 'info', true);
                }
            });
        }

        // 若登录后无token引导
        if (!accessToken) {
            showStatus('请先登录舞立方账号，登录后即可扫码机台', 'info', false);
            setTimeout(() => hideStatus(), 4000);
        }
    }

    init();
</script>
</body>
</html>
