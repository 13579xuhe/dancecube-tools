<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>极连快传 · 国内优化 | 自动+手动双模P2P</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 主题变量 */
        :root {
            --bg-gradient-start: #f0f4fe;
            --bg-gradient-end: #e2eafc;
            --card-bg: rgba(255, 255, 255, 0.92);
            --card-border: rgba(80, 90, 210, 0.35);
            --text-primary: #1a1f3a;
            --text-secondary: #2c3a66;
            --accent: #5b4bdb;
            --accent-light: #7f6eff;
            --badge-bg: #e2eaff;
            --input-bg: #ffffff;
            --placeholder-color: #8d9bb8;
            --device-item-bg: #ffffffcc;
            --shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            --border-light: #cad2ff;
            --online-led: #2bcf5e;
        }

        body.dark {
            --bg-gradient-start: #0c0925;
            --bg-gradient-end: #19153b;
            --card-bg: rgba(28, 22, 65, 0.92);
            --card-border: rgba(120, 95, 240, 0.55);
            --text-primary: #f0ebff;
            --text-secondary: #cbc2f0;
            --accent: #8c74ff;
            --accent-light: #a690ff;
            --badge-bg: #30277a;
            --input-bg: #201c48;
            --placeholder-color: #a094d0;
            --device-item-bg: #2f2870cc;
            --shadow: 0 12px 28px rgba(0, 0, 0, 0.5);
            --border-light: #534bae;
            --online-led: #6eff8c;
        }

        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            padding: 0;
        }

        .app {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        /* 头部 */
        .header {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 18px 20px 14px;
            text-align: center;
            border-radius: 40px;
            margin-bottom: 16px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
            position: relative;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sub { font-size: 0.75rem; opacity: 0.8; margin-top: 6px; }
        .theme-switch {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
            color: var(--text-primary);
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow);
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 14px;
            color: var(--accent);
        }
        .badge {
            background: var(--badge-bg);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* ID展示区 */
        .id-box {
            background: var(--input-bg);
            border-radius: 60px;
            padding: 12px 16px;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: center;
            word-break: break-all;
            border: 1px solid var(--border-light);
        }
        .btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .btn-sm { padding: 6px 14px; font-size: 0.7rem; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        /* 手动连接区 */
        .manual-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.8rem;
            outline: none;
        }

        /* 设备列表 */
        .device-list {
            background: rgba(0, 0, 0, 0.06);
            border-radius: 28px;
            padding: 10px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }
        .device-item {
            background: var(--device-item-bg);
            border-radius: 60px;
            padding: 8px 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-light);
        }
        .device-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .online-led { width: 9px; height: 9px; background: var(--online-led); border-radius: 10px; box-shadow: 0 0 5px #5eff7c; }
        .device-name { font-weight: 500; font-size: 0.85rem; }
        .device-id-short { font-size: 0.65rem; background: var(--badge-bg); padding: 2px 8px; border-radius: 40px; }
        .send-btn { background: var(--accent); border: none; color: white; padding: 5px 16px; border-radius: 40px; font-size: 0.7rem; cursor: pointer; }
        .empty-tip { text-align: center; padding: 28px 12px; opacity: 0.7; font-size: 0.85rem; }

        /* 文件区域 */
        .file-row {
            background: var(--input-bg);
            border-radius: 60px;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .progress-bar { background: #302c5a; border-radius: 40px; height: 8px; overflow: hidden; margin: 8px 0; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 40px; }
        .status-text { font-size: 0.7rem; margin-top: 6px; text-align: center; }
        .received-list { max-height: 160px; overflow-y: auto; }
        .received-item {
            background: var(--device-item-bg);
            border-radius: 24px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .download-link { background: var(--accent); padding: 4px 12px; border-radius: 40px; font-size: 0.65rem; cursor: pointer; color: white; text-decoration: none; }
        footer { text-align: center; padding: 12px; font-size: 0.6rem; opacity: 0.7; }
        button:active { transform: scale(0.96); }

        /* 测速弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .speed-modal {
            background: var(--card-bg); border-radius: 48px; max-width: 320px;
            width: 80%; padding: 28px 20px; text-align: center;
            border: 1px solid var(--accent); color: var(--text-primary);
        }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(128,128,255,0.3); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 10px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .tip { font-size: 0.7rem; color: var(--text-secondary); }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1><span>⚡</span> 极连快传 · 国内优化</h1>
        <div class="sub">自动发现 + 手动连接 | 国内STUN服务器</div>
        <div class="theme-switch" id="themeToggleBtn">🌓 主题</div>
    </div>

    <!-- 本机ID + 操作栏 -->
    <div class="card">
        <div class="card-title">🆔 我的设备ID <div class="badge">自动发现靠它</div></div>
        <div class="id-box" id="localDeviceIdDisplay">加载中...</div>
        <div class="flex-row" style="margin-top: 12px; justify-content: space-between;">
            <button class="btn btn-sm" id="copyIdBtn">📋 复制ID</button>
            <button class="btn btn-sm btn-outline" id="rescanDevicesBtn">🔄 重新搜索</button>
            <button class="btn btn-sm btn-outline" id="speedTestBtn">📡 网络测速</button>
        </div>
    </div>

    <!-- 手动连接区 + 自动设备列表 -->
    <div class="card">
        <div class="card-title">🔗 连接方式</div>
        <div class="flex-row" style="margin-bottom: 16px;">
            <input type="text" id="manualRemoteId" class="manual-input" placeholder="输入对方设备ID (手动连接)">
            <button class="btn" id="manualConnectBtn">手动连接</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin: 12px 0 8px;">
            <span style="font-size:0.75rem;">✨ 自动发现设备 (同网络)</span>
            <span id="deviceCountBadge" style="background: var(--badge-bg); padding:2px 10px; border-radius:40px; font-size:0.7rem;">0</span>
        </div>
        <div class="device-list" id="autoDeviceList">
            <div class="empty-tip">⏳ 正在自动搜索同网络设备...</div>
        </div>
        <div class="tip" style="margin-top: 10px; text-align:center;">💡 自动失败请用手动连接，复制对方ID粘贴即可</div>
    </div>

    <!-- 已连接设备 -->
    <div class="card">
        <div class="card-title">📡 当前连接 <div class="badge">活跃会话</div></div>
        <div id="activeConnectionInfo" class="tip" style="padding: 12px; text-align:center;">暂无连接，点击设备「连接」或手动连接</div>
        <div id="connectedDeviceActions" style="display: none; margin-top: 10px;">
            <button class="btn btn-sm" id="disconnectBtn">断开连接</button>
        </div>
    </div>

    <!-- 文件发送区 -->
    <div class="card">
        <div class="card-title">📤 发送文件</div>
        <div class="file-row">
            <label class="btn btn-sm" for="fileInput" style="background: var(--accent); padding: 8px 18px;">📁 选择文件</label>
            <span id="selectedFileName" style="font-size:0.75rem;">未选择</span>
            <input type="file" id="fileInput" style="display:none">
        </div>
        <div id="sendProgressArea" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="sendProgressFill"></div></div>
            <div class="status-text" id="sendStatusMsg">准备传输</div>
        </div>
        <div class="tip" style="text-align:center;">👉 选择文件后，点击下方设备「发送」按钮</div>
    </div>

    <!-- 接收记录 -->
    <div class="card">
        <div class="card-title">📥 已接收文件</div>
        <div class="received-list" id="receivedFilesList">
            <div class="tip">暂无接收文件</div>
        </div>
    </div>
    <footer>🔒 WebRTC P2P 加密 | 国内STUN服务器 (stun.miwifi.com, stun.qq.com)</footer>
</div>

<script>
    (function(){
        // ==================== 国内优化版：使用国内可用的STUN服务器 ====================
        // 国内STUN服务器列表 (更稳定)
        const ICE_SERVERS = [
            { urls: "stun:stun.miwifi.com:3478" },      // 小米STUN
            { urls: "stun:stun.qq.com:3478" },          // 腾讯STUN
            { urls: "stun:stun.l.google.com:19302" },   // 备用Google (国内部分可用)
            { urls: "stun:stun.chathelp.com:3478" }     // 备用
        ];

        let localPeerId = "";
        let currentConnection = null;
        let currentDataChannel = null;
        let connectedRemoteId = null;

        let discoveredPeers = new Map();
        let selectedFileBuffer = null;
        let selectedFileName = "";
        let isTransferring = false;
        let currentReceive = null;
        let receivedBlobUrls = [];

        const CHANNEL_NAME = "DUAL_MODE_P2P_CN_V2";
        let broadcastChannel = null;

        // ========== 辅助函数 ==========
        function generateDeviceId() {
            return `peer_${Math.random().toString(36).substring(2,10)}${Date.now().toString(36).slice(-5)}`;
        }
        function getLocalId() {
            let stored = localStorage.getItem("dual_mode_p2p_cn_id");
            if(!stored) { stored = generateDeviceId(); localStorage.setItem("dual_mode_p2p_cn_id", stored); }
            return stored;
        }
        function getDeviceFriendlyName() {
            let isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
            return `${isMobile ? "📱" : "💻"} ${localPeerId.slice(-6)}`;
        }

        function initBroadcast() {
            if(broadcastChannel) broadcastChannel.close();
            broadcastChannel = new BroadcastChannel(CHANNEL_NAME);
            broadcastChannel.onmessage = handleSignalMessage;
        }

        function sendSignal(targetId, type, payload) {
            if(!broadcastChannel) return;
            broadcastChannel.postMessage({ from: localPeerId, to: targetId, type, payload, senderName: getDeviceFriendlyName() });
        }

        function announcePresence() {
            sendSignal("*", "peer_hello", { name: getDeviceFriendlyName(), timestamp: Date.now() });
        }

        function sendBye() { if(connectedRemoteId) sendSignal(connectedRemoteId, "peer_bye", {}); }

        // ========== WebRTC 连接核心 (使用国内STUN) ==========
        async function createConnection(remoteId, isInitiator = true) {
            if(currentConnection) {
                if(currentDataChannel) currentDataChannel.close();
                currentConnection.close();
                currentConnection = null;
                currentDataChannel = null;
            }

            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

            let dc = null;
            if(isInitiator) {
                dc = pc.createDataChannel("fileTransfer", { ordered: true });
                setupDataChannel(dc, remoteId);
            } else {
                pc.ondatachannel = (event) => {
                    dc = event.channel;
                    setupDataChannel(dc, remoteId);
                    currentDataChannel = dc;
                };
            }

            pc.onicecandidate = (ev) => {
                if(ev.candidate) sendSignal(remoteId, "ice_candidate", ev.candidate);
            };

            pc.oniceconnectionstatechange = () => {
                console.log("ICE状态:", pc.iceConnectionState);
                if(pc.iceConnectionState === "connected") {
                    updateActiveConnectionUI(remoteId);
                } else if(pc.iceConnectionState === "failed") {
                    if(connectedRemoteId === remoteId) {
                        alert("连接失败，请尝试手动连接或检查网络");
                        updateActiveConnectionUI(null);
                    }
                }
            };

            currentConnection = pc;
            if(dc) currentDataChannel = dc;
            connectedRemoteId = remoteId;
            updateActiveConnectionUI(remoteId);

            if(isInitiator) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendSignal(remoteId, "offer", { sdp: offer.sdp });
            }
            return pc;
        }

        function setupDataChannel(dc, remoteId) {
            dc.onopen = () => {
                console.log("DataChannel opened", remoteId);
                updateActiveConnectionUI(remoteId);
                if(selectedFileBuffer && !isTransferring && connectedRemoteId === remoteId) {
                    startSendFile(selectedFileBuffer, selectedFileName);
                }
            };
            dc.onclose = () => {
                if(connectedRemoteId === remoteId) {
                    connectedRemoteId = null;
                    updateActiveConnectionUI(null);
                }
            };
            dc.onerror = (err) => console.error("DataChannel error", err);
            dc.onmessage = async (ev) => {
                if(ev.data instanceof ArrayBuffer) {
                    await handleFileChunk(ev.data);
                } else if(typeof ev.data === "string") {
                    try {
                        let msg = JSON.parse(ev.data);
                        if(msg.type === "file_meta") {
                            prepareReceiveFile(msg.fileName, msg.fileSize, msg.totalChunks);
                        } else if(msg.type === "chunk_ack" && isTransferring) {
                            let percent = msg.progress;
                            document.getElementById("sendProgressArea").style.display = "block";
                            document.getElementById("sendProgressFill").style.width = percent + "%";
                            document.getElementById("sendStatusMsg").innerText = `发送中 ${Math.round(percent)}%`;
                            if(percent >= 99.9) {
                                isTransferring = false;
                                document.getElementById("sendStatusMsg").innerText = "✅ 发送完成!";
                                setTimeout(() => {
                                    document.getElementById("sendProgressArea").style.display = "none";
                                    selectedFileBuffer = null;
                                    document.getElementById("selectedFileName").innerText = "未选择";
                                }, 1500);
                            }
                        }
                    } catch(e) {}
                }
            };
        }

        function prepareReceiveFile(fileName, fileSize, totalChunks) {
            currentReceive = {
                chunks: new Array(totalChunks),
                fileName: fileName,
                fileSize: fileSize,
                totalChunks: totalChunks,
                recvCount: 0
            };
            document.getElementById("sendProgressArea").style.display = "block";
            document.getElementById("sendStatusMsg").innerText = `接收 ${fileName} ...`;
        }

        async function handleFileChunk(chunkBuf) {
            if(!currentReceive) return;
            const index = new Uint32Array(chunkBuf, 0, 1)[0];
            const data = chunkBuf.slice(4);
            if(!currentReceive.chunks[index]) {
                currentReceive.chunks[index] = data;
                currentReceive.recvCount++;
            }
            const percent = (currentReceive.recvCount / currentReceive.totalChunks) * 100;
            document.getElementById("sendProgressFill").style.width = percent + "%";
            document.getElementById("sendStatusMsg").innerText = `接收中 ${Math.round(percent)}%`;

            if(currentDataChannel && currentDataChannel.readyState === "open") {
                currentDataChannel.send(JSON.stringify({ type: "chunk_ack", progress: percent }));
            }

            if(currentReceive.recvCount === currentReceive.totalChunks) {
                const blob = new Blob(currentReceive.chunks, { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                receivedBlobUrls.push(url);
                addToReceivedList(currentReceive.fileName, currentReceive.fileSize, url);
                currentReceive = null;
                document.getElementById("sendStatusMsg").innerText = `✅ 接收完成!`;
                setTimeout(() => {
                    if(!isTransferring) document.getElementById("sendProgressArea").style.display = "none";
                }, 2000);
            }
        }

        function addToReceivedList(fileName, fileSize, blobUrl) {
            const container = document.getElementById("receivedFilesList");
            if(container.innerText.includes("暂无接收文件")) container.innerHTML = "";
            const div = document.createElement("div");
            div.className = "received-item";
            div.innerHTML = `<span>📄 ${fileName} (${(fileSize/1024).toFixed(1)} KB)</span>
                            <a class="download-link" data-url="${blobUrl}" data-name="${fileName}">💾 保存</a>`;
            container.prepend(div);
            div.querySelector(".download-link").addEventListener("click", () => {
                const a = document.createElement("a");
                a.href = blobUrl;
                a.download = fileName;
                a.click();
            });
        }

        async function startSendFile(fileBuffer, fileName) {
            if(!currentDataChannel || currentDataChannel.readyState !== "open") {
                alert("未连接设备，请先连接");
                return false;
            }
            if(isTransferring) { alert("正在传输中"); return false; }
            isTransferring = true;
            const chunkSize = 16384;
            const totalChunks = Math.ceil(fileBuffer.byteLength / chunkSize);
            currentDataChannel.send(JSON.stringify({ type: "file_meta", fileName, fileSize: fileBuffer.byteLength, totalChunks }));
            for(let i=0; i<totalChunks; i++) {
                const start = i * chunkSize;
                const end = Math.min(start+chunkSize, fileBuffer.byteLength);
                const chunk = fileBuffer.slice(start, end);
                const header = new ArrayBuffer(4);
                new Uint32Array(header)[0] = i;
                const combined = new Uint8Array(header.byteLength + chunk.byteLength);
                combined.set(new Uint8Array(header), 0);
                combined.set(new Uint8Array(chunk), 4);
                currentDataChannel.send(combined.buffer);
                const percent = ((i+1)/totalChunks)*100;
                document.getElementById("sendProgressArea").style.display = "block";
                document.getElementById("sendProgressFill").style.width = percent + "%";
                document.getElementById("sendStatusMsg").innerText = `发送 ${fileName} ${Math.round(percent)}%`;
                await new Promise(r => setTimeout(r, 2));
            }
        }

        // ========== 信令处理 ==========
        async function handleSignalMessage(event) {
            const msg = event.data;
            if(!msg || msg.from === localPeerId) return;
            const { from, type, payload } = msg;

            if(type === "peer_hello") {
                if(!discoveredPeers.has(from)) {
                    discoveredPeers.set(from, { name: payload?.name || `设备·${from.slice(-6)}`, lastSeen: Date.now() });
                    updateAutoDeviceList();
                }
                sendSignal(from, "peer_hello_ack", {});
            }
            else if(type === "peer_hello_ack") {
                if(!discoveredPeers.has(from)) {
                    discoveredPeers.set(from, { name: `设备·${from.slice(-6)}`, lastSeen: Date.now() });
                    updateAutoDeviceList();
                }
            }
            else if(type === "offer") {
                if(connectedRemoteId && connectedRemoteId !== from) {
                    console.log("已有连接，忽略新offer");
                    return;
                }
                const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
                pc.onicecandidate = (ev) => { if(ev.candidate) sendSignal(from, "ice_candidate", ev.candidate); };
                pc.ondatachannel = (event) => {
                    setupDataChannel(event.channel, from);
                    currentDataChannel = event.channel;
                };
                await pc.setRemoteDescription({ type: "offer", sdp: payload.sdp });
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                sendSignal(from, "answer", { sdp: answer.sdp });
                currentConnection = pc;
                connectedRemoteId = from;
                updateActiveConnectionUI(from);
            }
            else if(type === "answer") {
                if(currentConnection && currentConnection.signalingState !== "closed") {
                    await currentConnection.setRemoteDescription({ type: "answer", sdp: payload.sdp });
                }
            }
            else if(type === "ice_candidate") {
                if(currentConnection) {
                    try { await currentConnection.addIceCandidate(new RTCIceCandidate(payload)); } catch(e) {}
                }
            }
            else if(type === "peer_bye") {
                if(connectedRemoteId === from) {
                    if(currentConnection) currentConnection.close();
                    currentConnection = null;
                    currentDataChannel = null;
                    connectedRemoteId = null;
                    updateActiveConnectionUI(null);
                }
                discoveredPeers.delete(from);
                updateAutoDeviceList();
            }
        }

        function updateAutoDeviceList() {
            const container = document.getElementById("autoDeviceList");
            const devices = Array.from(discoveredPeers.keys());
            document.getElementById("deviceCountBadge").innerText = devices.length;
            if(devices.length === 0) {
                container.innerHTML = `<div class="empty-tip">🔍 未发现设备，确保其他设备打开本页面<br>或使用「手动连接」</div>`;
                return;
            }
            container.innerHTML = "";
            devices.forEach(remoteId => {
                const info = discoveredPeers.get(remoteId);
                const isConnected = (connectedRemoteId === remoteId);
                const div = document.createElement("div");
                div.className = "device-item";
                div.innerHTML = `
                    <div class="device-info">
                        <span class="online-led"></span>
                        <span class="device-name">${escapeHtml(info.name)}</span>
                        <span class="device-id-short">${remoteId.slice(-8)}</span>
                        ${isConnected ? '<span style="font-size:0.6rem; background:#10b98120; padding:2px 8px; border-radius:20px;">已连接</span>' : ''}
                    </div>
                    <div>
                        ${!isConnected ? `<button class="send-btn" data-id="${remoteId}" data-action="connect">🔌 连接</button>` : `<button class="send-btn" data-id="${remoteId}" data-action="send">📤 发送</button>`}
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.send-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const remoteId = btn.getAttribute('data-id');
                    const action = btn.getAttribute('data-action');
                    if(action === "connect") {
                        await createConnection(remoteId, true);
                    } else if(action === "send") {
                        if(!selectedFileBuffer) {
                            alert("请先选择文件");
                            document.getElementById("fileInput").click();
                            return;
                        }
                        if(!currentDataChannel || currentDataChannel.readyState !== "open") {
                            alert("连接未就绪，请稍后");
                            return;
                        }
                        startSendFile(selectedFileBuffer, selectedFileName);
                    }
                });
            });
        }

        function updateActiveConnectionUI(remoteId) {
            const container = document.getElementById("activeConnectionInfo");
            const actionsDiv = document.getElementById("connectedDeviceActions");
            if(remoteId) {
                container.innerHTML = `<div style="background: var(--badge-bg); border-radius: 40px; padding: 8px 16px; text-align:center;">✅ 已连接: ${remoteId.slice(-12)}</div>`;
                actionsDiv.style.display = "block";
            } else {
                container.innerHTML = `<div class="tip">暂无连接，点击设备「连接」或手动连接</div>`;
                actionsDiv.style.display = "none";
            }
        }

        function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        async function manualConnect(remoteId) {
            if(remoteId === localPeerId) { alert("不能连接自己"); return; }
            if(connectedRemoteId === remoteId) { alert("已经连接该设备"); return; }
            await createConnection(remoteId, true);
        }

        function rescanDevices() {
            discoveredPeers.clear();
            announcePresence();
            setTimeout(() => announcePresence(), 300);
            setTimeout(() => announcePresence(), 800);
            updateAutoDeviceList();
        }

        function showSpeedTest() {
            const modal = document.createElement("div");
            modal.className = "modal-overlay";
            modal.innerHTML = `
                <div class="speed-modal">
                    <h3>📡 网络测速</h3>
                    <div id="speedContent"><div class="spinner"></div><div>测试STUN服务器延迟...</div></div>
                    <div style="font-size:11px; margin-top:12px;">测试与国内STUN服务器连通性</div>
                    <button class="btn btn-sm" id="closeSpeedBtn" style="margin-top:16px;">关闭</button>
                </div>
            `;
            document.body.appendChild(modal);
            const start = performance.now();
            // 测试连接一个国内可访问的资源
            fetch("https://www.baidu.com/favicon.ico", { mode: 'no-cors', cache: 'no-store' })
                .catch(() => null).finally(() => {
                const latency = Math.round(performance.now() - start);
                const content = modal.querySelector("#speedContent");
                if(latency < 3000) {
                    content.innerHTML = `<div style="font-size:2rem;">${latency} ms</div><div>网络正常，可进行P2P传输</div><div style="font-size:11px; margin-top:8px;">国内STUN服务器可用</div>`;
                } else {
                    content.innerHTML = `<div>⏱️ 延迟较高 (${latency}ms)</div><div>请检查网络或使用手动连接</div>`;
                }
            });
            modal.querySelector("#closeSpeedBtn").addEventListener("click", () => modal.remove());
        }

        // ========== 初始化 ==========
        localPeerId = getLocalId();
        document.getElementById("localDeviceIdDisplay").innerText = localPeerId;
        initBroadcast();
        announcePresence();
        setInterval(() => announcePresence(), 6000);
        setInterval(() => updateAutoDeviceList(), 4000);

        // 文件选择
        const fileInput = document.getElementById("fileInput");
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById("selectedFileName").innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedFileBuffer = ev.target.result;
                selectedFileName = file.name;
            };
            reader.readAsArrayBuffer(file);
        });

        // 按钮事件
        document.getElementById("copyIdBtn").addEventListener("click", () => {
            navigator.clipboard.writeText(localPeerId);
            alert("设备ID已复制: " + localPeerId);
        });
        document.getElementById("rescanDevicesBtn").addEventListener("click", () => rescanDevices());
        document.getElementById("speedTestBtn").addEventListener("click", () => showSpeedTest());
        document.getElementById("manualConnectBtn").addEventListener("click", () => {
            const rid = document.getElementById("manualRemoteId").value.trim();
            if(!rid) { alert("请输入对方设备ID"); return; }
            manualConnect(rid);
        });
        document.getElementById("disconnectBtn")?.addEventListener("click", () => {
            if(currentConnection) currentConnection.close();
            currentConnection = null;
            currentDataChannel = null;
            connectedRemoteId = null;
            updateActiveConnectionUI(null);
        });

        // 主题切换
        let dark = false;
        document.getElementById("themeToggleBtn").addEventListener("click", () => {
            dark = !dark;
            if(dark) document.body.classList.add("dark");
            else document.body.classList.remove("dark");
        });

        window.addEventListener("beforeunload", () => {
            sendBye();
            receivedBlobUrls.forEach(url => URL.revokeObjectURL(url));
        });

        updateAutoDeviceList();
    })();
</script>
</body>
</html>
