<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JOKER密码锁 | 全字母高亮 | 丝滑弹幕滚动</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a0f12 0%, #030608 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Monaco', 'Courier New', monospace;
            padding: 20px;
        }

        .lock-main {
            transition: opacity 0.5s ease;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 胜利浮层 */
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s 0.6s;
        }

        .victory-overlay.active {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s 0s;
        }

        .victory-card {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 48px;
            padding: 20px;
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,215,0,0.3);
            animation: floatIn 0.5s ease-out;
            cursor: pointer;
        }

        .victory-card img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
            display: block;
        }

        @keyframes floatIn {
            0% { transform: scale(0.92) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .lock-container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 3.5rem;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 200, 70, 0.5);
        }

        .reels-panel {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .reel-unit {
            background: #2c2116;
            background-image: radial-gradient(circle at 30% 20%, rgba(90, 65, 35, 0.5) 1.5px, transparent 1.5px);
            background-size: 12px 12px;
            border-radius: 32px;
            padding: 10px 6px 6px 6px;
            box-shadow: inset 0 0 0 2px #6e4a28, 0 12px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .reel-frame {
            background: #0c0803;
            border-radius: 28px;
            padding: 6px 4px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.9), 0 1px 3px rgba(255,200,100,0.4);
        }

        .reel-window {
            position: relative;
            width: 85px;
            height: 135px;
            background: #1f180f;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: inset 0 0 0 2px #e6bc6b, inset 0 0 0 5px #2c2419;
            cursor: default;
            transition: box-shadow 0.2s ease;
        }

        .rolling-strip {
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        .letter-item {
            height: 45px;
            width: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: 'Courier New', 'Monaco', monospace;
            text-shadow: 0 2px 3px #000000aa;
            color: #f3e5c0;
            background: #2e251a;
            margin: 0px;
            border-radius: 18px;
            transition: all 0.08s ease;
        }

        /* 绿色高亮样式 - 用于所有需要选择的正确字母（无论是否在中间选定位置）*/
        .letter-correct-highlight {
            color: #aaffaa !important;
            text-shadow: 0 0 8px #00ff66, 0 0 3px #00cc44 !important;
            background: #2a6e2a !important;
            box-shadow: inset 0 0 6px #88ff88;
        }

        /* 中间选定字母且正确锁定时的特殊强化 */
        .letter-middle-locked {
            color: #ccffcc !important;
            text-shadow: 0 0 12px #2eff8e !important;
            background: #1f8a1f !important;
            box-shadow: inset 0 0 12px #aaffaa;
        }

        .reel-window::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 8px;
            right: 8px;
            height: 45px;
            transform: translateY(-50%);
            background: rgba(255, 210, 90, 0.12);
            border-radius: 24px;
            pointer-events: none;
            border-top: 1.5px solid #f3bc5c;
            border-bottom: 1.5px solid #f3bc5c;
            box-shadow: inset 0 0 6px rgba(255, 200, 50, 0.3);
            z-index: 2;
        }

        .reel-status {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            background: #1f1910;
            border-radius: 40px;
            padding: 5px 0;
            color: #dba551;
            transition: 0.1s;
        }

        .status-correct {
            color: #8effa2;
            text-shadow: 0 0 4px #00cc44;
            background: #1f3a28;
        }

        .wrong-flash {
            animation: redFlashBang 0.25s ease-in-out 2;
        }

        @keyframes redFlashBang {
            0% { background-color: #881111; color: #ffbbbb; text-shadow: 0 0 5px red; }
            50% { background-color: #ff4d4d; color: white; }
            100% { background-color: #1f1910; color: #dba551; }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .unlock-btn {
            background: radial-gradient(circle at 30% 20%, #ffd966, #c17d2c);
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: monospace;
            padding: 12px 28px;
            border-radius: 60px;
            letter-spacing: 4px;
            color: #271e0c;
            text-shadow: 0 1px 2px #ffefb0;
            box-shadow: 0 7px 0 #7a451a;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .unlock-btn:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #7a451a;
        }

        .reset-btn {
            background: #3d3527;
            box-shadow: 0 5px 0 #252016;
            font-size: 1.2rem;
            letter-spacing: 2px;
            padding: 8px 22px;
            color: #ffdf9c;
        }

        .message-area {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            background: #00000080;
            border-radius: 60px;
            padding: 8px 15px;
            color: #ffde9e;
            word-break: break-word;
        }

        .unlock-btn:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        /* ========== 电脑端样式优化 (默认大屏) ========== */
        @media (min-width: 1024px) {
            .reels-panel {
                gap: 1.8rem;
            }
            .reel-window {
                width: 100px;
                height: 150px;
            }
            .letter-item {
                height: 50px;
                width: 84px;
                font-size: 2.5rem;
            }
            .unlock-btn {
                font-size: 2rem;
                padding: 14px 36px;
            }
            .reset-btn {
                font-size: 1.4rem;
                padding: 10px 28px;
            }
            .lock-container {
                padding: 2.5rem 2.8rem 2.8rem;
            }
        }

        /* ========== 平板 / 手机端精细样式 ========== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .lock-container {
                padding: 1.2rem 1rem 1.6rem;
                border-radius: 2rem;
            }
            .reels-panel {
                gap: 0.65rem;
                margin-bottom: 1.5rem;
            }
            .reel-unit {
                padding: 6px 4px 4px 4px;
                border-radius: 24px;
            }
            .reel-frame {
                padding: 4px 2px;
            }
            .reel-window {
                width: 65px;
                height: 110px;
                border-radius: 22px;
            }
            .letter-item {
                height: 36px;
                width: 54px;
                font-size: 1.6rem;
                border-radius: 14px;
            }
            .reel-window::before {
                height: 36px;
                left: 4px;
                right: 4px;
            }
            .reel-status {
                font-size: 0.7rem;
                margin-top: 6px;
                padding: 3px 0;
            }
            .controls {
                gap: 14px;
                margin-top: 12px;
            }
            .unlock-btn {
                font-size: 1.3rem;
                padding: 8px 20px;
                letter-spacing: 2px;
            }
            .reset-btn {
                font-size: 1rem;
                padding: 6px 16px;
            }
            .message-area {
                font-size: 0.75rem;
                margin-top: 14px;
                padding: 6px 12px;
            }
            footer {
                font-size: 9px;
                margin-top: 12px;
            }
        }

        /* 超小折叠屏/窄屏加强适配 */
        @media (max-width: 480px) {
            .reels-panel {
                gap: 0.5rem;
            }
            .reel-window {
                width: 58px;
                height: 98px;
            }
            .letter-item {
                height: 32px;
                width: 48px;
                font-size: 1.4rem;
            }
            .reel-window::before {
                height: 32px;
            }
            .unlock-btn {
                font-size: 1.1rem;
                padding: 6px 16px;
            }
            .reset-btn {
                font-size: 0.9rem;
                padding: 5px 12px;
            }
            .lock-container {
                padding: 1rem 0.8rem 1.2rem;
            }
            .reel-status {
                font-size: 0.65rem;
            }
        }

        footer {
            text-align: center;
            margin-top: 16px;
            font-size: 10px;
            color: #aa8f60;
            opacity: 0.8;
        }

        /* 点击按钮辅助 */
        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="lock-main" id="lockMain">
    <div class="lock-container">
        <div class="reels-panel" id="reelsPanel"></div>
        <div class="controls">
            <button class="unlock-btn" id="unlockBtn">🔓 开锁</button>
            <button class="reset-btn" id="resetBtn">⟳ 重置</button>
        </div>
        <div class="message-area" id="msgArea">✨ 弹幕丝滑滚动 | 正确字母永久绿色高亮(任何位置) | 锁定正确字母变亮绿 ✨</div>
    </div>
    <footer>⚡ 每个轮盘目标字母「J/O/K/E/R」无论在哪个位置都会显示为绿色 · 锁定后强化效果</footer>
</div>

<div class="victory-overlay" id="victoryOverlay">
    <div class="victory-card" id="victoryCard">
        <img id="victoryImage" src="https://furrymiaomiao.oss-cn-beijing.aliyuncs.com/yurenjie/creeping.png" alt="解锁成功">
        <audio id="victoryMusic" loop preload="auto">
            <source src="https://furrymiaomiao.oss-cn-beijing.aliyuncs.com/yurenjie/creeping.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<script>
    // ======================= 配置 =======================
    const TARGET_PASSWORD = "JOKER";   // 目标密码: J O K E R
    const REEL_COUNT = 5;
    const SCROLL_STEP_MS = 500;        // 500ms一步，弹幕式滚动节奏

    // 六个字母池: J O K E R D (包含所有目标字母 + D)
    const LETTER_POOL = ['J', 'O', 'K', 'E', 'R', 'D'];

    // 生成每个轮盘的独立乱序序列 (六个字母全排列)
    function shuffleArray(arr, seedOffset) {
        const array = [...arr];
        for (let i = array.length - 1; i > 0; i--) {
            const rand = (i * 131071 + seedOffset * 7919 + 1234567) % (i + 1);
            const j = rand % (i + 1);
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    const reelSequences = [];
    for (let i = 0; i < REEL_COUNT; i++) {
        reelSequences.push(shuffleArray(LETTER_POOL, i * 811 + 577 + i * 7));
    }

    // DOM 元素及全局状态
    let reelStates = [];          // { currentIndex, isLocked, isCorrect }
    let reelDomElements = [];
    let rollingIntervals = [];    // setInterval 句柄
    let currentLockStep = 0;
    let isGameComplete = false;
    let unlockBtn, resetBtn, msgDiv;
    let victoryOverlay, victoryImage, victoryAudio, victoryCard;
    let globalAnimationFrame = null;  // 预留但未使用，保留性能

    // 获取三个字母 (上中下)
    function getTripletLetters(seq, idx) {
        const len = seq.length;
        return {
            top: seq[(idx - 1 + len) % len],
            middle: seq[idx],
            bottom: seq[(idx + 1) % len]
        };
    }

    // 核心：更新轮盘视觉，并高亮所有正确的目标字母（无论是否在中间选定位置）
    function updateReelVisual(reelIndex) {
        const state = reelStates[reelIndex];
        if (!state) return;
        const seq = reelSequences[reelIndex];
        const triplet = getTripletLetters(seq, state.currentIndex);
        const targetLetter = TARGET_PASSWORD[reelIndex];

        const reelDiv = reelDomElements[reelIndex];
        if (!reelDiv) return;

        const topSpan = reelDiv.querySelector('.letter-top');
        const midSpan = reelDiv.querySelector('.letter-middle');
        const bottomSpan = reelDiv.querySelector('.letter-bottom');

        if (topSpan) topSpan.textContent = triplet.top;
        if (midSpan) midSpan.textContent = triplet.middle;
        if (bottomSpan) bottomSpan.textContent = triplet.bottom;

        // 清除所有旧的高亮class
        if (topSpan) {
            topSpan.classList.remove('letter-correct-highlight');
            topSpan.classList.remove('letter-middle-locked');
        }
        if (midSpan) {
            midSpan.classList.remove('letter-correct-highlight');
            midSpan.classList.remove('letter-middle-locked');
        }
        if (bottomSpan) {
            bottomSpan.classList.remove('letter-correct-highlight');
            bottomSpan.classList.remove('letter-middle-locked');
        }

        // 为所有等于目标字母的字母添加绿色高亮 (任何位置)
        if (topSpan && triplet.top === targetLetter) {
            topSpan.classList.add('letter-correct-highlight');
        }
        if (midSpan && triplet.middle === targetLetter) {
            midSpan.classList.add('letter-correct-highlight');
        }
        if (bottomSpan && triplet.bottom === targetLetter) {
            bottomSpan.classList.add('letter-correct-highlight');
        }

        // 锁定状态强化效果 (中间字母)
        const isLockedCorrect = state.isLocked && state.isCorrect;
        const statusDiv = reelDiv.querySelector('.reel-status');

        if (isLockedCorrect) {
            statusDiv.textContent = '✓ 已锁定';
            statusDiv.classList.add('status-correct');
            if (midSpan) {
                midSpan.classList.remove('letter-correct-highlight');
                midSpan.classList.add('letter-middle-locked');
            }
            const windowDiv = reelDiv.querySelector('.reel-window');
            if (windowDiv) windowDiv.style.boxShadow = "inset 0 0 0 2px #6eff8e, inset 0 0 0 5px #2f2418, 0 0 12px #39ff7e";
        } else {
            statusDiv.textContent = '◉ 滚动中';
            statusDiv.classList.remove('status-correct');
            const windowDiv = reelDiv.querySelector('.reel-window');
            if (windowDiv && !state.isLocked) windowDiv.style.boxShadow = "inset 0 0 0 2px #e6bc6b, inset 0 0 0 5px #2c2419";
        }
    }

    // 丝滑滚动效果 (弹幕式滑动)
    function performSmoothRoll(reelIndex) {
        const state = reelStates[reelIndex];
        if (!state || state.isLocked) return false;

        const seq = reelSequences[reelIndex];
        const newIndex = (state.currentIndex + 1) % seq.length;

        const reelDiv = reelDomElements[reelIndex];
        const strip = reelDiv?.querySelector('.rolling-strip');
        if (!strip) return false;

        // 采用更柔和弹幕过渡
        strip.style.transition = "transform 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1)";
        strip.style.transform = "translateY(-12px)";

        setTimeout(() => {
            if (strip) {
                // 更新索引
                state.currentIndex = newIndex;
                // 刷新字母及高亮
                updateReelVisual(reelIndex);
                // 归位
                strip.style.transform = "translateY(0px)";
                setTimeout(() => {
                    if (strip) strip.style.transition = "";
                }, 130);
            }
        }, 55);
        return true;
    }

    // 启动轮盘自动滚动
    function startRollingForReel(reelIndex) {
        if (rollingIntervals[reelIndex]) clearInterval(rollingIntervals[reelIndex]);
        const timer = setInterval(() => {
            const state = reelStates[reelIndex];
            if (!state || state.isLocked) {
                if (rollingIntervals[reelIndex]) {
                    clearInterval(rollingIntervals[reelIndex]);
                    rollingIntervals[reelIndex] = null;
                }
                return;
            }
            performSmoothRoll(reelIndex);
        }, SCROLL_STEP_MS);
        rollingIntervals[reelIndex] = timer;
    }

    function stopRollingForReel(reelIndex) {
        if (rollingIntervals[reelIndex]) {
            clearInterval(rollingIntervals[reelIndex]);
            rollingIntervals[reelIndex] = null;
        }
    }

    // 闪红效果（错误时加强反馈）
    function flashRed(reelIndex) {
        const reelDiv = reelDomElements[reelIndex];
        if (!reelDiv) return;
        const statusDiv = reelDiv.querySelector('.reel-status');
        if (statusDiv) {
            statusDiv.classList.add('wrong-flash');
            setTimeout(() => statusDiv.classList.remove('wrong-flash'), 450);
        }
        const midSpan = reelDiv.querySelector('.letter-middle');
        if (midSpan && !reelStates[reelIndex]?.isLocked) {
            midSpan.style.transition = "0.08s";
            midSpan.style.color = "#ff7777";
            midSpan.style.textShadow = "0 0 6px red";
            midSpan.style.backgroundColor = "#771111";
            setTimeout(() => {
                if (midSpan && !reelStates[reelIndex]?.isLocked) {
                    midSpan.style.color = "";
                    midSpan.style.textShadow = "";
                    midSpan.style.backgroundColor = "";
                    updateReelVisual(reelIndex);
                }
                midSpan.style.transition = "";
            }, 220);
        }
    }

    // 锁定尝试
    function attemptLockCurrent() {
        if (isGameComplete || currentLockStep >= REEL_COUNT) {
            if (currentLockStep >= REEL_COUNT && !isGameComplete) {
                triggerVictory();
            }
            return;
        }

        const idx = currentLockStep;
        const state = reelStates[idx];
        if (state.isLocked && state.isCorrect) {
            currentLockStep++;
            attemptLockCurrent();
            return;
        }

        const currentLetter = reelSequences[idx][state.currentIndex];
        const requiredLetter = TARGET_PASSWORD[idx];

        if (currentLetter === requiredLetter) {
            state.isLocked = true;
            state.isCorrect = true;
            stopRollingForReel(idx);
            updateReelVisual(idx);
            msgDiv.innerHTML = `✅ 第${idx+1}位「${requiredLetter}」正确锁定！ 继续下一个 ✅`;
            currentLockStep++;
            if (currentLockStep === REEL_COUNT) {
                triggerVictory();
            }
        } else {
            flashRed(idx);
            msgDiv.innerHTML = `❌ 第${idx+1}位错误 (当前选中:${currentLetter} → 需要:${requiredLetter}) 闪红后继续滚动`;
            if (!rollingIntervals[idx] && !state.isLocked) {
                startRollingForReel(idx);
            }
        }
    }

    // 胜利：展示图片 + 播放音乐 (增强交互：点击浮层可关闭)
    function triggerVictory() {
        if (isGameComplete) return;
        isGameComplete = true;
        for (let i = 0; i < REEL_COUNT; i++) stopRollingForReel(i);
        if (unlockBtn) unlockBtn.disabled = true;
        msgDiv.innerHTML = "🎉✨ 解锁成功！ 完美匹配 JOKER ✨🎉  点击画面可关闭音乐并重新挑战";

        if (victoryOverlay) {
            victoryOverlay.classList.add('active');
            if (victoryAudio) {
                victoryAudio.currentTime = 0;
                victoryAudio.loop = true;
                victoryAudio.play().catch(e => console.log("音频自动播放受限，但交互后可能生效", e));
            }
        }
    }

    // 关闭胜利浮层并重置状态（可选点击浮层重置）
    function closeVictoryAndReset() {
        if (victoryOverlay && victoryOverlay.classList.contains('active')) {
            victoryOverlay.classList.remove('active');
            if (victoryAudio) {
                victoryAudio.pause();
                victoryAudio.currentTime = 0;
            }
        }
        // 重置所有游戏状态
        fullReset();
    }

    // 完全重置所有状态
    function fullReset() {
        // 清除所有滚动定时器
        for (let i = 0; i < REEL_COUNT; i++) {
            if (rollingIntervals[i]) {
                clearInterval(rollingIntervals[i]);
                rollingIntervals[i] = null;
            }
        }
        // 重置状态 + 随机起始索引
        for (let i = 0; i < REEL_COUNT; i++) {
            const seqLen = reelSequences[i].length;
            const randomStart = Math.floor(Math.random() * seqLen);
            reelStates[i] = {
                currentIndex: randomStart,
                isLocked: false,
                isCorrect: false,
            };
            updateReelVisual(i);
            startRollingForReel(i);
        }
        currentLockStep = 0;
        isGameComplete = false;
        if (unlockBtn) unlockBtn.disabled = false;
        msgDiv.innerHTML = "🔄 重置完成 | 正确字母永久绿色高亮 (任何位置可见) 点击开锁依次锁定 J O K E R";

        // 强制清除胜利浮层
        if (victoryOverlay && victoryOverlay.classList.contains('active')) {
            victoryOverlay.classList.remove('active');
            if (victoryAudio) {
                victoryAudio.pause();
                victoryAudio.currentTime = 0;
            }
        }
        // 重置所有轮盘边框样式
        for (let i = 0; i < REEL_COUNT; i++) {
            const reelDiv = reelDomElements[i];
            if (reelDiv) {
                const windowDiv = reelDiv.querySelector('.reel-window');
                if (windowDiv) windowDiv.style.boxShadow = "inset 0 0 0 2px #e6bc6b, inset 0 0 0 5px #2c2419";
                const statusDiv = reelDiv.querySelector('.reel-status');
                if (statusDiv) statusDiv.classList.remove('status-correct');
                // 清除可能残留在非中间字母上的locked样式
                const midSpan = reelDiv.querySelector('.letter-middle');
                if (midSpan) midSpan.classList.remove('letter-middle-locked');
                updateReelVisual(i);
            }
        }
    }

    function onUnlockClick() {
        if (isGameComplete) {
            msgDiv.innerHTML = "🔓 已解锁成功！按「重置」可再次挑战 或 点击画面关闭浮层";
            return;
        }
        attemptLockCurrent();
    }

    // 构建UI
    function buildUI() {
        const panel = document.getElementById('reelsPanel');
        panel.innerHTML = '';
        reelDomElements = [];
        for (let i = 0; i < REEL_COUNT; i++) {
            const reelDiv = document.createElement('div');
            reelDiv.className = 'reel-unit';
            reelDiv.innerHTML = `
                <div class="reel-frame">
                    <div class="reel-window">
                        <div class="rolling-strip" style="display: flex; flex-direction: column; align-items: center;">
                            <div class="letter-item letter-top" style="height:45px;">J</div>
                            <div class="letter-item letter-middle" style="height:45px; font-size:2.4rem;">O</div>
                            <div class="letter-item letter-bottom" style="height:45px;">K</div>
                        </div>
                    </div>
                </div>
                <div class="reel-status">◉ 滚动中</div>
            `;
            panel.appendChild(reelDiv);
            reelDomElements.push(reelDiv);
        }
    }

    // 初始化
    function init() {
        buildUI();
        for (let i = 0; i < REEL_COUNT; i++) {
            const randIdx = Math.floor(Math.random() * reelSequences[i].length);
            reelStates[i] = {
                currentIndex: randIdx,
                isLocked: false,
                isCorrect: false,
            };
            updateReelVisual(i);
            startRollingForReel(i);
        }
        currentLockStep = 0;
        isGameComplete = false;
        unlockBtn = document.getElementById('unlockBtn');
        resetBtn = document.getElementById('resetBtn');
        msgDiv = document.getElementById('msgArea');
        victoryOverlay = document.getElementById('victoryOverlay');
        victoryImage = document.getElementById('victoryImage');
        victoryAudio = document.getElementById('victoryMusic');
        victoryCard = document.getElementById('victoryCard');

        if (victoryImage) {
            victoryImage.src = "https://furrymiaomiao.oss-cn-beijing.aliyuncs.com/yurenjie/creeping.png";
            victoryImage.alt = "解锁成功贺图";
        }
        if (victoryAudio) {
            victoryAudio.src = "https://furrymiaomiao.oss-cn-beijing.aliyuncs.com/yurenjie/creeping.mp3";
            victoryAudio.load();
        }

        unlockBtn.addEventListener('click', onUnlockClick);
        resetBtn.addEventListener('click', fullReset);
        // 点击胜利浮层背景或者卡片区域关闭并重置（提升用户体验）
        if (victoryOverlay) {
            victoryOverlay.addEventListener('click', (e) => {
                // 防止点到卡片内部冒泡特殊，但整体关闭重置
                closeVictoryAndReset();
            });
            if (victoryCard) {
                victoryCard.addEventListener('click', (e) => e.stopPropagation());
            }
        }
        // 额外处理移动端touch
        if (resetBtn) resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); fullReset(); });
        if (unlockBtn) unlockBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onUnlockClick(); });
    }

    init();

    // 禁止右键
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
    });

    // 禁止选择文本
    document.addEventListener('selectstart', function(e) {
        e.preventDefault();
        return false;
    });

    // 禁止拖拽图片
    document.addEventListener('dragstart', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
            return false;
        }
    });

    // 禁止开发者工具快捷键
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12') {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.key === 'I') {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.key === 'J') {
            e.preventDefault();
            return false;
        }
        if (e.ctrlKey && e.key === 'u') {
            e.preventDefault();
            return false;
        }
    });
</script>
</body>
</html>
