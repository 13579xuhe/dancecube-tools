<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>舞立方自制谱谱师工具 · 谱面合集</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #c3cfe2;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --header-border: rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --border-light: #e2e8f0;
            --feature-bg: #f8fafc;
            --preview-card-bg: #ffffff;
            --preview-border: #e2e8f0;
            --success-bg: #f0fdf4;
            --success-border: #86efac;
            --success-text: #16a34a;
            --footer-border: rgba(0, 0, 0, 0.05);
            --error-bg: #fef2f2;
            --error-border: #fca5a5;
            --error-text: #dc2626;
            --offline-bg: #fef2f2;
            --offline-border: #fca5a5;
            --offline-text: #dc2626;
            --btn-primary: #4cc9f0;
            --btn-primary-hover: #3ab8e0;
        }

        body.dark {
            --bg-gradient-start: #0a0a14;
            --bg-gradient-end: #12121c;
            --text-primary: #eef2ff;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --card-bg: #1e1e2c;
            --header-border: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --border-light: #2d2d3a;
            --feature-bg: #2a2a38;
            --preview-card-bg: #1e1e2c;
            --preview-border: #2d2d3a;
            --success-bg: #1a2a1a;
            --success-border: #166534;
            --success-text: #4ade80;
            --footer-border: rgba(255, 255, 255, 0.05);
            --error-bg: #2a1a1a;
            --error-border: #7f1d1d;
            --error-text: #f87171;
            --offline-bg: #2a1a1a;
            --offline-border: #7f1d1d;
            --offline-text: #f87171;
            --btn-primary: #4cc9f0;
            --btn-primary-hover: #3ab8e0;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.2s ease;
            padding: 20px;
        }

        .page-header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--header-border);
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .header-title h1 {
            font-size: 1.6rem;
            color: var(--text-primary);
        }

        .header-title p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-badge:hover {
            box-shadow: var(--shadow-md);
        }

        .user-avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            overflow: hidden;
            font-size: 0.8rem;
        }

        .user-avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name-small {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .theme-toggle-btn {
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .token-status {
            max-width: 1400px;
            margin: 0 auto 16px;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .token-status.success {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }

        .token-status.error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
        }

        .token-status .status-icon {
            font-size: 1.2rem;
        }

        .token-status .status-detail {
            font-size: 0.75rem;
            opacity: 0.8;
            word-break: break-all;
            flex: 1;
            min-width: 100px;
        }

        .filter-bar {
            max-width: 1400px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-light);
            flex-wrap: wrap;
        }

        .filter-bar label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .filter-bar input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #22c55e;
        }

        .filter-bar .filter-info {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: auto;
        }

        .filter-bar .filter-info span {
            font-weight: 600;
            color: var(--text-primary);
        }

        .save-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #4cc9f0, #4361ee);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(76, 201, 240, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 201, 240, 0.4);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .stats-bar {
            max-width: 1400px;
            margin: 0 auto 24px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            background: var(--card-bg);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .stat-item .num {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-item .label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .stat-divider {
            width: 1px;
            background: var(--border-light);
        }

        .stat-item .num.published-num {
            color: #22c55e;
        }

        .preview-grid-wrapper {
            max-width: 1400px;
            margin: 0 auto;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        .preview-card {
            background: var(--preview-card-bg);
            border-radius: 20px;
            padding: 12px 14px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--preview-border);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            height: 90px;
            min-height: 90px;
            max-height: 90px;
            overflow: hidden;
            cursor: default;
            position: relative;
        }

        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .preview-card.offline {
            opacity: 0.55;
            border-color: var(--offline-border);
            background: var(--offline-bg);
        }

        .preview-card.offline::after {
            content: '已下架';
            position: absolute;
            top: 6px;
            right: 10px;
            font-size: 0.5rem;
            font-weight: 700;
            color: var(--offline-text);
            background: rgba(220, 38, 38, 0.15);
            padding: 1px 8px;
            border-radius: 10px;
            border: 1px solid var(--offline-border);
            letter-spacing: 0.3px;
        }

        .cover-art {
            flex: 0 0 56px;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 0.6rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            flex-shrink: 0;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .cover-art .cover-emoji {
            font-size: 1.6rem;
            line-height: 1;
        }

        .cover-art .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 截图时强制显示图片 */
        .screenshot-mode .cover-art .cover-image {
            display: block !important;
        }

        .card-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            height: 100%;
            justify-content: center;
            overflow: hidden;
        }

        .card-info .song-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            line-height: 1.3;
        }

        .card-info .music-id {
            display: inline-block;
            font-weight: 700;
            font-size: 0.65rem;
            color: #4cc9f0;
            background: rgba(76, 201, 240, 0.12);
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid rgba(76, 201, 240, 0.2);
            letter-spacing: 0.3px;
            font-family: 'Courier New', monospace;
            width: fit-content;
        }

        body.dark .card-info .music-id {
            background: rgba(76, 201, 240, 0.15);
            border-color: rgba(76, 201, 240, 0.25);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading-state i {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: #6a11cb;
        }

        .page-footer {
            max-width: 1400px;
            margin: 30px auto 0;
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--footer-border);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 14px 28px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: #22c55e;
        }

        .toast.error {
            border-color: #ef4444;
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast.success i {
            color: #22c55e;
        }

        .toast.error i {
            color: #ef4444;
        }

        @media (max-width: 1200px) {
            .preview-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 992px) {
            .preview-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .page-header { flex-direction: column; align-items: stretch; gap: 12px; }
            .header-left { flex-wrap: wrap; }
            .header-title h1 { font-size: 1.2rem; }
            .header-right { justify-content: space-between; }
            .stats-bar { padding: 12px 16px; gap: 12px; }
            .stat-item .num { font-size: 1rem; }
            .preview-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .preview-card { padding: 10px 12px; height: 80px; min-height: 80px; max-height: 80px; gap: 10px; }
            .cover-art { flex: 0 0 44px; width: 44px; height: 44px; border-radius: 12px; }
            .cover-art .cover-emoji { font-size: 1.2rem; }
            .card-info .song-name { font-size: 0.8rem; }
            .card-info .music-id { font-size: 0.55rem; padding: 1px 10px; }
            .filter-bar { padding: 10px 16px; font-size: 0.8rem; }
            .save-btn { padding: 8px 16px; font-size: 0.8rem; }
        }

        @media (max-width: 480px) {
            .preview-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .preview-card { padding: 8px 10px; height: 68px; min-height: 68px; max-height: 68px; gap: 8px; }
            .cover-art { flex: 0 0 36px; width: 36px; height: 36px; border-radius: 10px; }
            .cover-art .cover-emoji { font-size: 1rem; }
            .card-info .song-name { font-size: 0.7rem; }
            .card-info .music-id { font-size: 0.5rem; padding: 1px 8px; }
            .preview-card.offline::after { font-size: 0.4rem; top: 4px; right: 6px; padding: 0px 6px; }
            .filter-bar .filter-info { font-size: 0.7rem; }
            .save-btn { padding: 6px 12px; font-size: 0.7rem; gap: 4px; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">保存成功</span>
</div>

<header class="page-header">
    <div class="header-left">
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回
        </a>
        <div class="header-title">
            <h1>我的谱面</h1>
        </div>
    </div>
    <div class="header-right">
        <button class="theme-toggle-btn" id="themeToggle">
            <i class="fas fa-moon"></i> 暗色
        </button>
        <div class="user-badge" id="userBadge">
            <div class="user-avatar-small" id="userAvatarSmall">
                <i class="fas fa-user"></i>
            </div>
            <span class="user-name-small" id="userNameSmall">未登录</span>
        </div>
    </div>
</header>

<div class="token-status" id="tokenStatus">
    <span class="status-icon">✅</span>
    <span>Token 已加载</span>
    <span class="status-detail" id="tokenDetail">检测中...</span>
</div>

<div class="filter-bar">
    <label>
        <input type="checkbox" id="hideOfflineCheckbox" checked>
        <span>🔒 隐藏已下架谱面</span>
    </label>
    <button class="save-btn" id="saveImageBtn">
        <i class="fas fa-download"></i> 保存为图片
    </button>
    <div class="filter-info">
        显示 <span id="displayCount">0</span> / <span id="totalMusicCount">0</span> 个谱面
    </div>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat-item">
        <span class="num" id="totalCount">0</span>
        <span class="label">总谱面</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
        <span class="num published-num" id="publishedCount">0</span>
        <span class="label">已上架</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
        <span class="num" id="offlineCount" style="color:#ef4444;">0</span>
        <span class="label">已下架</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
        <span class="num" id="totalDownload">0</span>
        <span class="label">总下载</span>
    </div>
</div>

<div class="preview-grid-wrapper">
    <div class="preview-grid" id="previewGrid">
        <div class="loading-state">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>加载谱面数据中...</p>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 配置
    // ============================================================
    const API_BASE = 'https://dancedemo.shenghuayule.com/Dance';
    let userToken = '';
    let userInfo = null;
    let allMusicList = [];
    let displayedMusicList = [];

    // ============================================================
    // Toast 提示
    // ============================================================
    let toastTimer = null;

    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const msgEl = document.getElementById('toastMessage');
        msgEl.textContent = message;
        toast.className = 'toast ' + type;
        toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';

        clearTimeout(toastTimer);
        void toast.offsetWidth;
        toast.classList.add('show');

        toastTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // ============================================================
    // Token 获取
    // ============================================================
    function loadUserFromStorage() {
        try {
            const savedUserData = localStorage.getItem('dance_user_data');
            const savedTokenData = localStorage.getItem('dance_user_token');

            if (!savedUserData || !savedTokenData) {
                console.warn('未找到登录数据');
                return false;
            }

            const userData = JSON.parse(savedUserData);
            const tokenData = JSON.parse(savedTokenData);

            if (tokenData.expireTime) {
                const now = new Date();
                const expireTime = new Date(tokenData.expireTime);
                if (now > expireTime) {
                    console.warn('Token 已过期');
                    return false;
                }
            }

            userInfo = userData;
            userToken = tokenData.token || '';

            console.log('✅ Token 加载成功:', userToken.substring(0, 30) + '...');
            return true;
        } catch (e) {
            console.error('解析登录数据失败:', e);
            return false;
        }
    }

    // ============================================================
    // 更新 UI
    // ============================================================
    function updateUserUI() {
        const avatarEl = document.getElementById('userAvatarSmall');
        const nameEl = document.getElementById('userNameSmall');

        if (userInfo && userToken) {
            const displayName = userInfo.UserName || userInfo.username || userInfo.nickname || '用户';
            nameEl.textContent = displayName;

            const avatarUrl = userInfo.HeadimgURL || userInfo.headimgurl || userInfo.avatar || null;
            if (avatarUrl && avatarUrl.trim() !== '') {
                avatarEl.innerHTML = `<img src="${avatarUrl}" alt="头像" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>';">`;
            } else {
                avatarEl.innerHTML = displayName.charAt(0).toUpperCase();
            }
        } else {
            nameEl.textContent = '未登录';
            avatarEl.innerHTML = '<i class="fas fa-user"></i>';
        }
    }

    function updateTokenUI(token) {
        const detail = document.getElementById('tokenDetail');
        const status = document.getElementById('tokenStatus');
        if (token && token.length > 10) {
            detail.textContent = `Token: ${token.substring(0, 20)}... (${token.length} 字符)`;
            status.className = 'token-status success';
            status.querySelector('.status-icon').textContent = '✅';
        } else {
            detail.textContent = '未检测到有效 Token，请先登录';
            status.className = 'token-status error';
            status.querySelector('.status-icon').textContent = '❌';
        }
    }

    // ============================================================
    // 获取谱面数据
    // ============================================================
    async function fetchMyMusic() {
        if (!userToken) {
            throw new Error('未登录，请先登录');
        }

        const url = `${API_BASE}/api/MusicData/GetMyPublishMusic?page=1&pagesize=9999`;

        console.log('📡 请求 URL:', url);
        console.log('📡 Authorization:', `Bearer ${userToken.substring(0, 30)}...`);

        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${userToken}`,
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            }
        });

        console.log('📡 响应状态:', response.status);

        if (response.status === 401) {
            throw new Error('Token 无效或已过期，请重新登录');
        }

        if (!response.ok) {
            const text = await response.text();
            throw new Error(`请求失败 (${response.status}): ${text.substring(0, 100)}`);
        }

        const data = await response.json();
        console.log('📡 响应数据:', data);

        let musicList = [];
        if (Array.isArray(data)) {
            musicList = data;
        } else if (data.data && Array.isArray(data.data)) {
            musicList = data.data;
        } else if (data.list && Array.isArray(data.list)) {
            musicList = data.list;
        } else if (data.records && Array.isArray(data.records)) {
            musicList = data.records;
        } else {
            for (let key in data) {
                if (Array.isArray(data[key])) {
                    musicList = data[key];
                    break;
                }
            }
        }

        if (!Array.isArray(musicList)) {
            musicList = [];
        }

        console.log(`✅ 获取到 ${musicList.length} 个谱面`);
        return musicList;
    }

    // ============================================================
    // 过滤和渲染
    // ============================================================
    function filterAndRender() {
        const hideOffline = document.getElementById('hideOfflineCheckbox').checked;

        if (hideOffline) {
            displayedMusicList = allMusicList.filter(item =>
                item.IsOnSale === true || item.isOnSale === true
            );
        } else {
            displayedMusicList = [...allMusicList];
        }

        document.getElementById('displayCount').textContent = displayedMusicList.length;
        document.getElementById('totalMusicCount').textContent = allMusicList.length;

        renderCards(displayedMusicList);
    }

    function renderCards(musicList) {
        const grid = document.getElementById('previewGrid');

        if (!musicList || musicList.length === 0) {
            const hideOffline = document.getElementById('hideOfflineCheckbox').checked;
            const msg = hideOffline ? '暂无已上架的谱面' : '暂无谱面数据';
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-music"></i>
                    <p>${msg}</p>
                    <p style="font-size:0.8rem;margin-top:8px;color:var(--text-muted);">
                        ${hideOffline ? '试试取消 "隐藏已下架谱面" 查看全部' : '快去上传你的第一个自制谱吧！'}
                    </p>
                </div>
            `;
            return;
        }

        // 更新统计
        const total = allMusicList.length;
        const published = allMusicList.filter(item => item.IsOnSale === true || item.isOnSale === true).length;
        const offline = total - published;
        const totalDownload = allMusicList.reduce((sum, item) => sum + (item.DownloadCount || 0), 0);

        document.getElementById('totalCount').textContent = total;
        document.getElementById('publishedCount').textContent = published;
        document.getElementById('offlineCount').textContent = offline;
        document.getElementById('totalDownload').textContent = totalDownload.toLocaleString();

        const emojis = ['🎵', '🎶', '🎧', '🎸', '🎹', '🎺', '🎻', '🥁', '📀', '💿', '🎼', '🎤', '🎷', '🎛️', '📻'];
        const colors = [
            'linear-gradient(135deg, #f9b042, #c55f2a)',
            'linear-gradient(135deg, #6fd4f0, #1f7f9c)',
            'linear-gradient(135deg, #d67af0, #7d3c98)',
            'linear-gradient(135deg, #f2a6b0, #b13e54)',
            'linear-gradient(135deg, #8fdf8f, #2f7a4a)',
            'linear-gradient(135deg, #f7c16e, #b87c2e)',
            'linear-gradient(135deg, #9bb8f0, #314e8a)',
            'linear-gradient(135deg, #e591a6, #a14159)',
            'linear-gradient(135deg, #b0d68c, #4a7a3a)',
            'linear-gradient(135deg, #e5b3a0, #a5533a)',
            'linear-gradient(135deg, #b3b3e0, #49497a)',
            'linear-gradient(135deg, #f5b7b1, #b34a4a)',
            'linear-gradient(135deg, #b5d6e8, #2d6a8f)',
            'linear-gradient(135deg, #e6c384, #a77b34)',
            'linear-gradient(135deg, #b7e0b0, #3c7a47)',
        ];

        let html = '';
        musicList.forEach((item, index) => {
            const id = item.MusicID || item.musicId || item.ID || '???';
            const name = item.Name || item.MusicName || '未命名谱面';
            const isOnSale = item.IsOnSale === true || item.isOnSale === true;
            const picPath = item.PicPath || item.picPath || null;

            const emoji = emojis[index % emojis.length];
            const color = colors[index % colors.length];

            const offlineClass = !isOnSale ? 'offline' : '';

            let coverHtml = '';
            if (picPath && picPath.trim() !== '') {
                let imgUrl = picPath;
                // 如果是相对路径，补全为完整 URL
                if (imgUrl.startsWith('/')) {
                    imgUrl = `https://dancedemo.shenghuayule.com${imgUrl}`;
                }
                // 添加时间戳防止缓存
                const cacheBuster = `?t=${Date.now()}`;
                coverHtml = `<img src="${imgUrl}${cacheBuster}" class="cover-image" alt="封面" crossorigin="anonymous" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\\'cover-emoji\\'>${emoji}</span>';">`;
            } else {
                coverHtml = `<span class="cover-emoji">${emoji}</span>`;
            }

            html += `
                <div class="preview-card ${offlineClass}">
                    <div class="cover-art" style="background: ${color};">
                        ${coverHtml}
                    </div>
                    <div class="card-info">
                        <div class="song-name" title="${name}">${name}</div>
                        <span class="music-id">#${id}</span>
                    </div>
                </div>
            `;
        });

        grid.innerHTML = html;
    }

    // ============================================================
    // 保存为图片 - 使用多种策略确保曲绘显示
    // ============================================================
    async function saveGridAsImage() {
        const grid = document.getElementById('previewGrid');
        const saveBtn = document.getElementById('saveImageBtn');

        // 检查是否有卡片
        const cards = grid.querySelectorAll('.preview-card');
        if (cards.length === 0) {
            showToast('没有谱面可保存', 'error');
            return;
        }

        // 禁用按钮
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 加载图片中...';

        try {
            // 先等待所有图片加载完成
            const images = grid.querySelectorAll('.cover-image');
            const loadPromises = Array.from(images).map(img => {
                return new Promise((resolve) => {
                    if (img.complete) {
                        resolve();
                    } else {
                        img.onload = () => resolve();
                        img.onerror = () => resolve(); // 即使加载失败也继续
                    }
                });
            });

            // 等待所有图片加载完成，最多等待10秒
            await Promise.race([
                Promise.all(loadPromises),
                new Promise(resolve => setTimeout(resolve, 10000))
            ]);

            saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 生成图片中...';

            // 等待一帧让 UI 更新
            await new Promise(resolve => requestAnimationFrame(resolve));

            // 获取背景色
            const bgColor = getComputedStyle(document.body).getPropertyValue('--card-bg').trim() || '#ffffff';

            // 使用 html2canvas 截取 grid 区域
            const canvas = await html2canvas(grid, {
                scale: 2,
                backgroundColor: bgColor,
                allowTaint: true,
                useCORS: true,
                logging: false,
                width: grid.scrollWidth,
                height: grid.scrollHeight,
                onclone: function(doc) {
                    // 在克隆文档中确保所有图片可见
                    const clonedImages = doc.querySelectorAll('.cover-image');
                    clonedImages.forEach(img => {
                        img.style.display = 'block';
                        img.style.opacity = '1';
                        img.style.visibility = 'visible';
                    });
                }
            });

            // 创建下载链接
            const link = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0, 10);
            link.download = `谱面列表_${dateStr}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            showToast(`谱面列表图片保存成功！共 ${cards.length} 个谱面`, 'success');
        } catch (error) {
            console.error('保存图片失败:', error);
            showToast('保存失败: ' + (error.message || '未知错误'), 'error');
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-download"></i> 保存为图片';
        }
    }

    // ============================================================
    // 加载数据
    // ============================================================
    async function loadData() {
        const grid = document.getElementById('previewGrid');
        grid.innerHTML = `
            <div class="loading-state">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>加载谱面数据中...</p>
            </div>
        `;

        try {
            allMusicList = await fetchMyMusic();
            filterAndRender();
        } catch (err) {
            console.error('加载失败:', err);
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i>
                    <p>${err.message || '加载失败'}</p>
                    <p style="font-size:0.8rem;margin-top:8px;cursor:pointer;color:#6a11cb;" onclick="loadData()">
                        <i class="fas fa-redo"></i> 点击重试
                    </p>
                </div>
            `;
        }
    }

    // ============================================================
    // 主题切换
    // ============================================================
    function initTheme() {
        if (localStorage.getItem('dance_theme') === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i> 浅色';
        } else {
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i> 暗色';
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('dance_theme', isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').innerHTML = isDark ? '<i class="fas fa-sun"></i> 浅色' : '<i class="fas fa-moon"></i> 暗色';
    }

    // ============================================================
    // 启动
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        initTheme();

        const loggedIn = loadUserFromStorage();
        updateUserUI();
        updateTokenUI(userToken);

        if (loggedIn && userToken) {
            console.log('✅ 用户已登录:', userInfo?.UserName || '用户');
            loadData();
        } else {
            console.warn('⚠️ 未检测到登录信息，请返回首页登录');
            document.getElementById('previewGrid').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>请先登录</p>
                    <p style="font-size:0.8rem;margin-top:8px;cursor:pointer;color:#6a11cb;" onclick="window.location.href='index.html'">
                        <i class="fas fa-home"></i> 返回首页登录
                    </p>
                </div>
            `;
        }

        document.getElementById('hideOfflineCheckbox').addEventListener('change', function() {
            if (allMusicList.length > 0) {
                filterAndRender();
            }
        });

        document.getElementById('saveImageBtn').addEventListener('click', saveGridAsImage);

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        document.getElementById('userBadge').addEventListener('click', function() {
            window.location.href = 'index.html';
        });
    });

    window.loadData = loadData;

    document.addEventListener('contextmenu', e=>e.preventDefault());
    document.addEventListener('selectstart', e=>e.preventDefault());
    document.addEventListener('dragstart', e=>{ if(e.target.tagName==='IMG') e.preventDefault(); });
    document.addEventListener('keydown', e=>{ if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'))||(e.ctrlKey&&e.key==='u')) e.preventDefault(); });
</script>
