<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>压缩包合并工具 - 多个ZIP打包为一个</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 24px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .header {
            background: linear-gradient(135deg, #1e2a6e, #2d3a8c);
            padding: 28px 32px;
            color: white;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            opacity: 0.85;
            font-size: 0.95rem;
        }

        .content {
            padding: 32px;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            background: #f8fafc;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 28px;
        }

        .upload-area:hover, .upload-area.drag-over {
            border-color: #667eea;
            background: #eef2ff;
            transform: scale(0.98);
        }

        .upload-area i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 16px;
        }

        .upload-area p {
            color: #475569;
            font-size: 1rem;
        }

        .upload-area .hint {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 12px;
        }

        /* 文件列表 */
        .file-list-section {
            margin-bottom: 28px;
        }

        .section-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1e293b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .file-list {
            background: #f1f5f9;
            border-radius: 20px;
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #e6edf5;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            overflow: hidden;
        }

        .file-info i {
            font-size: 1.4rem;
            color: #f59e0b;
            flex-shrink: 0;
        }

        .file-name {
            font-size: 0.9rem;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 0.75rem;
            color: #64748b;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .remove-file:hover {
            background: #fee2e2;
            transform: scale(1.05);
        }

        .empty-list {
            text-align: center;
            padding: 48px 20px;
            color: #94a3b8;
        }

        .empty-list i {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 输出设置 */
        .output-settings {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid #e2e8f0;
        }

        .setting-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }

        .setting-row label {
            font-weight: 600;
            color: #334155;
            min-width: 100px;
        }

        .setting-row input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .setting-row input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #334155;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        /* 进度条 */
        .progress-section {
            margin-top: 24px;
            display: none;
        }

        .progress-bar {
            height: 10px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
        }

        /* 结果区域 */
        .result-area {
            margin-top: 24px;
            padding: 16px;
            background: #e8f5e9;
            border-radius: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .result-area.success {
            display: flex;
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
        }

        .result-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #2e7d32;
        }

        .download-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #1b5e20;
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            background: #fafcff;
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .content { padding: 20px; }
            .header h1 { font-size: 1.3rem; }
            .btn { padding: 8px 20px; }
            .file-item { flex-wrap: wrap; gap: 8px; }
            .file-info { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1><i class="fas fa-file-archive"></i> 压缩包合并工具</h1>
            <p>将多个 ZIP 压缩包快速合并为一个 ZIP 文件，保留原始文件结构</p>
        </div>
        <div class="content">
            <!-- 上传区域 -->
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>点击或拖拽上传 ZIP 压缩包</p>
                <p class="hint">支持多个文件，仅限 .zip 格式</p>
                <input type="file" id="fileInput" multiple accept=".zip" style="display: none;">
            </div>

            <!-- 文件列表 -->
            <div class="file-list-section">
                <div class="section-title">
                    <span><i class="fas fa-list"></i> 已添加的压缩包 (<span id="fileCount">0</span>)</span>
                    <button class="btn-secondary" id="clearAllBtn" style="padding: 6px 16px; font-size: 0.8rem;"><i class="fas fa-trash-alt"></i> 清空所有</button>
                </div>
                <div class="file-list" id="fileListContainer">
                    <div class="empty-list">
                        <i class="fas fa-inbox"></i>
                        <p>暂无压缩包，请点击上方区域添加</p>
                    </div>
                </div>
            </div>

            <!-- 输出设置 -->
            <div class="output-settings">
                <div class="setting-row">
                    <label><i class="fas fa-file-signature"></i> 输出文件名</label>
                    <input type="text" id="outputFilename" placeholder="合并后的文件名（不需要.zip后缀）" value="merged_archives">
                </div>
                <div class="action-buttons">
                    <button class="btn-primary" id="mergeBtn"><i class="fas fa-object-group"></i> 开始合并</button>
                    <button class="btn-secondary" id="resetBtn"><i class="fas fa-undo-alt"></i> 重置</button>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>

            <!-- 结果区域 -->
            <div class="result-area" id="resultArea">
                <div class="result-info">
                    <i class="fas fa-check-circle" style="font-size: 1.4rem;"></i>
                    <span id="resultMessage">合并完成！</span>
                </div>
                <button class="download-btn" id="downloadBtn"><i class="fas fa-download"></i> 下载合并包</button>
            </div>
        </div>
        <div class="footer">
            <i class="fas fa-shield-alt"></i> 纯本地处理 · 文件不会上传服务器 · 请确保所有文件均为标准 ZIP 格式
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    // 存储选中的文件列表 (File 对象数组)
    let selectedFiles = [];

    // DOM 元素
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileListContainer = document.getElementById('fileListContainer');
    const fileCountSpan = document.getElementById('fileCount');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const mergeBtn = document.getElementById('mergeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const outputFilenameInput = document.getElementById('outputFilename');
    const progressSection = document.getElementById('progressSection');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const resultArea = document.getElementById('resultArea');
    const resultMessageSpan = document.getElementById('resultMessage');
    const downloadBtn = document.getElementById('downloadBtn');

    // 全局变量保存生成的 Blob
    let generatedBlob = null;
    let generatedFilename = '';

    // 渲染文件列表
    function renderFileList() {
        fileListContainer.innerHTML = '';
        if (selectedFiles.length === 0) {
            fileListContainer.innerHTML = '<div class="empty-list"><i class="fas fa-inbox"></i><p>暂无压缩包，请点击上方区域添加</p></div>';
            fileCountSpan.innerText = '0';
            return;
        }

        fileCountSpan.innerText = selectedFiles.length;
        selectedFiles.forEach((file, index) => {
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            const sizeStr = formatFileSize(file.size);
            fileItem.innerHTML = `
                <div class="file-info">
                    <i class="fas fa-file-archive"></i>
                    <span class="file-name">${escapeHtml(file.name)}</span>
                    <span class="file-size">(${sizeStr})</span>
                </div>
                <button class="remove-file" data-index="${index}" title="移除"><i class="fas fa-times-circle"></i></button>
            `;
            fileListContainer.appendChild(fileItem);
        });

        // 绑定移除事件
        document.querySelectorAll('.remove-file').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.dataset.index);
                if (!isNaN(idx)) {
                    selectedFiles.splice(idx, 1);
                    renderFileList();
                    hideResult();
                }
            });
        });
    }

    // 格式化文件大小
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 简单防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 隐藏结果区域
    function hideResult() {
        resultArea.classList.remove('success');
        resultArea.style.display = 'none';
        generatedBlob = null;
    }

    // 显示错误消息
    function showError(msg) {
        resultArea.classList.add('success');
        resultArea.style.display = 'flex';
        resultArea.style.background = '#ffebee';
        resultArea.style.border = '1px solid #ffcdd2';
        resultMessageSpan.innerHTML = `<i class="fas fa-exclamation-triangle" style="margin-right: 6px;"></i> ${msg}`;
        document.querySelector('#resultArea .download-btn').style.display = 'none';
        // 但保留一个关闭或者重新显示的占位
        const oldBtn = document.querySelector('#resultArea .download-btn');
        if (oldBtn) oldBtn.style.display = 'none';
        // 添加一个关闭提示的按钮
        let closeBtn = document.getElementById('errorCloseBtn');
        if (!closeBtn) {
            closeBtn = document.createElement('button');
            closeBtn.id = 'errorCloseBtn';
            closeBtn.className = 'btn-secondary';
            closeBtn.style.padding = '6px 16px';
            closeBtn.innerHTML = '<i class="fas fa-times"></i> 关闭';
            closeBtn.addEventListener('click', () => {
                resultArea.classList.remove('success');
                resultArea.style.display = 'none';
                document.querySelector('#resultArea .download-btn').style.display = 'inline-flex';
            });
            resultArea.appendChild(closeBtn);
        }
        closeBtn.style.display = 'inline-flex';
        generatedBlob = null;
    }

    function showSuccess(msg, blob, filename) {
        resultArea.classList.add('success');
        resultArea.style.display = 'flex';
        resultArea.style.background = '#e8f5e9';
        resultArea.style.border = '1px solid #a5d6a7';
        resultMessageSpan.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        const downloadDiv = document.querySelector('#resultArea .download-btn');
        if (downloadDiv) downloadDiv.style.display = 'inline-flex';
        const errorBtn = document.getElementById('errorCloseBtn');
        if (errorBtn) errorBtn.style.display = 'none';
        generatedBlob = blob;
        generatedFilename = filename;
    }

    // 核心合并逻辑
    async function mergeArchives() {
        if (selectedFiles.length === 0) {
            showError('请先添加至少一个 ZIP 压缩包');
            return;
        }

        // 检查是否都是 zip 文件
        for (let f of selectedFiles) {
            if (!f.name.toLowerCase().endsWith('.zip')) {
                showError(`文件 "${f.name}" 不是 ZIP 格式，请移除后重试`);
                return;
            }
        }

        let baseName = outputFilenameInput.value.trim();
        if (baseName === '') baseName = 'merged_archives';
        if (!baseName.toLowerCase().endsWith('.zip')) baseName += '.zip';
        const finalZipName = baseName;

        // 显示进度条
        progressSection.style.display = 'block';
        progressFill.style.width = '0%';
        progressText.innerText = '正在读取压缩包...';
        hideResult();

        try {
            const zip = new JSZip();
            let processed = 0;
            const total = selectedFiles.length;

            // 遍历每个 zip 文件，解压并加入到总zip中
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                progressText.innerText = `处理中: ${file.name} (${i+1}/${total})`;
                const percent = (i / total) * 100;
                progressFill.style.width = `${percent}%`;

                // 读取文件为 ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();
                // 使用 JSZip 加载子压缩包
                const subZip = await JSZip.loadAsync(arrayBuffer);

                // 遍历子压缩包中的所有文件/文件夹
                const subFiles = Object.keys(subZip.files);
                for (let relPath of subFiles) {
                    const zipEntry = subZip.files[relPath];
                    // 跳过文件夹（目录）
                    if (zipEntry.dir) {
                        // 创建对应文件夹路径（如果不存在会自动创建）
                        zip.folder(relPath);
                        continue;
                    }
                    // 获取文件内容并添加到主 zip 中（保持原有相对路径）
                    const content = await zipEntry.async('blob');
                    // 注意: 如果出现重名，直接覆盖（通常按照添加顺序，后添加的会覆盖，但一般合并场景不需要复杂逻辑）
                    // 为防止冲突，保留原路径，如果相同路径则后者覆盖前者（最终只会保留一个）
                    zip.file(relPath, content, { binary: true });
                }
                processed++;
                const newPercent = (processed / total) * 100;
                progressFill.style.width = `${newPercent}%`;
            }

            progressText.innerText = '正在生成最终压缩包...';
            progressFill.style.width = '90%';

            // 生成最终 ZIP Blob
            const finalBlob = await zip.generateAsync({
                type: 'blob',
                compression: 'DEFLATE',
                compressionOptions: { level: 6 }
            }, (metadata) => {
                // 可选进度回调
                if (metadata.currentFile) {
                    progressText.innerText = `打包中: ${metadata.currentFile} (${Math.round(metadata.percent)}%)`;
                }
                progressFill.style.width = `${metadata.percent}%`;
            });

            progressFill.style.width = '100%';
            progressText.innerText = '合并完成！';
            setTimeout(() => {
                progressSection.style.display = 'none';
            }, 800);

            showSuccess(`成功合并 ${selectedFiles.length} 个压缩包`, finalBlob, finalZipName);
        } catch (err) {
            console.error(err);
            progressSection.style.display = 'none';
            showError(`合并失败: ${err.message || '未知错误，请确保文件为标准 ZIP 格式'}`);
        }
    }

    // 重置所有
    function resetAll() {
        selectedFiles = [];
        renderFileList();
        hideResult();
        progressSection.style.display = 'none';
        outputFilenameInput.value = 'merged_archives';
        generatedBlob = null;
        // 重置文件input
        fileInput.value = '';
    }

    // 处理新增文件
    function addFiles(files) {
        if (!files || files.length === 0) return;
        let added = 0;
        for (let file of files) {
            // 只接受 .zip 文件
            if (!file.name.toLowerCase().endsWith('.zip')) {
                showError(`文件 "${file.name}" 不是 ZIP 格式，已跳过`);
                continue;
            }
            // 可选去重：根据文件名 + 大小简单判断 (不严格但防止重复添加明显相同)
            const isDuplicate = selectedFiles.some(existing => existing.name === file.name && existing.size === file.size);
            if (!isDuplicate) {
                selectedFiles.push(file);
                added++;
            } else {
                console.log(`跳过重复文件: ${file.name}`);
            }
        }
        if (added > 0) {
            renderFileList();
            hideResult();
            progressSection.style.display = 'none';
        } else if (files.length > 0 && added === 0) {
            showError('所选文件无有效 ZIP 或均为重复文件');
        }
    }

    // 上传区域的点击与拖拽事件
    uploadArea.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files.length) {
            addFiles(Array.from(e.target.files));
        }
        fileInput.value = ''; // 清空以便再次选择相同文件
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('drag-over');
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const items = e.dataTransfer.items;
        const files = [];
        if (items) {
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                if (item.kind === 'file') {
                    const file = item.getAsFile();
                    if (file) files.push(file);
                }
            }
            addFiles(files);
        } else {
            addFiles(Array.from(e.dataTransfer.files));
        }
    });

    // 合并按钮
    mergeBtn.addEventListener('click', () => {
        if (selectedFiles.length === 0) {
            showError('请至少添加一个 ZIP 压缩包');
            return;
        }
        mergeArchives();
    });

    // 重置按钮
    resetBtn.addEventListener('click', resetAll);

    // 清空所有
    clearAllBtn.addEventListener('click', () => {
        if (selectedFiles.length > 0 && confirm('确定清空所有已添加的压缩包吗？')) {
            resetAll();
        } else if (selectedFiles.length === 0) {
            // 无文件，仅重置界面
            resetAll();
        }
    });

    // 下载按钮
    downloadBtn.addEventListener('click', () => {
        if (generatedBlob && generatedFilename) {
            const url = URL.createObjectURL(generatedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = generatedFilename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } else {
            showError('没有可下载的合并包，请先进行合并操作');
        }
    });

    // 初始渲染
    renderFileList();
</script>
</body>
</html>
