<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>文传 · 真正可用的局域网P2P文件传输</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-light: #6c757d;
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --success: #10b981;
            --error: #ef4444;
            --border: #e5e7eb;
            --hover: #f8f9fa;
        }

        body.dark {
            --bg: #121212;
            --card: #1e1e2e;
            --text: #e0e0e0;
            --text-light: #a0a0b0;
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --border: #2d2d40;
            --hover: #2a2a3a;
        }

        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.2s, color 0.2s;
            color: var(--text);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--primary);
        }

        .theme-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
        }

        .id-box {
            background: var(--bg);
            border-radius: 16px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            text-align: center;
            border: 1px solid var(--border);
            margin: 10px 0;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            transition: 0.1s;
        }

        .btn-secondary {
            background: var(--text-light);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .input-group {
            margin: 12px 0;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-light);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .device-item {
            background: var(--bg);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 4px #10b981;
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.2s;
        }

        .file-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 10px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-link {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #e8e8e8;
        }

        .status-connected {
            background: #10b98120;
            color: #10b981;
        }

        .tip {
            font-size: 12px;
            color: var(--text-light);
            text-align: center;
            margin-top: 12px;
        }

        hr {
            margin: 16px 0;
            border-color: var(--border);
        }

        .mode-switch {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            background: var(--bg);
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 500;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 500px) {
            body { padding: 12px; }
            .card { padding: 16px; }
        }
    </style>
</head>
<body>
<button class="theme-btn" id="themeToggle">🌓 主题</button>
<div class="container">
    <div class="header">
        <h1>📡 文传 · 真正可用</h1>
        <div style="font-size: 13px; margin-top: 4px;">支持局域网自动发现 + 手动连接码</div>
    </div>

    <!-- 工作模式切换 -->
    <div class="card">
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="auto">🌐 自动模式 (推荐)</button>
            <button class="mode-btn" data-mode="manual">📋 手动模式 (离线可用)</button>
        </div>
        <div id="autoModePanel">
            <div class="tip">自动模式下，同一局域网打开本页的设备会自动出现</div>
        </div>
        <div id="manualModePanel" class="hidden">
            <div class="tip">手动模式不依赖任何网络信令，通过复制粘贴连接码建立连接</div>
        </div>
    </div>

    <!-- 我的设备ID -->
    <div class="card">
        <div style="font-weight: 600; margin-bottom: 8px;">🆔 我的设备ID</div>
        <div class="id-box" id="myDeviceId">生成中...</div>
        <button class="btn btn-outline" id="copyMyIdBtn" style="margin-top: 8px;">📋 复制设备ID</button>
    </div>

    <!-- 自动模式面板 -->
    <div id="autoPanel">
        <div class="card">
            <div style="font-weight: 600; margin-bottom: 8px;">📱 在线设备 (自动发现)</div>
            <div id="deviceList" style="min-height: 100px;">
                <div class="tip">正在搜索设备...</div>
            </div>
            <button class="btn btn-outline" id="refreshDevicesBtn" style="margin-top: 8px;">🔄 刷新设备列表</button>
        </div>
    </div>

    <!-- 手动模式面板 -->
    <div id="manualPanel" class="hidden">
        <div class="card">
            <div style="font-weight: 600; margin-bottom: 8px;">🔗 手动连接对方</div>
            <div class="input-group">
                <label>对方的连接码</label>
                <textarea id="remoteOfferCode" rows="3" placeholder="粘贴对方发送给你的连接码..."></textarea>
            </div>
            <button class="btn" id="manualConnectBtn">连接</button>
            <hr>
            <div style="font-weight: 600; margin-bottom: 8px;">📤 生成我的连接码</div>
            <button class="btn btn-outline" id="generateOfferBtn">生成连接码 (发给对方)</button>
            <div id="myOfferCodeBox" class="hidden" style="margin-top: 12px;">
                <div class="id-box" id="myOfferCode" style="font-size: 10px;"></div>
                <button class="btn-outline" id="copyOfferBtn" style="margin-top: 8px; padding: 6px;">复制连接码</button>
            </div>
        </div>
    </div>

    <!-- 当前连接状态 -->
    <div class="card" id="connectionCard">
        <div style="font-weight: 600; margin-bottom: 8px;">🔌 连接状态</div>
        <div id="connectionStatus" class="tip">未连接</div>
        <div id="connectedDevice" class="hidden">
            <div class="device-item" style="margin-top: 8px;">
                <div><span class="online-dot"></span> <span id="connectedDeviceName">未知设备</span></div>
                <button class="btn-outline" id="disconnectBtn" style="width: auto; padding: 6px 16px;">断开</button>
            </div>
        </div>
    </div>

    <!-- 发送文件 -->
    <div class="card">
        <div style="font-weight: 600; margin-bottom: 8px;">📤 发送文件</div>
        <div class="flex-row" style="gap: 12px;">
            <label class="btn" for="fileInput" style="flex: 1; text-align: center; margin: 0;">📁 选择文件</label>
            <span id="fileNameDisplay" style="flex: 2; font-size: 13px;">未选择</span>
        </div>
        <input type="file" id="fileInput" style="display: none;">
        <div id="sendProgress" style="display: none; margin-top: 12px;">
            <div class="progress-bar"><div class="progress-fill" id="sendProgressFill"></div></div>
            <div id="sendStatus" style="font-size: 12px; margin-top: 4px;"></div>
        </div>
        <div class="tip">👉 选择文件后，点击下方设备「发送」按钮</div>
    </div>

    <!-- 接收记录 -->
    <div class="card">
        <div style="font-weight: 600; margin-bottom: 8px;">📥 收到的文件</div>
        <div id="receivedList" style="max-height: 200px; overflow-y: auto;">
            <div class="tip">暂无接收文件</div>
        </div>
    </div>
    <div class="tip">⚡ 完全点对点传输 | 文件不经任何服务器 | 国内STUN服务器</div>
</div>

<script>
    (function() {
        // ==================== 真正可用的P2P文件传输 ====================
        // 国内可用的STUN服务器
        const ICE_SERVERS = [
            { urls: "stun:stun.miwifi.com:3478" },
            { urls: "stun:stun.qq.com:3478" },
            { urls: "stun:stun.chathelp.com:3478" },
            { urls: "stun:stun.l.google.com:19302" }
        ];

        // 全局变量
        let localPeerId = "";
        let currentMode = "auto";  // auto / manual
        let currentConnection = null;
        let currentDataChannel = null;
        let connectedRemoteId = null;

        // 文件相关
        let selectedFileBuffer = null;
        let selectedFileName = "";
        let isTransferring = false;
        let currentReceive = null;
        let receivedBlobUrls = [];

        // 自动模式相关
        let broadcastChannel = null;
        let discoveredPeers = new Map();  // remoteId -> { name, dc? }

        // 手动模式相关
        let pendingOffer = null;

        // 生成设备ID
        function generateDeviceId() {
            const random = Math.random().toString(36).substring(2, 10);
            const time = Date.now().toString(36).slice(-5);
            return `DEV_${random}${time}`;
        }

        function getLocalId() {
            let stored = localStorage.getItem("file_transfer_device_id");
            if (!stored) {
                stored = generateDeviceId();
                localStorage.setItem("file_transfer_device_id", stored);
            }
            return stored;
        }

        function getDeviceName() {
            const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
            return `${isMobile ? "📱" : "💻"} ${localPeerId.slice(-8)}`;
        }

        localPeerId = getLocalId();
        document.getElementById("myDeviceId").innerText = localPeerId;

        // 复制ID
        document.getElementById("copyMyIdBtn").addEventListener("click", () => {
            navigator.clipboard.writeText(localPeerId);
            alert("设备ID已复制");
        });

        // ========== DataChannel 设置 ==========
        function setupDataChannel(dc, remoteId) {
            dc.onopen = () => {
                console.log("DataChannel open", remoteId);
                updateConnectionUI(true, remoteId);
                // 如果有待发送的文件
                if (selectedFileBuffer && !isTransferring && connectedRemoteId === remoteId) {
                    startSendFile();
                }
            };
            dc.onclose = () => {
                console.log("DataChannel close");
                if (connectedRemoteId === remoteId) {
                    updateConnectionUI(false, null);
                }
            };
            dc.onmessage = async (ev) => {
                if (ev.data instanceof ArrayBuffer) {
                    await handleFileChunk(ev.data);
                } else if (typeof ev.data === "string") {
                    try {
                        const msg = JSON.parse(ev.data);
                        if (msg.type === "file_meta") {
                            startReceiveFile(msg.fileName, msg.fileSize, msg.totalChunks);
                        } else if (msg.type === "chunk_ack" && isTransferring) {
                            const percent = msg.progress;
                            document.getElementById("sendProgress").style.display = "block";
                            document.getElementById("sendProgressFill").style.width = percent + "%";
                            document.getElementById("sendStatus").innerText = `发送中 ${Math.round(percent)}%`;
                            if (percent >= 99.9) {
                                isTransferring = false;
                                document.getElementById("sendStatus").innerText = "✅ 发送完成!";
                                setTimeout(() => {
                                    document.getElementById("sendProgress").style.display = "none";
                                }, 1500);
                                selectedFileBuffer = null;
                                document.getElementById("fileNameDisplay").innerText = "未选择";
                            }
                        }
                    } catch (e) {}
                }
            };
        }

        // 接收文件准备
        function startReceiveFile(fileName, fileSize, totalChunks) {
            currentReceive = {
                chunks: new Array(totalChunks),
                fileName: fileName,
                fileSize: fileSize,
                totalChunks: totalChunks,
                recvCount: 0
            };
            document.getElementById("sendProgress").style.display = "block";
            document.getElementById("sendStatus").innerText = `接收 ${fileName} ...`;
        }

        async function handleFileChunk(chunkBuf) {
            if (!currentReceive) return;
            const index = new Uint32Array(chunkBuf, 0, 1)[0];
            const data = chunkBuf.slice(4);
            if (!currentReceive.chunks[index]) {
                currentReceive.chunks[index] = data;
                currentReceive.recvCount++;
            }
            const percent = (currentReceive.recvCount / currentReceive.totalChunks) * 100;
            document.getElementById("sendProgressFill").style.width = percent + "%";
            document.getElementById("sendStatus").innerText = `接收中 ${Math.round(percent)}%`;

            if (currentDataChannel && currentDataChannel.readyState === "open") {
                currentDataChannel.send(JSON.stringify({ type: "chunk_ack", progress: percent }));
            }

            if (currentReceive.recvCount === currentReceive.totalChunks) {
                const blob = new Blob(currentReceive.chunks, { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                receivedBlobUrls.push(url);
                addToReceivedList(currentReceive.fileName, currentReceive.fileSize, url);
                currentReceive = null;
                document.getElementById("sendStatus").innerText = `✅ 接收完成: ${currentReceive?.fileName || ""}`;
                setTimeout(() => {
                    if (!isTransferring) document.getElementById("sendProgress").style.display = "none";
                }, 2000);
            }
        }

        function addToReceivedList(fileName, fileSize, blobUrl) {
            const container = document.getElementById("receivedList");
            if (container.innerText.includes("暂无接收文件")) container.innerHTML = "";
            const div = document.createElement("div");
            div.className = "file-item";
            div.innerHTML = `
                <span>📄 ${fileName} (${(fileSize / 1024).toFixed(1)} KB)</span>
                <a class="download-link" data-url="${blobUrl}" data-name="${fileName}">⬇️ 保存</a>
            `;
            container.prepend(div);
            div.querySelector(".download-link").addEventListener("click", () => {
                const a = document.createElement("a");
                a.href = blobUrl;
                a.download = fileName;
                a.click();
            });
        }

        async function startSendFile() {
            if (!currentDataChannel || currentDataChannel.readyState !== "open") {
                alert("未连接设备");
                return;
            }
            if (!selectedFileBuffer) {
                alert("请先选择文件");
                return;
            }
            if (isTransferring) {
                alert("正在传输中");
                return;
            }
            isTransferring = true;
            const chunkSize = 16384;
            const totalChunks = Math.ceil(selectedFileBuffer.byteLength / chunkSize);
            currentDataChannel.send(JSON.stringify({
                type: "file_meta",
                fileName: selectedFileName,
                fileSize: selectedFileBuffer.byteLength,
                totalChunks: totalChunks
            }));

            for (let i = 0; i < totalChunks; i++) {
                const start = i * chunkSize;
                const end = Math.min(start + chunkSize, selectedFileBuffer.byteLength);
                const chunk = selectedFileBuffer.slice(start, end);
                const header = new ArrayBuffer(4);
                new Uint32Array(header)[0] = i;
                const combined = new Uint8Array(header.byteLength + chunk.byteLength);
                combined.set(new Uint8Array(header), 0);
                combined.set(new Uint8Array(chunk), 4);
                currentDataChannel.send(combined.buffer);
                const percent = ((i + 1) / totalChunks) * 100;
                document.getElementById("sendProgress").style.display = "block";
                document.getElementById("sendProgressFill").style.width = percent + "%";
                document.getElementById("sendStatus").innerText = `发送 ${selectedFileName} ${Math.round(percent)}%`;
                await new Promise(r => setTimeout(r, 2));
            }
        }

        // ========== 自动模式：BroadcastChannel ==========
        function initAutoMode() {
            if (broadcastChannel) broadcastChannel.close();
            broadcastChannel = new BroadcastChannel("P2P_FILE_TRANSFER_V2");
            broadcastChannel.onmessage = handleAutoSignal;
            announcePresence();
            setInterval(() => announcePresence(), 5000);
        }

        function announcePresence() {
            if (!broadcastChannel) return;
            broadcastChannel.postMessage({
                type: "presence",
                from: localPeerId,
                name: getDeviceName(),
                timestamp: Date.now()
            });
        }

        async function handleAutoSignal(event) {
            const msg = event.data;
            if (!msg || msg.from === localPeerId) return;

            if (msg.type === "presence") {
                if (!discoveredPeers.has(msg.from)) {
                    discoveredPeers.set(msg.from, { name: msg.name, lastSeen: Date.now() });
                    updateDeviceListUI();
                }
            } else if (msg.type === "offer" && currentMode === "auto") {
                // 收到连接请求
                if (connectedRemoteId) {
                    broadcastChannel.postMessage({ type: "busy", to: msg.from, from: localPeerId });
                    return;
                }
                await acceptOffer(msg.from, msg.sdp);
            } else if (msg.type === "answer" && currentMode === "auto") {
                if (currentConnection && currentConnection.signalingState !== "closed") {
                    await currentConnection.setRemoteDescription({ type: "answer", sdp: msg.sdp });
                }
            } else if (msg.type === "ice" && currentMode === "auto") {
                if (currentConnection) {
                    try {
                        await currentConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
                    } catch (e) {}
                }
            } else if (msg.type === "busy") {
                alert("对方正忙，请稍后再试");
            }
        }

        async function initiateAutoConnection(remoteId) {
            if (connectedRemoteId) {
                alert("请先断开当前连接");
                return;
            }

            if (currentConnection) {
                currentConnection.close();
                currentConnection = null;
            }

            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
            const dc = pc.createDataChannel("fileTransfer", { ordered: true });
            setupDataChannel(dc, remoteId);

            pc.onicecandidate = (ev) => {
                if (ev.candidate) {
                    broadcastChannel.postMessage({
                        type: "ice",
                        to: remoteId,
                        from: localPeerId,
                        candidate: ev.candidate
                    });
                }
            };

            currentConnection = pc;
            currentDataChannel = dc;
            connectedRemoteId = remoteId;

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            broadcastChannel.postMessage({
                type: "offer",
                to: remoteId,
                from: localPeerId,
                sdp: offer.sdp
            });
        }

        async function acceptOffer(fromId, offerSdp) {
            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
            pc.onicecandidate = (ev) => {
                if (ev.candidate) {
                    broadcastChannel.postMessage({
                        type: "ice",
                        to: fromId,
                        from: localPeerId,
                        candidate: ev.candidate
                    });
                }
            };
            pc.ondatachannel = (event) => {
                setupDataChannel(event.channel, fromId);
                currentDataChannel = event.channel;
            };

            await pc.setRemoteDescription({ type: "offer", sdp: offerSdp });
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            broadcastChannel.postMessage({
                type: "answer",
                to: fromId,
                from: localPeerId,
                sdp: answer.sdp
            });

            currentConnection = pc;
            connectedRemoteId = fromId;
            updateConnectionUI(true, fromId);
        }

        function updateDeviceListUI() {
            const container = document.getElementById("deviceList");
            const devices = Array.from(discoveredPeers.keys());
            if (devices.length === 0) {
                container.innerHTML = `<div class="tip">🔍 未发现其他设备，请确保其他设备也打开了本页面</div>`;
                return;
            }
            container.innerHTML = "";
            devices.forEach(remoteId => {
                const info = discoveredPeers.get(remoteId);
                const isConnected = (connectedRemoteId === remoteId);
                const div = document.createElement("div");
                div.className = "device-item";
                div.innerHTML = `
                    <div>
                        <span class="online-dot"></span>
                        <span style="font-weight: 500;">${escapeHtml(info.name)}</span>
                        <span style="font-size: 11px; color: var(--text-light); margin-left: 8px;">${remoteId.slice(-8)}</span>
                        ${isConnected ? '<span style="margin-left: 8px; font-size: 11px; color: #10b981;">✓ 已连接</span>' : ''}
                    </div>
                    ${!isConnected ? `<button class="btn-outline" data-id="${remoteId}" style="width: auto; padding: 6px 16px; margin: 0;">🔌 连接</button>` : `<button class="btn-outline" data-id="${remoteId}" data-action="send" style="width: auto; padding: 6px 16px; margin: 0;">📤 发送文件</button>`}
                `;
                container.appendChild(div);
            });

            document.querySelectorAll("[data-id]").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const remoteId = btn.getAttribute("data-id");
                    const action = btn.getAttribute("data-action");
                    if (action === "send") {
                        if (!selectedFileBuffer) {
                            alert("请先选择文件");
                            document.getElementById("fileInput").click();
                            return;
                        }
                        await startSendFile();
                    } else {
                        await initiateAutoConnection(remoteId);
                    }
                });
            });
        }

        // ========== 手动模式 ==========
        async function generateOfferCode() {
            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
            const dc = pc.createDataChannel("fileTransfer", { ordered: true });
            setupDataChannel(dc, "manual_peer");

            pc.onicecandidate = (ev) => {
                if (ev.candidate) {
                    // 收集候选
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // 等待ICE收集完成
            await new Promise((resolve) => {
                if (pc.iceGatheringState === "complete") resolve();
                else pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === "complete") resolve();
                };
            });

            const offerCode = btoa(JSON.stringify({
                type: "offer",
                sdp: pc.localDescription.sdp,
                fromId: localPeerId
            }));

            document.getElementById("myOfferCode").innerText = offerCode;
            document.getElementById("myOfferCodeBox").classList.remove("hidden");

            // 保存pending连接
            pendingOffer = { pc, dc };
            currentConnection = pc;
            currentDataChannel = dc;
        }

        async function handleManualConnect(offerCode) {
            let decoded;
            try {
                decoded = JSON.parse(atob(offerCode));
                if (decoded.type !== "offer") throw new Error("无效的连接码");
            } catch (e) {
                alert("无效的连接码，请重新复制");
                return;
            }

            const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
            pc.ondatachannel = (event) => {
                setupDataChannel(event.channel, decoded.fromId);
                currentDataChannel = event.channel;
            };

            pc.onicecandidate = (ev) => {
                if (ev.candidate) {
                    // 手动模式不需要发送ICE，因为SDP已包含
                }
            };

            await pc.setRemoteDescription({ type: "offer", sdp: decoded.sdp });
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            // 等待ICE收集
            await new Promise((resolve) => {
                if (pc.iceGatheringState === "complete") resolve();
                else pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === "complete") resolve();
                };
            });

            const answerCode = btoa(JSON.stringify({
                type: "answer",
                sdp: pc.localDescription.sdp,
                fromId: localPeerId
            }));

            // 显示answer码让用户发送
            showAnswerCode(answerCode, decoded.fromId);

            currentConnection = pc;
            connectedRemoteId = decoded.fromId;
            updateConnectionUI(true, decoded.fromId);
        }

        function showAnswerCode(code, targetId) {
            const modal = document.createElement("div");
            modal.style.cssText = "position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;";
            modal.innerHTML = `
                <div style="background: var(--card); border-radius: 28px; max-width: 90%; width: 360px; padding: 24px;">
                    <h3 style="margin-bottom: 12px;">📋 发送回复码给对方</h3>
                    <div style="background: var(--bg); border-radius: 16px; padding: 12px; font-family: monospace; font-size: 10px; word-break: break-all; margin: 12px 0;">${code}</div>
                    <button id="copyAnswerBtn" style="background: var(--primary); color: white; border: none; padding: 10px; border-radius: 40px; width: 100%;">复制回复码</button>
                    <button id="closeAnswerBtn" style="background: transparent; border: 1px solid var(--border); padding: 10px; border-radius: 40px; width: 100%; margin-top: 8px;">关闭</button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById("copyAnswerBtn").addEventListener("click", () => {
                navigator.clipboard.writeText(code);
                alert("已复制回复码，请发送给对方");
            });
            document.getElementById("closeAnswerBtn").addEventListener("click", () => modal.remove());
        }

        // ========== UI 更新 ==========
        function updateConnectionUI(connected, remoteId) {
            const statusDiv = document.getElementById("connectionStatus");
            const connectedDiv = document.getElementById("connectedDevice");
            if (connected && remoteId) {
                statusDiv.innerHTML = `<span style="color: #10b981;">✅ 已连接到 ${remoteId.slice(-12)}</span>`;
                connectedDiv.classList.remove("hidden");
                document.getElementById("connectedDeviceName").innerText = remoteId.slice(-12);
            } else {
                statusDiv.innerHTML = `<span>⚪ 未连接</span>`;
                connectedDiv.classList.add("hidden");
                connectedRemoteId = null;
                currentConnection = null;
                currentDataChannel = null;
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
        }

        // ========== 模式切换 ==========
        function switchMode(mode) {
            currentMode = mode;
            const autoPanel = document.getElementById("autoPanel");
            const manualPanel = document.getElementById("manualPanel");
            const autoModePanel = document.getElementById("autoModePanel");
            const manualModePanel = document.getElementById("manualModePanel");

            if (mode === "auto") {
                autoPanel.classList.remove("hidden");
                manualPanel.classList.add("hidden");
                autoModePanel.classList.remove("hidden");
                manualModePanel.classList.add("hidden");
                initAutoMode();
                updateDeviceListUI();
            } else {
                autoPanel.classList.add("hidden");
                manualPanel.classList.remove("hidden");
                autoModePanel.classList.add("hidden");
                manualModePanel.classList.remove("hidden");
                if (broadcastChannel) broadcastChannel.close();
            }

            document.querySelectorAll(".mode-btn").forEach(btn => {
                if (btn.getAttribute("data-mode") === mode) btn.classList.add("active");
                else btn.classList.remove("active");
            });
        }

        // ========== 事件绑定 ==========
        document.getElementById("fileInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById("fileNameDisplay").innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedFileBuffer = ev.target.result;
                selectedFileName = file.name;
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById("refreshDevicesBtn").addEventListener("click", () => {
            discoveredPeers.clear();
            announcePresence();
            setTimeout(() => updateDeviceListUI(), 500);
        });

        document.getElementById("manualConnectBtn").addEventListener("click", () => {
            const code = document.getElementById("remoteOfferCode").value.trim();
            if (!code) {
                alert("请输入对方的连接码");
                return;
            }
            handleManualConnect(code);
        });

        document.getElementById("generateOfferBtn").addEventListener("click", () => {
            generateOfferCode();
        });

        document.getElementById("copyOfferBtn").addEventListener("click", () => {
            const code = document.getElementById("myOfferCode").innerText;
            if (code) {
                navigator.clipboard.writeText(code);
                alert("连接码已复制，请发送给对方");
            }
        });

        document.getElementById("disconnectBtn").addEventListener("click", () => {
            if (currentConnection) currentConnection.close();
            currentConnection = null;
            currentDataChannel = null;
            connectedRemoteId = null;
            updateConnectionUI(false, null);
        });

        // 模式切换按钮
        document.querySelectorAll(".mode-btn").forEach(btn => {
            btn.addEventListener("click", () => switchMode(btn.getAttribute("data-mode")));
        });

        // 主题切换
        let darkMode = false;
        document.getElementById("themeToggle").addEventListener("click", () => {
            darkMode = !darkMode;
            if (darkMode) document.body.classList.add("dark");
            else document.body.classList.remove("dark");
        });

        // 启动自动模式
        switchMode("auto");

        // 清理
        window.addEventListener("beforeunload", () => {
            receivedBlobUrls.forEach(url => URL.revokeObjectURL(url));
        });
    })();
</script>
</body>
</html>
