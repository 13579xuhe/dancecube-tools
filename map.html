    function normalizeCityName(cityName) {
        if (!cityName) return null;
        if (CITY_NAME_MAPPING[cityName]) return CITY_NAME_MAPPING[cityName];
        if (!cityName.endsWith("市") && CITY_NAME_MAPPING[cityName + "市"]) return CITY_NAME_MAPPING[cityName + "市"];
        if (cityName.endsWith("市") && CITY_NAME_MAPPING[cityName.slice(0, -1)]) return CITY_NAME_MAPPING[cityName.slice(0, -1)];
        return cityName;
    }

    const AMAP_KEY = '9364b5b6f74ae2d99320c91c6928b631';

    function getCityByCoordinates(lng, lat) {
        if (lng >= 126.3 && lng <= 126.9 && lat >= 43.6 && lat <= 44.0) return "吉林市";
        if (lng >= 125.1 && lng <= 125.5 && lat >= 43.7 && lat <= 44.0) return "长春市";
        if (lng >= 116.2 && lng <= 116.5 && lat >= 39.8 && lat <= 40.1) return "北京市";
        if (lng >= 121.4 && lng <= 121.5 && lat >= 31.2 && lat <= 31.3) return "上海市";
        if (lng >= 113.2 && lng <= 113.4 && lat >= 23.1 && lat <= 23.2) return "广州市";
        if (lng >= 113.8 && lng <= 114.2 && lat >= 22.5 && lat <= 22.6) return "深圳市";
        return null;
    }

    // 显示权限被拒绝的提示（引导用户手动开启）
    function showPermissionDeniedTip(type) {
        const existingTip = document.querySelector('.permission-denied-tip');
        if (existingTip) existingTip.remove();

        const tip = document.createElement('div');
        tip.className = 'permission-denied-tip';
        tip.innerHTML = `
            <span><i class="fas fa-exclamation-triangle"></i> 定位权限被拒绝，无法自动定位到您所在城市</span>
            <button id="closeTipBtn">知道了</button>
        `;
        document.body.appendChild(tip);
        document.getElementById('closeTipBtn').addEventListener('click', () => tip.remove());
        setTimeout(() => { if(tip) tip.remove(); }, 8000);
    }

    // 通过GPS获取城市（直接调用浏览器原生定位）
    async function getCityByGPS() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) {
                console.log("浏览器不支持GPS");
                resolve(null);
                return;
            }

            // 显示loading
            const loadingDiv = document.getElementById('loadingOverlay');
            if(loadingDiv) loadingDiv.style.display = 'flex';
            document.querySelector('.loading-text').innerHTML = '正在获取您的位置...';
            document.querySelector('.loading-sub').innerHTML = '请在弹出的浏览器窗口中点击"允许"';

            // 直接调用浏览器原生定位API - 这会触发浏览器原生权限弹窗
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { longitude, latitude } = pos.coords;
                    console.log('✅ GPS获取坐标成功:', longitude, latitude);

                    // 隐藏loading
                    if(loadingDiv) loadingDiv.style.display = 'none';

                    // 方法1：根据坐标范围直接匹配城市
                    const coordCity = getCityByCoordinates(longitude, latitude);
                    if (coordCity) {
                        console.log('🎯 坐标匹配城市成功:', coordCity);
                        resolve(coordCity);
                        return;
                    }

                    // 方法2：高德逆地理编码
                    try {
                        const url = `https://restapi.amap.com/v3/geocode/regeo?output=JSON&location=${longitude},${latitude}&key=${AMAP_KEY}&radius=200&extensions=base`;
                        const resp = await fetch(url);
                        const data = await resp.json();
                        console.log('逆地理编码返回:', data);

                        if (data.status === '1' && data.regeocode) {
                            const addr = data.regeocode.addressComponent;
                            let city = addr.city;
                            if (!city || city === '[]') city = addr.district;
                            if (!city || city === '[]') city = addr.province;

                            if (city && city !== '[]') {
                                if (city === '吉林省' || city === '吉林') {
                                    if (longitude >= 126.3 && longitude <= 126.9 && latitude >= 43.6 && latitude <= 44.0) {
                                        resolve("吉林市");
                                        return;
                                    } else {
                                        resolve("长春市");
                                        return;
                                    }
                                }
                                const normalized = normalizeCityName(city);
                                if (normalized) {
                                    resolve(normalized);
                                    return;
                                }
                            }
                        }
                        resolve(null);
                    } catch(e) {
                        console.error('逆地理编码错误:', e);
                        resolve(null);
                    }
                },
                (err) => {
                    console.error('GPS定位失败:', err.code, err.message);
                    if(loadingDiv) loadingDiv.style.display = 'none';

                    // 用户拒绝权限时显示友好提示
                    if (err.code === 1) {
                        showPermissionDeniedTip();
                    }

                    let errorMsg = '';
                    switch(err.code) {
                        case 1: errorMsg = '您拒绝了地理位置权限'; break;
                        case 2: errorMsg = '无法获取位置，请检查GPS开关'; break;
                        case 3: errorMsg = '定位超时，请检查网络后重试'; break;
                        default: errorMsg = err.message;
                    }
                    document.querySelector('.loading-sub').innerHTML = `定位失败：${errorMsg}`;
                    resolve(null);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
    }

    // IP定位（备用）
    async function getCityByIP() {
        try {
            const ipResponse = await fetch('https://restapi.amap.com/v3/ip?key=' + AMAP_KEY);
            const ipData = await ipResponse.json();
            console.log('IP定位结果:', ipData);
            if (ipData.status === '1' && ipData.city && ipData.city !== '[]') {
                const mappedCity = normalizeCityName(ipData.city);
                if (mappedCity) return mappedCity;
            }
        } catch (e) {
            console.log('IP定位失败:', e);
        }
        return "北京市";
    }

    // 主定位函数：优先GPS，失败则IP备用
    async function getAccurateCity() {
        const loadingDiv = document.getElementById('loadingOverlay');
        if(loadingDiv) loadingDiv.style.display = 'flex';
        document.querySelector('.loading-text').innerHTML = '正在获取您的位置...';
        document.querySelector('.loading-sub').innerHTML = '请在弹出的浏览器窗口中点击"允许"';

        const gpsCity = await getCityByGPS();
        if (gpsCity) {
            console.log('🎯 GPS定位成功:', gpsCity);
            if(loadingDiv) loadingDiv.style.display = 'none';
            return gpsCity;
        }

        // GPS失败或用户拒绝，使用IP定位作为备用
        console.log('⚠️ GPS定位失败，使用IP备用定位');
        document.querySelector('.loading-text').innerHTML = 'GPS定位未成功，使用网络定位...';
        const ipCity = await getCityByIP();
        console.log('📍 IP备用定位:', ipCity);
        if(loadingDiv) loadingDiv.style.display = 'none';
        return ipCity;
    }

    document.addEventListener('DOMContentLoaded', async function() {
        if (typeof window.provincesCities === 'undefined') {
            await new Promise(resolve => {
                const checkInterval = setInterval(() => {
                    if (typeof window.provincesCities !== 'undefined') {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
            });
        }

        const provincesCities = window.provincesCities;
        const cityCoordinates = window.cityCoordinates;
        const loadCabinetsDataByCity = window.loadCabinetsDataByCity;
        const provinceList = Object.keys(provincesCities).sort();

        async function setDropdownByCity(cityName, type) {
            for (let [province, cities] of Object.entries(provincesCities)) {
                if (cities.includes(cityName)) {
                    const provinceSelect = type === 'pc' ? document.getElementById('pcProvinceSelect') : document.getElementById('mobileProvinceSelect');
                    const citySelect = type === 'pc' ? document.getElementById('pcCitySelect') : document.getElementById('mobileCitySelect');
                    provinceSelect.value = province;
                    citySelect.disabled = false;
                    citySelect.innerHTML = '<option value="">请选择城市</option>';
                    (provincesCities[province] || []).forEach(c => citySelect.innerHTML += `<option value="${c}">${c}</option>`);
                    await new Promise(r => setTimeout(r, 50));
                    citySelect.value = cityName;
                    return true;
                }
            }
            return false;
        }

        let pcMap, pcMarkers = [], pcInfoWindow = null;
        async function pcLoadCityMachines(cityName) {
            if (!cityName) return;
            const finalCity = normalizeCityName(cityName) || cityName;
            const coords = cityCoordinates[finalCity];
            if (!coords) { document.getElementById('pcPanelMsg').innerHTML = `未找到 ${finalCity} 坐标`; return; }
            document.getElementById('pcPanelMsg').innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 加载 ${finalCity}...`;
            try {
                const machines = await loadCabinetsDataByCity(finalCity);
                pcMarkers.forEach(m => m.setMap(null));
                pcMarkers = [];
                machines.forEach(cab => {
                    if (!cab.lat || !cab.lng) return;
                    const isOnline = cab.status === 'active';
                    const isShow = cab.machineType === 1;
                    const shortName = cab.name.length > 10 ? cab.name.slice(0, 10) + '...' : cab.name;
                    let content = '';
                    if (!isOnline) content = `<div class="custom-marker" style="background:#4a4a6a;color:#ccc;padding:6px 12px;font-size:11px;border-radius:30px;white-space:nowrap;cursor:pointer;"><i class="fas fa-bed"></i> ${shortName}</div>`;
                    else if (isShow) content = `<div class="custom-marker" style="background:linear-gradient(135deg,#c084fc,#9333ea);color:white;padding:6px 14px;font-size:12px;font-weight:bold;border-radius:30px;box-shadow:0 0 15px rgba(168,85,247,0.6);white-space:nowrap;cursor:pointer;"><i class="fas fa-star-of-life"></i> ${shortName}</div>`;
                    else content = `<div class="custom-marker" style="background:linear-gradient(135deg,#60a5fa,#3b82f6);color:white;padding:6px 14px;font-size:12px;font-weight:bold;border-radius:30px;box-shadow:0 0 15px rgba(59,130,246,0.6);white-space:nowrap;cursor:pointer;"><i class="fas fa-music"></i> ${shortName}</div>`;

                    const marker = new AMap.Marker({ position: [cab.lng, cab.lat], content: content, offset: new AMap.Pixel(0, -20) });
                    marker.on('click', () => {
                        const isOnline2 = cab.status === 'active';
                        const isShow2 = cab.machineType === 1;
                        const statusClass = isOnline2 ? 'status-online' : 'status-offline';
                        const statusText = isOnline2 ? '● 在线运营' : '○ 维护中';
                        const machineTypeText = isShow2 ? '🎭 秀机/Show机' : '🎮 一代/二代机';
                        const machineTypeClass = isShow2 ? 'machine-type-show' : 'machine-type-normal';
                        pcInfoWindow.setContent(`<div class="custom-infowindow"><button class="info-close-btn" onclick="window.closePcInfoWindow()"><i class="fas fa-times"></i></button><h3><i class="fas fa-dice-d6"></i> ${cab.name}<span class="status-badge ${statusClass}" style="margin-left:8px;">${statusText}</span></h3><div class="detail"><span class="status-badge ${machineTypeClass}">${machineTypeText}</span></div><div class="detail"><i class="fas fa-location-dot"></i><span>${cab.province} · ${cab.city}</span></div><div class="detail"><i class="fas fa-map-pin"></i><span>${cab.address || '地址待补充'}</span></div><div class="badge-custom"><i class="fas fa-clock"></i> 实时数据</div></div>`);
                        pcInfoWindow.open(pcMap, [cab.lng, cab.lat]);
                    });
                    marker.setMap(pcMap);
                    pcMarkers.push(marker);
                });
                document.getElementById('pcTotalCount').innerText = machines.length;
                pcMap.setZoomAndCenter(machines.length > 0 ? 13 : 12, coords);
                await setDropdownByCity(finalCity, 'pc');
                const showCount = machines.filter(m => m.machineType === 1).length;
                document.getElementById('pcPanelMsg').innerHTML = `${finalCity} ${machines.length}台 (秀机${showCount})`;
            } catch(e) { document.getElementById('pcPanelMsg').innerHTML = '加载失败'; }
        }
        window.closePcInfoWindow = () => pcInfoWindow?.close();

        async function pcDoLocate() {
            pcInfoWindow?.close();
            const city = await getAccurateCity();
            document.getElementById('pcCurrentCity').innerText = city;
            document.getElementById('pcLocationTip').style.display = 'block';
            await pcLoadCityMachines(city);
            setTimeout(() => { const tip = document.getElementById('pcLocationTip'); tip.style.opacity = '0'; setTimeout(() => { tip.style.display = 'none'; tip.style.opacity = '1'; }, 4000); }, 4000);
        }

        function initPcMap() {
            pcMap = new AMap.Map('pc-map', { center: [116.4074, 39.9042], zoom: 5, viewMode: '2D', resizeEnable: true });
            pcInfoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -35), isCustom: true, autoMove: false });
            const ps = document.getElementById('pcProvinceSelect');
            ps.innerHTML = '<option value="">请选择省份</option>';
            provinceList.forEach(p => ps.innerHTML += `<option value="${p}">${p}</option>`);
            document.getElementById('pcProvinceSelect').addEventListener('change', () => {
                const prov = document.getElementById('pcProvinceSelect').value;
                const citySelect = document.getElementById('pcCitySelect');
                if (!prov) { citySelect.disabled = true; citySelect.innerHTML = '<option value="">请选择城市</option>'; return; }
                citySelect.disabled = false;
                citySelect.innerHTML = '<option value="">请选择城市</option>';
                (provincesCities[prov] || []).forEach(c => citySelect.innerHTML += `<option value="${c}">${c}</option>`);
            });
            document.getElementById('pcCitySelect').addEventListener('change', () => { const city = document.getElementById('pcCitySelect').value; if (city) pcLoadCityMachines(city); });
            document.getElementById('pcMyLocationBtn').addEventListener('click', pcDoLocate);
            document.getElementById('pcResetViewBtn').addEventListener('click', () => { pcMap.setZoomAndCenter(5, [116.4074, 39.9042]); document.getElementById('pcProvinceSelect').value = ""; document.getElementById('pcCitySelect').disabled = true; pcInfoWindow?.close(); });
            pcMap.on('click', () => pcInfoWindow.close());
            pcMap.on('complete', () => pcDoLocate());
        }

        let mobileMap, mobileMarkers = [], mobileInfoWindow = null;
        async function mobileLoadCityMachines(cityName) {
            if (!cityName) return;
            const finalCity = normalizeCityName(cityName) || cityName;
            const coords = cityCoordinates[finalCity];
            if (!coords) { document.getElementById('mobilePanelMsg').innerHTML = `未找到 ${finalCity}`; return; }
            document.getElementById('mobilePanelMsg').innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 加载 ${finalCity}...`;
            try {
                const machines = await loadCabinetsDataByCity(finalCity);
                mobileMarkers.forEach(m => m.setMap(null));
                mobileMarkers = [];
                machines.forEach(cab => {
                    if (!cab.lat || !cab.lng) return;
                    const isOnline = cab.status === 'active';
                    const isShow = cab.machineType === 1;
                    const shortName = cab.name.length > 8 ? cab.name.slice(0, 8) + '..' : cab.name;
                    let content = '';
                    if (!isOnline) content = `<div class="custom-marker" style="background:#4a4a6a;color:#ccc;padding:4px 10px;font-size:10px;border-radius:25px;white-space:nowrap;"><i class="fas fa-bed"></i> ${shortName}</div>`;
                    else if (isShow) content = `<div class="custom-marker" style="background:linear-gradient(135deg,#c084fc,#9333ea);color:white;padding:4px 12px;font-size:10px;border-radius:25px;box-shadow:0 0 10px rgba(168,85,247,0.5);white-space:nowrap;"><i class="fas fa-star-of-life"></i> ${shortName}</div>`;
                    else content = `<div class="custom-marker" style="background:linear-gradient(135deg,#60a5fa,#3b82f6);color:white;padding:4px 12px;font-size:10px;border-radius:25px;box-shadow:0 0 8px rgba(59,130,246,0.4);white-space:nowrap;"><i class="fas fa-music"></i> ${shortName}</div>`;

                    const marker = new AMap.Marker({ position: [cab.lng, cab.lat], content: content, offset: new AMap.Pixel(0, -16) });
                    marker.on('click', () => {
                        const isOnline2 = cab.status === 'active';
                        const isShow2 = cab.machineType === 1;
                        mobileInfoWindow.setContent(`<div class="custom-infowindow" style="min-width:200px;padding:10px 14px;"><button class="info-close-btn" onclick="window.closeMobileInfoWindow()"><i class="fas fa-times"></i></button><h3 style="font-size:0.85rem;"><i class="fas fa-dice-d6"></i> ${cab.name}<span class="status-badge ${isOnline2?'status-online':'status-offline'}" style="margin-left:6px;">${isOnline2?'在线':'离线'}</span></h3><div class="detail"><span class="status-badge ${isShow2?'machine-type-show':'machine-type-normal'}">${isShow2?'秀机':'普通机'}</span></div><div class="detail"><i class="fas fa-location-dot"></i> ${cab.city}</div><div class="detail"><i class="fas fa-map-pin"></i> ${cab.address || '地址待补充'}</div><div class="badge-custom"><i class="fas fa-clock"></i> 实时数据</div></div>`);
                        mobileInfoWindow.open(mobileMap, [cab.lng, cab.lat]);
                    });
                    marker.setMap(mobileMap);
                    mobileMarkers.push(marker);
                });
                document.getElementById('mobileTotalCount').innerText = machines.length;
                mobileMap.setZoomAndCenter(machines.length > 0 ? 13 : 12, coords);
                await setDropdownByCity(finalCity, 'mobile');
                const showCount = machines.filter(m => m.machineType === 1).length;
                document.getElementById('mobilePanelMsg').innerHTML = `${finalCity} ${machines.length}台 (秀机${showCount})`;
            } catch(e) { document.getElementById('mobilePanelMsg').innerHTML = '加载失败'; }
        }
        window.closeMobileInfoWindow = () => mobileInfoWindow?.close();

        async function mobileDoLocate() {
            mobileInfoWindow?.close();
            const city = await getAccurateCity();
            document.getElementById('mobileCurrentCity').innerText = city;
            document.getElementById('mobileLocationTip').style.display = 'block';
            await mobileLoadCityMachines(city);
            setTimeout(() => { const tip = document.getElementById('mobileLocationTip'); tip.style.opacity = '0'; setTimeout(() => { tip.style.display = 'none'; tip.style.opacity = '1'; }, 4000); }, 4000);
        }

        function initMobileMap() {
            mobileMap = new AMap.Map('mobile-map', { center: [116.4074, 39.9042], zoom: 5, viewMode: '2D', resizeEnable: true });
            mobileInfoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -30), isCustom: true, autoMove: false });
            const ps = document.getElementById('mobileProvinceSelect');
            ps.innerHTML = '<option value="">省份</option>';
            provinceList.forEach(p => ps.innerHTML += `<option value="${p}">${p}</option>`);
            document.getElementById('mobileProvinceSelect').addEventListener('change', () => {
                const prov = document.getElementById('mobileProvinceSelect').value;
                const citySelect = document.getElementById('mobileCitySelect');
                if (!prov) { citySelect.disabled = true; citySelect.innerHTML = '<option value="">城市</option>'; return; }
                citySelect.disabled = false;
                citySelect.innerHTML = '<option value="">城市</option>';
                (provincesCities[prov] || []).forEach(c => citySelect.innerHTML += `<option value="${c}">${c}</option>`);
            });
            document.getElementById('mobileCitySelect').addEventListener('change', () => { const city = document.getElementById('mobileCitySelect').value; if (city) mobileLoadCityMachines(city); });
            document.getElementById('mobileMyLocationBtn').addEventListener('click', mobileDoLocate);
            document.getElementById('mobileResetViewBtn').addEventListener('click', () => { mobileMap.setZoomAndCenter(5, [116.4074, 39.9042]); document.getElementById('mobileProvinceSelect').value = ""; document.getElementById('mobileCitySelect').disabled = true; mobileInfoWindow?.close(); });
            mobileMap.on('click', () => mobileInfoWindow.close());
            mobileMap.on('complete', () => mobileDoLocate());
        }

        initPcMap();
        initMobileMap();
    });

    document.addEventListener('contextmenu', e=>e.preventDefault());
    document.addEventListener('selectstart', e=>e.preventDefault());
    document.addEventListener('dragstart', e=>{ if(e.target.tagName==='IMG') e.preventDefault(); });
    document.addEventListener('keydown', e=>{ if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'))||(e.ctrlKey&&e.key==='u')) e.preventDefault(); });
</script>
<script src="./map.js"></script>
</body>
